<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enjoy Family 驚喜扭蛋機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700&family=Noto+Sans+TC:wght@700&display=swap');

        body {
            font-family: 'Nunito', 'Noto Sans TC', sans-serif;
            background-color: #fdf2f8;
            background-image: radial-gradient(#fbcfe8 20%, transparent 20%), radial-gradient(#fbcfe8 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        /* Animations */
        @keyframes rattle {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-8px, 8px) rotate(-5deg); }
            50% { transform: translate(8px, -8px) rotate(5deg); }
            75% { transform: translate(-8px, -8px) rotate(-5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .anim-rattle { animation: rattle 0.08s infinite; }

        @keyframes spinKnob {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .anim-spin { animation: spinKnob 0.8s ease-in-out; }

        @keyframes dropBall {
            0% { transform: translateY(-50px) scale(0.5); opacity: 0; }
            50% { transform: translateY(10px) scale(1.1); opacity: 1; }
            70% { transform: translateY(-5px) scale(1); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .anim-drop { animation: dropBall 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        @keyframes popModal {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .anim-pop { animation: popModal 0.4s ease-out forwards; }

        /* Gacha Glass Effect */
        .glass-dome {
            background: linear-gradient(135deg, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0.2) 100%);
            box-shadow: inset 0 0 20px rgba(255,255,255,0.5), 0 10px 15px rgba(0,0,0,0.1);
            backdrop-filter: blur(2px);
            border: 4px solid rgba(255,255,255,0.6);
        }
        .glass-highlight {
            position: absolute;
            top: 10%;
            left: 10%;
            width: 30%;
            height: 50%;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 70%);
            transform: rotate(-45deg);
            pointer-events: none;
            border-radius: 50%;
        }

        .gacha-ball {
            position: absolute;
            border-radius: 50%;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.2), inset 5px 5px 10px rgba(255,255,255,0.8);
            transition: top 0.1s ease, left 0.1s ease, transform 0.1s ease;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- 版權標註 (右上角) pointer-events-none 確保不擋住任何點擊 -->
    <div class="fixed top-2 right-2 md:top-4 md:right-4 z-40 text-right text-xs text-gray-500 bg-white/70 backdrop-blur-sm px-3 py-2 rounded-xl pointer-events-none border border-pink-200 shadow-sm">
        <div class="font-bold text-pink-400 mb-0.5">Designed by 黃鈺心</div>
        <div class="text-[10px] text-gray-400">Gemini Canvas 輔助生成</div>
    </div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-pink-50 z-[60] flex flex-col items-center justify-center transition-opacity duration-500">
        <div class="text-6xl animate-bounce mb-4 drop-shadow-lg">🎁</div>
        <div class="text-xl font-bold text-pink-500 animate-pulse">正在準備驚喜扭蛋...</div>
        <div id="loading-text" class="text-sm text-gray-500 mt-2">連線至 Google Sheets...</div>
    </div>

    <!-- Header / Mode Selector -->
    <div class="mb-6 mt-12 w-full max-w-md bg-white rounded-3xl p-3 shadow-xl border-4 border-pink-300 flex justify-between z-10 relative">
        <button onclick="setMode('sisi')" id="btn-sisi" class="flex-1 py-2 px-2 mx-1 rounded-2xl transition-all duration-300 transform hover:scale-105 active:scale-95 flex flex-col items-center bg-yellow-400 text-yellow-900 shadow-[0_4px_0_#b45309]">
            <span class="text-lg mb-1">👦🏻</span>
            <span class="text-sm font-bold">希希扭蛋</span>
        </button>
        <button onclick="setMode('mom')" id="btn-mom" class="flex-1 py-2 px-2 mx-1 rounded-2xl transition-all duration-300 transform hover:scale-105 active:scale-95 flex flex-col items-center bg-pink-100 text-pink-500 shadow-[0_4px_0_#fbcfe8]">
            <span class="text-lg mb-1">👩🏻</span>
            <span class="text-sm font-bold">媽媽扭蛋</span>
        </button>
        <button onclick="setMode('dad')" id="btn-dad" class="flex-1 py-2 px-2 mx-1 rounded-2xl transition-all duration-300 transform hover:scale-105 active:scale-95 flex flex-col items-center bg-blue-100 text-blue-500 shadow-[0_4px_0_#bfdbfe]">
            <span class="text-lg mb-1">👨🏻</span>
            <span class="text-sm font-bold">爸爸扭蛋</span>
        </button>
    </div>

    <!-- Main Gacha Machine -->
    <div class="relative w-[300px] h-[480px] flex flex-col items-center mt-2">
        <!-- Character Avatar -->
        <div id="avatar-container" class="absolute -top-16 z-20 w-32 h-32 bg-white rounded-full border-4 shadow-lg flex items-center justify-center border-yellow-400 transition-colors duration-300 pb-2">
            <div id="emoji-sisi" class="text-[80px] leading-none select-none drop-shadow-md">👦🏻</div>
            <div id="emoji-mom" class="text-[80px] leading-none hidden select-none drop-shadow-md">👩🏻</div>
            <div id="emoji-dad" class="text-[80px] leading-none hidden select-none drop-shadow-md">👨🏻</div>
        </div>

        <!-- Glass Dome -->
        <div id="dome" class="w-[280px] h-[280px] rounded-full glass-dome absolute top-12 z-10 overflow-hidden">
            <div class="glass-highlight"></div>
            <!-- Balls injected by JS -->
            <div id="balls-container" class="absolute inset-0"></div>
        </div>

        <!-- Machine Body -->
        <div id="machine-body" class="w-[300px] h-[220px] absolute top-[250px] rounded-t-3xl rounded-b-xl shadow-2xl transition-colors duration-500 bg-yellow-400 border-4 border-yellow-500 overflow-hidden flex flex-col items-center">
            
            <!-- Price/Text -->
            <div class="bg-white/90 text-gray-800 px-4 py-1 mt-6 rounded-full font-bold text-sm shadow-inner z-10 border-2 border-gray-200">
                1 枚硬幣 = 1 個驚喜
            </div>

            <!-- Knob and Outlet Wrapper -->
            <div class="w-full flex justify-between items-end px-10 mt-6 z-10">
                <!-- Turning Knob -->
                <div class="bg-gray-200 w-24 h-24 rounded-full flex items-center justify-center shadow-[inset_0_4px_10px_rgba(0,0,0,0.2)] border-4 border-gray-300">
                    <button id="turn-knob" class="w-16 h-16 bg-red-500 rounded-full shadow-lg relative cursor-pointer active:scale-95 transition-transform group outline-none" onclick="spinGacha()">
                        <div class="absolute w-2 h-full bg-white/30 left-1/2 -translate-x-1/2 rounded-full"></div>
                        <div class="absolute w-full h-2 bg-white/30 top-1/2 -translate-y-1/2 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-red-600 rounded-full"></div>
                    </button>
                </div>

                <!-- Ball Outlet -->
                <div class="relative w-20 h-24">
                    <div class="w-20 h-20 bg-gray-800 rounded-full shadow-[inset_0_10px_10px_rgba(0,0,0,0.8)] border-4 border-gray-400 absolute bottom-0"></div>
                    <div id="dispensed-ball" class="absolute bottom-2 left-1/2 -translate-x-1/2 w-14 h-14 rounded-full opacity-0"></div>
                </div>
            </div>
            
            <div class="absolute bottom-0 w-full h-4 bg-black/20"></div>
        </div>
    </div>

    <!-- Modal for Result -->
    <div id="result-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center backdrop-blur-sm px-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center relative border-8 border-yellow-400">
            <div class="absolute -top-6 -left-6 text-4xl transform -rotate-12">✨</div>
            <div class="absolute -top-6 -right-6 text-4xl transform rotate-12">🎉</div>
            <div class="absolute -bottom-6 left-1/2 -translate-x-1/2 text-4xl">🎊</div>

            <div id="modal-title" class="text-xl font-bold text-gray-500 mb-2">恭喜抽中！</div>
            <div id="modal-result" class="text-3xl font-extrabold text-red-600 mb-8 leading-snug py-4 px-2 bg-red-50 rounded-xl border-2 border-red-200 break-words">
                內容
            </div>
            
            <button onclick="closeModal()" class="bg-gradient-to-r from-yellow-400 to-orange-500 text-white font-bold py-3 px-8 rounded-full text-xl shadow-[0_5px_0_#c2410c] hover:translate-y-1 hover:shadow-[0_2px_0_#c2410c] active:translate-y-2 active:shadow-none transition-all">
                太棒了！收下
            </button>
        </div>
    </div>

    <script>
        // ==========================================
        // ★ 在這裡貼上你的 Google Apps Script 網址 ★
        // ==========================================
        const GAS_API_URL = "https://script.google.com/macros/s/AKfycbwA2-cFwR4VT8HNDAyF1ImcPSfUOxlHU0CEyf4aRWaZjUkVqPoT_dJFy63GhODmH3VUlA/exec"; 
        // 範例：const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw.../exec";

        // 預設資料 (如果沒有設定 API 網址，或是載入失敗，就會使用這些預設資料)
        const data = {
            sisi: {
                color: 'bg-yellow-400',
                borderColor: 'border-yellow-500',
                avatarBorder: 'border-yellow-400',
                items: [
                    "媽媽洗1個碗", "媽媽講1個story", "多看一集 TV", "多玩樂高 10分鐘", "吃冰淇淋",
                    "媽媽幫我擦桌子", "爸爸幫我洗澡", "爸爸陪我睡", "爸爸洗1個碗", "爸爸幫我擦桌子",
                    "爸爸講1個 story", "爸爸陪我玩一整天", "媽媽陪我玩一整天"
                ]
            },
            mom: {
                color: 'bg-pink-400',
                borderColor: 'border-pink-500',
                avatarBorder: 'border-pink-400',
                items: [
                    "老公抱抱", "老公親親", "老公按摩", "希希多寫一頁數學", "自己獨自出遊一天",
                    "希希收玩具 (客廳)", "希希收玩具 (遊戲室)", "希希倒垃圾 (爸爸陪)", "希希收自己的桌子",
                    "全家玩桌遊", "希希陪媽媽運動", "全家去運動", "老公和我約會", "老公不念我一週", "老公和我做床上運動"
                ]
            },
            dad: {
                color: 'bg-blue-500',
                borderColor: 'border-blue-600',
                avatarBorder: 'border-blue-500',
                items: [
                    "希希收自己的桌子", "希希收玩具 (客廳)", "希希收玩具 (遊戲室)", "媽媽帶希希出去一整天",
                    "全家出遊", "希希倒垃圾 (媽媽陪)", "希希念佛 100次", "希希分享一天在校\n或開心的事",
                    "希希分享一天在校\n或Sad/Angry的事", "再來一次！\n(抽中空白籤 😜)"
                ]
            }
        };

        const ballColors = [
            'linear-gradient(135deg, #ef4444, #991b1b)', // Red
            'linear-gradient(135deg, #3b82f6, #1e3a8a)', // Blue
            'linear-gradient(135deg, #10b981, #064e3b)', // Green
            'linear-gradient(135deg, #f59e0b, #78350f)', // Yellow
            'linear-gradient(135deg, #8b5cf6, #4c1d95)', // Purple
            'linear-gradient(135deg, #ec4899, #831843)'  // Pink
        ];

        let currentMode = 'sisi';
        let isSpinning = false;
        
        // --- API 載入功能 ---
        async function initApp() {
            const loadingText = document.getElementById('loading-text');

            if (GAS_API_URL.trim() !== "") {
                try {
                    const response = await fetch(GAS_API_URL);
                    const sheetData = await response.json();
                    
                    if(sheetData.sisi && sheetData.sisi.length > 0) data.sisi.items = sheetData.sisi;
                    if(sheetData.mom && sheetData.mom.length > 0) data.mom.items = sheetData.mom;
                    if(sheetData.dad && sheetData.dad.length > 0) data.dad.items = sheetData.dad;
                    
                    loadingText.innerText = "資料載入成功！";
                } catch (error) {
                    console.error("無法從 Google Sheets 載入資料，將使用預設內容", error);
                    loadingText.innerText = "無法連線至雲端，使用預設資料";
                }
            } else {
                loadingText.innerText = "準備完畢 (使用預設資料)";
            }

            createBalls();
            setMode('sisi');

            setTimeout(() => {
                const loader = document.getElementById('loading-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.classList.add('hidden'), 500);
            }, 600);
        }

        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playRattleSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function playTadaSound() {
            if(!audioCtx) return;
            const frequencies = [523.25, 659.25, 783.99, 1046.50]; // C E G C
            frequencies.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + i * 0.1 + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.1 + 0.6);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + i * 0.1);
                osc.stop(audioCtx.currentTime + i * 0.1 + 0.6);
            });
        }

        function createBalls() {
            const container = document.getElementById('balls-container');
            container.innerHTML = '';
            for (let i = 0; i < 40; i++) {
                const ball = document.createElement('div');
                ball.className = 'gacha-ball';
                ball.style.width = '40px';
                ball.style.height = '40px';
                ball.style.background = ballColors[Math.floor(Math.random() * ballColors.length)];
                
                const left = 20 + Math.random() * 200;
                const top = 20 + Math.random() * 180;
                
                ball.style.left = `${left}px`;
                ball.style.top = `${top}px`;
                ball.style.transform = `rotate(${Math.random() * 360}deg)`;
                
                container.appendChild(ball);
            }
        }

        function setMode(mode) {
            if (isSpinning) return;
            currentMode = mode;

            document.querySelectorAll('button[id^="btn-"]').forEach(btn => {
                btn.classList.remove('bg-yellow-400', 'bg-pink-400', 'bg-blue-400', 'text-white', 'text-yellow-900', 'text-pink-900', 'text-blue-900', 'shadow-[0_4px_0_#b45309]', 'shadow-[0_4px_0_#be185d]', 'shadow-[0_4px_0_#1d4ed8]');
                btn.classList.add('bg-white', 'opacity-70');
            });

            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.classList.remove('bg-white', 'opacity-70');
            
            document.getElementById('emoji-sisi').classList.add('hidden');
            document.getElementById('emoji-mom').classList.add('hidden');
            document.getElementById('emoji-dad').classList.add('hidden');
            document.getElementById(`emoji-${mode}`).classList.remove('hidden');

            const body = document.getElementById('machine-body');
            const avatarContainer = document.getElementById('avatar-container');
            
            if (mode === 'sisi') {
                activeBtn.classList.add('bg-yellow-400', 'text-yellow-900', 'shadow-[0_4px_0_#b45309]');
                body.className = `w-[300px] h-[220px] absolute top-[250px] rounded-t-3xl rounded-b-xl shadow-2xl transition-colors duration-500 bg-yellow-400 border-4 border-yellow-500 overflow-hidden flex flex-col items-center`;
                avatarContainer.className = `absolute -top-16 z-20 w-32 h-32 bg-white rounded-full border-8 shadow-lg flex items-center justify-center transition-colors duration-300 border-yellow-400 pb-2`;
            } else if (mode === 'mom') {
                activeBtn.classList.add('bg-pink-400', 'text-white', 'shadow-[0_4px_0_#be185d]');
                body.className = `w-[300px] h-[220px] absolute top-[250px] rounded-t-3xl rounded-b-xl shadow-2xl transition-colors duration-500 bg-pink-400 border-4 border-pink-500 overflow-hidden flex flex-col items-center`;
                avatarContainer.className = `absolute -top-16 z-20 w-32 h-32 bg-white rounded-full border-8 shadow-lg flex items-center justify-center transition-colors duration-300 border-pink-400 pb-2`;
            } else {
                activeBtn.classList.add('bg-blue-400', 'text-white', 'shadow-[0_4px_0_#1d4ed8]');
                body.className = `w-[300px] h-[220px] absolute top-[250px] rounded-t-3xl rounded-b-xl shadow-2xl transition-colors duration-500 bg-blue-400 border-4 border-blue-500 overflow-hidden flex flex-col items-center`;
                avatarContainer.className = `absolute -top-16 z-20 w-32 h-32 bg-white rounded-full border-8 shadow-lg flex items-center justify-center transition-colors duration-300 border-blue-400 pb-2`;
            }

            createBalls();
        }

        function spinGacha() {
            if (isSpinning) return;
            initAudio();
            isSpinning = true;

            const knob = document.getElementById('turn-knob');
            const dome = document.getElementById('dome');
            const dispensedBall = document.getElementById('dispensed-ball');
            
            dispensedBall.classList.remove('anim-drop');
            dispensedBall.style.opacity = '0';

            knob.classList.add('anim-spin');
            dome.classList.add('anim-rattle');

            let rattleCount = 0;
            const rattleInterval = setInterval(() => {
                playRattleSound();
                const balls = document.querySelectorAll('.gacha-ball');
                balls.forEach(b => {
                    if(Math.random() > 0.2) {
                        const currentTop = parseFloat(b.style.top);
                        const currentLeft = parseFloat(b.style.left);
                        
                        let newTop = currentTop + (Math.random() * 50 - 25);
                        let newLeft = currentLeft + (Math.random() * 50 - 25);
                        
                        if(newTop < 10) newTop = 20;
                        if(newTop > 230) newTop = 220;
                        if(newLeft < 10) newLeft = 20;
                        if(newLeft > 230) newLeft = 220;

                        b.style.top = newTop + 'px';
                        b.style.left = newLeft + 'px';
                        b.style.transform = `rotate(${Math.random() * 360}deg)`;
                    }
                });
                rattleCount++;
                if (rattleCount > 8) clearInterval(rattleInterval);
            }, 100);

            setTimeout(() => {
                knob.classList.remove('anim-spin');
                dome.classList.remove('anim-rattle');
                
                const randomColor = ballColors[Math.floor(Math.random() * ballColors.length)];
                dispensedBall.style.background = randomColor;
                dispensedBall.classList.add('anim-drop');
                
                setTimeout(() => {
                    playTadaSound();
                    showResult(randomColor);
                }, 600);

            }, 800);
        }

        function showResult(ballColor) {
            const modal = document.getElementById('result-modal');
            const modalResult = document.getElementById('modal-result');
            const modalTitle = document.getElementById('modal-title');
            
            const list = data[currentMode].items;
            let randomItem = "驚喜準備中...";
            
            if (list && list.length > 0) {
                randomItem = list[Math.floor(Math.random() * list.length)];
            } else {
                randomItem = "找不到扭蛋內容 🥺\n請檢查 Google Sheets";
            }
            
            const itemText = String(randomItem);
            modalResult.innerHTML = itemText.replace(/\n/g, '<br>');
            
            let titleText = "恭喜抽中！";
            if(currentMode === 'sisi') titleText = "👦🏻 希希的專屬福利！";
            if(currentMode === 'mom') titleText = "👩🏻 媽媽的專屬福利！";
            if(currentMode === 'dad') titleText = "👨🏻 爸爸的專屬福利！";
            
            modalTitle.innerText = titleText;

            modal.classList.remove('hidden');
            modal.children[0].classList.remove('anim-pop');
            void modal.offsetWidth;
            modal.children[0].classList.add('anim-pop');
        }

        function closeModal() {
            const modal = document.getElementById('result-modal');
            const dispensedBall = document.getElementById('dispensed-ball');
            
            modal.classList.add('hidden');
            dispensedBall.classList.remove('anim-drop');
            dispensedBall.style.opacity = '0';
            isSpinning = false;
            
            createBalls();
        }

        // 起始載入
        window.onload = initApp;
    </script>
</body>
</html>
