<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>女王的考驗 - 互動實驗室</title>
  
  <!-- 【加速秘訣】預先載入本地端的圖片，讓畫面秒開！ -->
  <link rel="preload" href="./queen_index.png" as="image">
  <link rel="preload" href="./queen.png" as="image">

  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 載入 React 與 ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- 載入 Babel 以便在瀏覽器中編譯 JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    /* 隱藏捲軸但保留滾動功能，讓畫面更乾淨 */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(168, 85, 247, 0.5); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(168, 85, 247, 0.8); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 overflow-hidden">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function App() {
      // --- Game State ---
      const [gameState, setGameState] = useState('password'); 
      const [timeLeft, setTimeLeft] = useState(40 * 60); 
      const [budget, setBudget] = useState(1000);
      const [inventory, setInventory] = useState([]);
      const [selectedChem, setSelectedChem] = useState(null);
      const [mixTarget, setMixTarget] = useState(''); 
      const [logs, setLogs] = useState([]);
      const [answers, setAnswers] = useState({});
      const [score, setScore] = useState(0);
      const [dissolvedChems, setDissolvedChems] = useState({}); 
      const [shuffledOptions, setShuffledOptions] = useState([]);

      // 新增：隨機分配的藥品對應表
      const [randomizedChemicals, setRandomizedChemicals] = useState({});

      // --- Student Info & Auth ---
      const CORRECT_PASSWORD = "LovelyQ"; // ★ 老師可以自訂考驗密碼
      const [inputPassword, setInputPassword] = useState('');
      const [pwdError, setPwdError] = useState('');
      const [studentInfo, setStudentInfo] = useState({ className: '', seatNumber: '', name: '' });
      
      // --- Upload State ---
      const [isUploading, setIsUploading] = useState(false);
      const [uploadSuccess, setUploadSuccess] = useState(false);

      // ★★★ 請將您部署好的 GAS 網址貼在這裡 ★★★
      const GAS_URL = "請將您的_GOOGLE_APPS_SCRIPT_網址_貼在這裡"; 

      // --- Base Data Definitions ---
      // 這裡存放的是所有藥品的「真實屬性」，不再綁定特定的代號
      const baseChemicalsData = {
        powders: [
          { real: 'NaOH', name: '氫氧化鈉', desc: '白色固體粉末/顆粒', soluble: '易溶，且水溶液溫度明顯上升', reactionType: '強鹼', type: 'powder' },
          { real: 'CaCO3', name: '碳酸鈣', desc: '白色粉末', soluble: '難溶於水，沉澱在底部', reactionType: '碳酸鹽', type: 'powder' },
          { real: 'NaCl', name: '氯化鈉', desc: '白色結晶粉末', soluble: '易溶於水', reactionType: '中性鹽', type: 'powder' },
          { real: 'C6H12O6', name: '葡萄糖', desc: '白色粉末', soluble: '易溶於水', reactionType: '有機物(非電解質)', type: 'powder' },
          { real: 'CaSO4', name: '硫酸鈣', desc: '白色粉末', soluble: '微溶於水，底部仍有固體', reactionType: '微溶鹽', type: 'powder' },
          { real: 'NaHCO3', name: '碳酸氫鈉', desc: '白色粉末', soluble: '可溶於水', reactionType: '弱鹼性碳酸氫鹽', type: 'powder' }
        ],
        liquids: [
          { real: 'HCl', name: '鹽酸', desc: '無色透明溶液', smell: '無色，微酸味', reactionType: '強酸', type: 'liquid' },
          { real: 'CH3COOH', name: '醋酸', desc: '無色透明溶液', smell: '明顯酸嗆味', reactionType: '弱酸', type: 'liquid' },
          { real: 'Ca(OH)2', name: '氫氧化鈣(石灰水)', desc: '無色透明溶液', smell: '無味', reactionType: '強鹼(溶解度隨溫度下降)', type: 'liquid' },
          { real: 'NH3', name: '氨水', desc: '無色透明溶液', smell: '強烈刺鼻臭味！(女王提醒：請用手煽聞！)', reactionType: '弱鹼(高揮發)', type: 'liquid' },
          { real: 'Na2S2O3', name: '硫代硫酸鈉', desc: '無色透明溶液', smell: '無味', reactionType: '遇酸產生硫沉澱', type: 'liquid' }
        ]
      };

      // --- Initialization (Shuffle) ---
      useEffect(() => {
        // 1. 打亂藥品分配 (將打亂的藥品賦予 A~K 的代號)
        const shuffleArray = (array) => {
          const newArray = [...array];
          for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
          }
          return newArray;
        };

        const shuffledPowders = shuffleArray(baseChemicalsData.powders);
        const shuffledLiquids = shuffleArray(baseChemicalsData.liquids);

        const newChemicalsMap = {};
        const powderIds = ['A', 'B', 'C', 'D', 'E', 'F'];
        const liquidIds = ['G', 'H', 'I', 'J', 'K'];

        shuffledPowders.forEach((chem, index) => {
          newChemicalsMap[powderIds[index]] = { ...chem, id: powderIds[index] };
        });

        shuffledLiquids.forEach((chem, index) => {
          newChemicalsMap[liquidIds[index]] = { ...chem, id: liquidIds[index] };
        });

        setRandomizedChemicals(newChemicalsMap);

        // 2. 打亂下拉選單的選項
        const allOptions = [
            ...baseChemicalsData.powders.map(c => ({ name: c.name, real: c.real })),
            ...baseChemicalsData.liquids.map(c => ({ name: c.name, real: c.real }))
        ];
        setShuffledOptions(shuffleArray(allOptions));

      }, []);

      const formatFormula = (formula) => {
        if (!formula) return '';
        const subscripts = { '0': '₀', '1': '₁', '2': '₂', '3': '₃', '4': '₄', '5': '₅', '6': '₆', '7': '₇', '8': '₈', '9': '₉' };
        return formula.replace(/\d/g, m => subscripts[m]);
      };

      const shopItems = [
        { id: 'litmus_red', name: '紅色石蕊試紙', price: 250, icon: '📜', action: 'test_litmus_red' },
        { id: 'litmus_blue', name: '藍色石蕊試紙', price: 250, icon: '📜', action: 'test_litmus_blue' },
        { id: 'phenolphthalein', name: '酚酞溶液', price: 250, icon: '🧪', action: 'test_phenolphthalein' },
        { id: 'mg_ribbon', name: '鎂帶', price: 150, icon: '🎗️', action: 'test_mg' },
        { id: 'circuit', name: '導電測試模組', price: 300, icon: '⚡', action: 'test_circuit' },
        { id: 'straw', name: '吸管', price: 400, icon: '🧃', action: 'test_straw' },
        { id: 'universal', name: '廣用試劑', price: 500, icon: '🌈', action: 'test_universal' },
        { id: 'heater', name: '加熱裝置', price: 400, icon: '🔥', action: 'test_heat' },
      ];

      // --- Timer Logic ---
      useEffect(() => {
        let timer;
        if (gameState === 'playing' && timeLeft > 0) {
          timer = setInterval(() => {
            setTimeLeft(prev => prev - 1);
          }, 1000);
        } else if (timeLeft <= 0 && gameState === 'playing') {
          endGame();
        }
        return () => clearInterval(timer);
      }, [gameState, timeLeft]);

      const formatTime = (seconds) => {
        const m = Math.floor(seconds / 60);
        const s = seconds % 60;
        return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
      };

      const addLog = (message) => {
        setLogs(prev => [`[${formatTime(timeLeft)}] ${message}`, ...prev]);
      };

      // --- Auth Handlers ---
      const handlePasswordSubmit = (e) => {
        e.preventDefault();
        if (inputPassword === CORRECT_PASSWORD) {
          setPwdError('');
          setGameState('login');
        } else {
          setPwdError('密碼錯誤，請重新輸入！');
        }
      };

      const handleLoginSubmit = (e) => {
        e.preventDefault();
        if (studentInfo.className && studentInfo.seatNumber && studentInfo.name) {
          setGameState('intro');
        } else {
          alert("請填寫完整資料！");
        }
      };

      const buyItem = (item) => {
        if (budget >= item.price) {
          if (inventory.some(i => i.id === item.id)) {
            addLog(`你已經擁有 ${item.name} 了！`);
            return;
          }
          setBudget(prev => prev - item.price);
          setInventory(prev => [...prev, item]);
          addLog(`購買了 ${item.name} (花費 $${item.price})`);
        } else {
          addLog(`籌碼不足，無法購買 ${item.name}！`);
        }
      };

      const handleMix = () => {
        if (!mixTarget || !selectedChem) return;
        
        const chem1 = randomizedChemicals[selectedChem];
        const chem2 = randomizedChemicals[mixTarget];
        
        if (!chem1 || !chem2) return;

        const real1 = chem1.real;
        const real2 = chem2.real;

        const isPowder1 = chem1.type === 'powder' && !dissolvedChems[selectedChem];
        const isPowder2 = chem2.type === 'powder' && !dissolvedChems[mixTarget];

        if (isPowder1 && isPowder2) {
           addLog(`將 ${selectedChem} 粉末與 ${mixTarget} 粉末混合：【無明顯反應】。(女王提示：固體之間難以反應，請先加水溶解喔！)`);
           setMixTarget('');
           return;
        }

        const pair = [real1, real2];
        const hasAcid = pair.includes('HCl') || pair.includes('CH3COOH');
        const hasCarbonate = pair.includes('CaCO3') || pair.includes('NaHCO3');
        const hasBase = pair.includes('NaOH') || pair.includes('Ca(OH)2') || pair.includes('NH3');
        const hasThio = pair.includes('Na2S2O3');
        
        let resultStr = `將 ${selectedChem} 與 ${mixTarget} 混合：`;

        if (hasAcid && hasCarbonate) {
           resultStr += `產生【大量氣泡】！`;
        } else if (hasAcid && hasThio) {
           resultStr += `溶液逐漸產生【黃色混濁沉澱】，並伴隨【刺鼻臭味】！`;
        } else if (hasAcid && hasBase) {
           resultStr += `外觀無明顯變化，但燒杯摸起來【微熱】。`;
        } else if (pair.includes('Ca(OH)2') && pair.includes('NaHCO3')) {
           resultStr += `產生【白色沉澱】！`;
        } else if (pair.includes('CaCO3') || pair.includes('CaSO4')) {
           resultStr += `溶液中含有難溶固體，呈現【混濁狀態】。`;
        } else {
           resultStr += `混合後，【無明顯外觀變化】。`;
        }

        addLog(resultStr);
        setMixTarget(''); 
      };

      const executeAction = (chemId, action) => {
        const chem = randomizedChemicals[chemId];
        if (!chem) return;

        let result = '';

        if (action === 'observe') {
          result = `觀察 ${chemId}: ${chem.desc}。`;
        } else if (action === 'smell') {
          if (chem.type === 'liquid') {
            result = `煽聞 ${chemId}: 氣味是「${chem.smell}」。`;
          } else {
            result = `煽聞 ${chemId}: 粉末無明顯氣味，請小心不要吸入粉塵！`;
          }
        } else if (action === 'add_water') {
          if (chem.type === 'powder') {
            setDissolvedChems(prev => ({ ...prev, [chemId]: true }));
            result = `將水加入 ${chemId}：${chem.soluble}。`;
          } else {
            result = `將水加入 ${chemId}：溶液被稀釋了，外觀無明顯變化。`;
          }
        } 
        else if (action === 'test_litmus_red') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            result = `直接測試 ${chemId} 粉末，紅色石蕊試紙【不變色】。(女王提示：乾燥粉末無法解離出離子，請先加水喔！)`;
          } else {
            const bases = ['NaOH', 'NaHCO3', 'Ca(OH)2', 'NH3'];
            if (bases.includes(chem.real)) result = `${chemId} 讓紅色石蕊試紙變為【藍色】！`;
            else result = `${chemId} 測試後，紅色石蕊試紙【不變色】。`;
          }
        } else if (action === 'test_litmus_blue') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            result = `直接測試 ${chemId} 粉末，藍色石蕊試紙【不變色】。(女王提示：乾燥粉末無法解離出離子，請先加水喔！)`;
          } else {
            const acids = ['HCl', 'CH3COOH'];
            if (acids.includes(chem.real)) result = `${chemId} 讓藍色石蕊試紙變為【紅色】！`;
            else result = `${chemId} 測試後，藍色石蕊試紙【不變色】。`;
          }
        } else if (action === 'test_phenolphthalein') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            result = `滴入酚酞至 ${chemId} 粉末上，呈現【無色】。(女王提示：乾燥粉末無法表現酸鹼性，請先加水喔！)`;
          } else {
            const bases = ['NaOH', 'NaHCO3', 'Ca(OH)2', 'NH3'];
            if (bases.includes(chem.real)) result = `滴入酚酞，${chemId} 呈現【粉紅色/紅色】！`;
            else result = `滴入酚酞，${chemId} 呈現【無色】。`;
          }
        } else if (action === 'test_mg') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            result = `投入鎂帶至 ${chemId} 粉末，【無明顯反應】。(女王提示：請先加水溶解成水溶液！)`;
          } else {
            const acids = ['HCl', 'CH3COOH'];
            if (acids.includes(chem.real)) result = `投入鎂帶，${chemId} 【產生大量氣泡】！`;
            else result = `投入鎂帶，${chemId} 【無明顯反應】。`;
          }
        } else if (action === 'test_circuit') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            result = `插入電極至固體粉末，燈泡【不亮】。(女王提示：固體晶體無法導電，請先加水解離！)`;
          } else {
            const nonelectrolytes = ['C6H12O6'];
            const weak = ['CH3COOH', 'NH3'];
            const slightlySoluble = ['CaCO3', 'CaSO4']; 
            
            if (nonelectrolytes.includes(chem.real)) result = `插入電極，燈泡【不亮】。`;
            else if (weak.includes(chem.real) || (chem.type === 'powder' && slightlySoluble.includes(chem.real))) result = `插入電極，燈泡【微亮/不亮】。`;
            else result = `插入電極，燈泡【明亮】！`;
          }
        } else if (action === 'test_straw') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            result = `用吸管對著 ${chemId} 粉末吹氣，粉末飛散！(女王提示：請先加水溶解，並小心不要吹起粉塵！)`;
          } else if (chem.real === 'Ca(OH)2') {
            result = `用吸管吹氣入 ${chemId} 中，溶液產生【白色混濁】！`;
          } else {
            result = `用吸管吹氣入 ${chemId} 中，產生氣泡後破裂，溶液【無明顯變化】。`;
          }
        } else if (action === 'test_universal') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            result = `滴入廣用試劑至 ${chemId} 粉末上，呈現試劑原本的【綠色】。(女王提示：乾燥粉末無法解離，請先加水喔！)`;
          } else {
            const real = chem.real;
            if (real === 'HCl') result = `滴入廣用試劑，${chemId} 呈現【紅色】！`;
            else if (real === 'CH3COOH') result = `滴入廣用試劑，${chemId} 呈現【橙黃色】！`;
            else if (['NaOH', 'Ca(OH)2'].includes(real)) result = `滴入廣用試劑，${chemId} 呈現【藍紫色/紫色】！`;
            else if (['NaHCO3', 'NH3'].includes(real)) result = `滴入廣用試劑，${chemId} 呈現【藍色/藍綠色】！`;
            else result = `滴入廣用試劑，${chemId} 呈現【綠色】。`;
          }
        } else if (action === 'test_heat') {
          if (chem.type === 'powder' && !dissolvedChems[chemId]) {
            if (chem.real === 'C6H12O6') {
              result = `架設加熱裝置(含酒精燈與陶瓷纖維網)加熱 ${chemId} 粉末：粉末逐漸熔化、變為深褐色，並產生【焦糖味】！`;
            } else if (chem.real === 'NaHCO3') {
              result = `架設加熱裝置(含酒精燈與陶瓷纖維網)加熱 ${chemId} 粉末：粉末本身無明顯變化，但杯壁上方觀察到【水滴凝結】。`;
            } else {
              result = `架設加熱裝置持續加熱 ${chemId} 粉末：【無明顯外觀變化】。`;
            }
          } else {
            const volatile = ['HCl', 'CH3COOH', 'NH3'];
            if (volatile.includes(chem.real)) {
              result = `架設加熱裝置加熱 ${chemId}：溶液沸騰，並揮發出【強烈刺鼻/酸嗆氣味】！(女王警告：危險！請移至通風櫥操作！)`;
            } else if (chem.real === 'Ca(OH)2') {
              result = `架設加熱裝置加熱 ${chemId}：溶液沸騰，溶液漸漸變為【白色混濁】！`;
            } else {
              result = `架設加熱裝置加熱 ${chemId}：溶液沸騰，水分逐漸蒸發，最後杯底【析出固體結晶/殘留物】。`;
            }
          }
        }

        addLog(result);
      };

      const handleAnswerChange = (chemId, value) => {
        setAnswers(prev => ({ ...prev, [chemId]: value }));
      };

      const endGame = () => {
        setGameState('result');
      };

      // --- Upload Score Logic ---
      const uploadScore = async () => {
        setIsUploading(true);
        let finalScore = 0;
        
        // 分數不再是寫死的，而是要比對隨機分配後的真實物質
        const scoreMap = { 
            'NaOH': 50, 'CaCO3': 30, 'NaCl': 40, 'C6H12O6': 60, 'CaSO4': 40, 'NaHCO3': 50,
            'HCl': 10, 'CH3COOH': 30, 'Ca(OH)2': 40, 'NH3': 10, 'Na2S2O3': 60
        };
        
        Object.keys(randomizedChemicals).forEach(id => {
          const chem = randomizedChemicals[id];
          if (answers[id] === chem.name) {
            finalScore += scoreMap[chem.real] || 30;
          }
        });
        
        const calculatedTotal = ((finalScore * 0.98) + (budget * 0.02)).toFixed(1);
        setScore(finalScore);

        if(GAS_URL === "請將您的_GOOGLE_APPS_SCRIPT_網址_貼在這裡") {
            alert("⚠️ 教師提醒：請先在程式碼中填寫 Google Apps Script 網址，才能上傳成績喔！");
            setIsUploading(false);
            return;
        }

        try {
          const response = await fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({
              className: studentInfo.className,
              seatNumber: studentInfo.seatNumber,
              studentName: studentInfo.name,
              finalScore: calculatedTotal
            }),
            headers: {
              'Content-Type': 'text/plain;charset=utf-8',
            }
          });
          
          const result = await response.json();
          if (result.result === 'success') {
            setUploadSuccess(true);
          } else {
            alert("上傳成績失敗，請呼叫女王協助！");
          }
        } catch (error) {
          console.error('Error:', error);
          alert("網路連線錯誤，成績上傳失敗！");
        }
        setIsUploading(false);
      };

      // --- Components ---
      
      // 1. 密碼頁面
      if (gameState === 'password') {
        return (
          <div className="h-screen w-screen bg-slate-900 flex items-center justify-center font-sans" style={{ backgroundImage: 'url("./queen_index.png")', backgroundSize: 'cover', backgroundPosition: 'center' }}>
            <div className="absolute inset-0 bg-black/60 z-0"></div>
            <div className="bg-black/80 p-10 rounded-2xl border-2 border-purple-500 shadow-[0_0_40px_rgba(168,85,247,0.5)] z-10 w-full max-w-md text-center backdrop-blur-sm">

                    </div>
                  </div>

                </div>
              </div>
