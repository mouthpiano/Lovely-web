        }
        .pop-in {
            animation: popIn 0.3s ease-out forwards;
        }
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .tag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 0.5rem;
        }
        .spinner {
            border: 4px solid rgba(22, 163, 74, 0.2);
            border-radius: 50%;
            border-top: 4px solid #16a34a;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* 固定浮水印樣式 */
        .watermark {
            position: fixed;
            right: 8px;
            font-size: 10px;
            color: #9ca3af; /* 灰色 */
            z-index: 9999;
            pointer-events: none; /* 不影響點擊 */

            line-height: 1.2;

        function App() {
            const [page, setPage] = useState('home');
            const [teamInfo, setTeamInfo] = useState({ class: '', group: '', members: '', version: 'kangxuan' });
            const [gameData, setGameData] = useState(null); // { questions, totalScore, history }

            const handleStartGame = (info) => {
                setTeamInfo(info);
                setPage('game');
            };

            const handleGameEnd = (finalData) => {
                setGameData(finalData);
                setPage('result');
            };

            return (
                <div className="min-h-screen pb-10 relative">
                    {/* 浮水印 - 右上角 */}
                    <div className="watermark" style={{ top: '8px' }}>
                        Designed by 黃鈺心<br/>Gemini Canvas輔助生成
                    </div>
                    {/* 浮水印 - 右下角 */}

                    </div>

                    <header className="bg-green-700 text-white p-4 shadow-md sticky top-0 z-50">

                            <h1 className="text-2xl font-bold tracking-wider">🧪 酸鹼鹽大搜查</h1>
                            {page !== 'home' && (
                                <div className="text-sm bg-green-800 px-3 py-1 rounded border border-green-600 mr-24">
                                    {teamInfo.class}班 第{teamInfo.group}號
                                </div>
                            )}
                        </div>
                    </header>

                    <main className="container mx-auto p-4">
                        {page === 'home' && <HomePage onStart={handleStartGame} />}
                        {page === 'game' && <GamePage onEnd={handleGameEnd} teamInfo={teamInfo} />}
                        {page === 'result' && <ResultPage gameData={gameData} teamInfo={teamInfo} onRestart={() => setPage('home')} />}
                    </main>
                </div>
            );
        }

        function HomePage({ onStart }) {
            const [info, setInfo] = useState({ class: '', group: '', members: '', version: 'kangxuan' });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!info.class || !info.group || !info.members) {
                    alert('請填寫完整班級、座號與姓名資訊！');
                    return;
                }
                onStart(info);
            };

            return (
                <div className="max-w-md mx-auto bg-white rounded-xl shadow-lg p-8 mt-10 pop-in border-t-4 border-green-600">
                    <h2 className="text-2xl font-bold text-center mb-6 text-gray-800">🏆 化學偵探就是我</h2>
                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div>
                            <label className="block text-gray-700 font-bold mb-2">班級</label>
                            <input type="text" placeholder="例如：801" className="w-full border p-3 rounded-lg focus:outline-none focus:border-green-500" value={info.class} onChange={e => setInfo({...info, class: e.target.value})} />
                        </div>
                        <div>
                            <label className="block text-gray-700 font-bold mb-2">座號</label>
                            <input type="number" placeholder="例如：3" className="w-full border p-3 rounded-lg focus:outline-none focus:border-green-500" value={info.group} onChange={e => setInfo({...info, group: e.target.value})} />
                        </div>
                        <div>
                            <label className="block text-gray-700 font-bold mb-2">姓名</label>
                            <input type="text" placeholder="例如：伊百芬" className="w-full border p-3 rounded-lg focus:outline-none focus:border-green-500" value={info.members} onChange={e => setInfo({...info, members: e.target.value})} />
                        </div>
                        
                        <div className="pt-2">
                            <label className="block text-gray-700 font-bold mb-2">題庫版本選擇</label>
                            <div className="flex flex-col gap-3 bg-gray-50 p-4 rounded-lg border border-gray-200">
                                <label className="flex items-center cursor-pointer">
                                    <input type="radio" name="version" value="kangxuan" checked={info.version === 'kangxuan'} onChange={e => setInfo({...info, version: e.target.value})} className="mr-3 w-5 h-5 text-green-600 focus:ring-green-500" />
                                    <span className="text-gray-800 font-bold">康軒版 <span className="text-sm font-normal text-gray-500 ml-1">(不含碳酸鉀、硝酸)</span></span>
                                </label>
                                <label className="flex items-center cursor-pointer">
                                    <input type="radio" name="version" value="full" checked={info.version === 'full'} onChange={e => setInfo({...info, version: e.target.value})} className="mr-3 w-5 h-5 text-green-600 focus:ring-green-500" />
                                    <span className="text-gray-800 font-bold">完整版 <span className="text-sm font-normal text-gray-500 ml-1">(全範圍挑戰)</span></span>
                                </label>
                            </div>
                        </div>

                        <button type="submit" className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg text-lg shadow mt-4 transition transform active:scale-95">開始挑戰 (10題)</button>
                    </form>
                    <div className="mt-6 p-4 bg-yellow-50 rounded-lg text-sm text-yellow-800">
                        <p className="font-bold mb-1">⚠️ 測驗規則：</p>
                        <ul className="list-disc pl-5">
                            <li>過程中不會顯示對錯，請謹慎作答！</li>
                            <li>完全正確選出：<span className="font-bold text-green-600">+2 分</span></li>
                            <li>該選而未選：<span className="font-bold text-red-500">-1 分</span></li>
                            <li>選錯特性：<span className="font-bold text-red-600">-2 分</span></li>
                            <li><span className="font-bold text-blue-600">成績必須成功上傳至雲端，才能解鎖最終解答！</span></li>
                        </ul>
                    </div>
                </div>
            );
        }

        function GamePage({ onEnd, teamInfo }) {
            const [questions, setQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [selectedTags, setSelectedTags] = useState(new Set());
            const [totalScore, setTotalScore] = useState(0);
            const [gameHistory, setGameHistory] = useState([]);

            useEffect(() => {
                let dbToUse = ELEMENTS_DB;
                if (teamInfo.version === 'kangxuan') {
                    dbToUse = dbToUse.filter(e => !e.name.includes('碳酸鉀') && !e.name.includes('硝酸'));
                }
                const shuffled = [...dbToUse].sort(() => 0.5 - Math.random());
                setQuestions(shuffled.slice(0, 10)); // 隨機抽 10 題
            }, []);

            const currentElement = questions[currentQIndex];

            const toggleTag = (tagId) => {
                const newSet = new Set(selectedTags);
                newSet.has(tagId) ? newSet.delete(tagId) : newSet.add(tagId);
                setSelectedTags(newSet);
            };

            const handleSubmitAndNext = () => {
                const correctTagIds = new Set(currentElement.tags.map(t => t.id));
                const userTagIds = selectedTags;

                let roundPoints = 0;
                let details = { correct: [], missed: [], wrong: [] };

                userTagIds.forEach(id => {
                    if (correctTagIds.has(id)) {
                        roundPoints += 2;
                        details.correct.push(id);
                    } else {
                        roundPoints -= 2;
                        details.wrong.push(id);
                    }
                });

                correctTagIds.forEach(id => {
                    if (!userTagIds.has(id)) {
                        roundPoints -= 1;
                        details.missed.push(id);
                    }
                });

                const newTotal = totalScore + roundPoints;
                setTotalScore(newTotal);
                
                const newHistory = [...gameHistory, { 
                    element: currentElement.name, 
                    score: roundPoints,
                    details: details,
                    correctTags: currentElement.tags
                }];
                setGameHistory(newHistory);

                if (currentQIndex < questions.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                    setSelectedTags(new Set());
                } else {
                    onEnd({ questions, totalScore: newTotal, history: newHistory });
                }
            };

            if (!currentElement) return <div className="text-center mt-20 font-bold text-xl text-gray-500">準備題庫中...</div>;

            const categories = {};
            const categoryOrder = ['特性描述(A長條)', '特性描述(B長條)', '特性描述(C長條)', '兩字', '三字', '四字'];
            
            Object.values(TAGS).forEach(tag => {
                if (!categories[tag.category]) categories[tag.category] = [];
                categories[tag.category].push(tag);
            });

            return (
                <div className="flex flex-col lg:flex-row gap-6">
                    <div className="w-full lg:w-1/4">
                        <div className="bg-white rounded-xl shadow-lg p-6 sticky top-24 border-t-8 border-green-500">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-xs font-bold bg-gray-200 px-2 py-1 rounded text-gray-600">第 {currentQIndex + 1} / {questions.length} 題</span>
                                <span className="text-xs text-red-500 font-bold animate-pulse">作答中...</span>
                            </div>
                            
                            <div className="text-center py-10 bg-green-50 rounded-lg mb-4 border border-green-200">
                                <h3 className="text-3xl font-black text-gray-800 leading-tight">{currentElement.name}</h3>
                                <p className="text-gray-500 mt-2 text-sm font-bold">請選出右側所有符合的描述</p>
                            </div>

                            <button onClick={handleSubmitAndNext} className="w-full bg-green-600 hover:bg-green-700 text-white text-xl font-bold py-4 rounded-lg shadow-md transition transform active:scale-95">
                                {currentQIndex < questions.length - 1 ? '儲存並換下一題' : '交卷並結算成績'}
                            </button>
                        </div>
                    </div>

                    <div className="w-full lg:w-3/4">
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <div className="space-y-6">
                                {categoryOrder.map(catName => {
                                    if (!categories[catName]) return null;
                                    return (
                                        <div key={catName} className="border-b border-gray-100 pb-4 last:border-0">
                                            <h4 className="font-bold text-slate-700 mb-3 flex items-center">
                                                <span className="w-2 h-6 bg-green-500 mr-2 rounded-full"></span>
                                                {catName}
                                            </h4>
                                            <div className="tag-grid">
                                                {categories[catName].map(tag => {
                                                    const isSelected = selectedTags.has(tag.id);
                                                    let btnClass = "border text-sm p-2 rounded transition text-left relative ";
                                                    
                                                    if (isSelected) {
                                                        btnClass += "bg-green-600 text-white border-green-700 shadow-md transform scale-105 z-10";
                                                    } else {
                                                        btnClass += "bg-white text-gray-700 hover:bg-green-50 hover:border-green-300";
                                                    }

                                                    return (
                                                        <button key={tag.id} onClick={() => toggleTag(tag.id)} className={btnClass}>
                                                            {tag.text}
                                                        </button>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ResultPage({ gameData, teamInfo, onRestart }) {
            const [uploadStatus, setUploadStatus] = useState('uploading'); // uploading, success, error

            const handleUpload = async () => {
                if (!GOOGLE_SCRIPT_URL) {
                    // 若老師尚未設定 URL，三秒後模擬成功以便測試
                    setTimeout(() => setUploadStatus('success'), 2000);
                    return;
                }

                setUploadStatus('uploading');
                try {
                    const response = await fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain;charset=utf-8',
                        },
                        body: JSON.stringify({
                            class: teamInfo.class,
                            group: teamInfo.group,
                            members: teamInfo.members,
                            score: gameData.totalScore
                        })
                    });

                    if (response.ok) {
                        setUploadStatus('success');
                    } else {
                        setUploadStatus('error');
                    }
                } catch (error) {
                    console.error("Upload error:", error);
                    setUploadStatus('error');
                }
            };

            useEffect(() => {
                if (uploadStatus === 'uploading') {
                    handleUpload();
                }
            }, []);

            // 鎖定畫面：若還沒上傳成功，不顯示成績
            if (uploadStatus === 'uploading') {
                return (
                    <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-16 mt-16 text-center pop-in border-t-8 border-green-500">
                        <div className="spinner mx-auto mb-6"></div>
                        <h2 className="text-3xl font-bold text-gray-800 mb-4">成績結算與雲端上傳中...</h2>
                        <p className="text-gray-500 text-lg">必須等待成績寫入教師資料庫，才會解鎖解答喔！請稍候...</p>
                        {!GOOGLE_SCRIPT_URL && <p className="text-red-500 text-sm mt-4">(尚未設定 Google Apps Script URL，目前為測試模式，2秒後自動解鎖)</p>}
                    </div>
                );
            }

            if (uploadStatus === 'error') {
                return (
                    <div className="max-w-2xl mx-auto bg-white rounded-xl shadow-2xl p-16 mt-16 text-center pop-in border-t-8 border-red-500">
                        <div className="text-6xl mb-4">📶</div>
                        <h2 className="text-3xl font-bold text-gray-800 mb-4">上傳失敗！網路連線異常</h2>
                        <p className="text-gray-500 text-lg mb-8">請檢查網路後重新嘗試，成績上傳成功才能看解答！</p>
                        <button onClick={handleUpload} className="bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition">
                            🔄 重新上傳成績
                        </button>
                    </div>
                );
            }

            // 成功畫面
            return (
                <div className="max-w-4xl mx-auto bg-white rounded-xl shadow-2xl p-8 mt-6 pop-in">
                    <div className="text-center mb-8 border-b pb-6">
                        <div className="inline-block bg-green-100 text-green-700 px-4 py-1 rounded-full text-sm font-bold mb-4">
                            ✅ 雲端成績登錄成功
                        </div>
                        <h2 className="text-3xl font-bold text-gray-800 mb-2">{teamInfo.class}班 第{teamInfo.group}號</h2>
                        <p className="text-gray-500 text-lg mb-6">{teamInfo.members}</p>

                        <div className="p-6 bg-slate-50 rounded-xl inline-block min-w-[300px] border border-slate-200">
                            <p className="text-gray-600 font-bold">本次測驗總得分</p>
                            <p className={`text-7xl font-black my-2 ${gameData.totalScore >= 60 ? 'text-green-600' : (gameData.totalScore >= 30 ? 'text-yellow-600' : 'text-red-600')}`}>
                                {gameData.totalScore}
                            </p>
                        </div>
                    </div>

                    <h3 className="text-xl font-bold text-gray-800 mb-4 flex items-center">
                        <span className="bg-blue-500 w-2 h-6 rounded-full mr-2"></span>
                        詳細解答分析
                    </h3>
                    
                    <div className="space-y-4 mb-8">
                        {gameData.history.map((h, idx) => (
                            <div key={idx} className="border border-gray-200 rounded-lg p-4 bg-gray-50">
                                <div className="flex justify-between items-center mb-3">
                                    <h4 className="font-bold text-lg text-gray-800">Q{idx + 1}. {h.element}</h4>
                                    <span className={`font-bold text-lg ${h.score >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                        得分: {h.score > 0 ? '+' : ''}{h.score}
                                    </span>
                                </div>
                                <div className="text-sm">
                                    <p className="text-gray-600 mb-1"><span className="font-bold text-blue-600">正確特性應包含：</span></p>
                                    <div className="flex flex-wrap gap-1 mb-2">
                                        {h.correctTags.map(t => (
                                            <span key={t.id} className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">{t.text}</span>
                                        ))}
                                    </div>
                                    
                                    {(h.details.missed.length > 0 || h.details.wrong.length > 0) && (
                                        <div className="mt-3 pt-3 border-t border-gray-200">
                                            {h.details.missed.length > 0 && (
                                                <p className="text-red-500 mb-1 text-xs"><span className="font-bold">漏選 (-1分/個)：</span> 
                                                    {h.details.missed.map(id => Object.values(TAGS).find(t=>t.id===id).text).join('、')}
                                                </p>
                                            )}
                                            {h.details.wrong.length > 0 && (
                                                <p className="text-red-700 text-xs"><span className="font-bold">選錯 (-2分/個)：</span> 
                                                    {h.details.wrong.map(id => Object.values(TAGS).find(t=>t.id===id).text).join('、')}
                                                </p>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="text-center">
                        <button onClick={onRestart} className="bg-slate-700 hover:bg-slate-800 text-white font-bold py-3 px-10 rounded-full text-lg shadow-lg transition transform hover:scale-105">
                            回到首頁 / 換人挑戰
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
