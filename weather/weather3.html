                            </div>
                        </div>`,
                    options: allAqiOptions.map(o => o.text),
                    correctAnswer: correctQ10,
                    explanation: `目前臺南 AQI 數值為 ${aqi}，落在${aqiColorName}燈號（${aqiName}）。${windDescText}`
                };

                // 加入題庫
                quizData.push(dynamicQ5, dynamicQ6, dynamicQ7, dynamicQ8, dynamicQ9, dynamicQ10);
                
            } catch (error) {
                console.log("無法獲取即時資料", error);
            }
        }

        // DOM 元素
        const scenarioText = document.getElementById('scenario-text');
        const questionText = document.getElementById('question-text');
        const imageContainer = document.getElementById('image-container');
        const optionsContainer = document.getElementById('options-container');
        const feedbackContainer = document.getElementById('feedback-container');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const feedbackIcon = document.getElementById('feedback-icon');
        const nextBtn = document.getElementById('next-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressText = document.getElementById('progress-text');
        const quizContainer = document.getElementById('quiz-container');
        const resultContainer = document.getElementById('result-container');

        // 初始化遊戲 (加入非同步載入畫面控制)
        async function initGame() {
            currentQuestion = 0; score = 0;
            quizContainer.classList.add('hidden'); 
            resultContainer.classList.add('hidden');
            
            // 顯示載入中動畫
            document.getElementById('loading-container').classList.remove('hidden');
            
            // 確保只抓一次資料
            if (quizData.length === 4) {
                await fetchRealtimeWeather();
            }
            
            // 隱藏載入中，顯示測驗
            document.getElementById('loading-container').classList.add('hidden');
            quizContainer.classList.remove('hidden');
            loadQuestion();
        }

        // 載入題目
        function loadQuestion() {
            const data = quizData[currentQuestion];
            const progress = ((currentQuestion) / quizData.length) * 100;
            progressBar.style.width = `${progress}%`;
            progressText.innerText = `題數：${currentQuestion + 1} / ${quizData.length}`;
            scenarioText.innerText = data.scenario;
            questionText.innerText = data.question;
            imageContainer.innerHTML = data.mapSVG;
            feedbackContainer.classList.add('hidden');
            optionsContainer.innerHTML = '';
            
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full text-left p-4 rounded-xl border border-slate-200 bg-white shadow-sm font-medium text-slate-700 hover:shadow-md';
                btn.innerHTML = `<div class="flex items-center"><span class="flex-shrink-0 w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 font-bold mr-3">${String.fromCharCode(65 + index)}</span> <div class="leading-normal">${opt}</div></div>`;
                btn.onclick = () => checkAnswer(index, btn);
                optionsContainer.appendChild(btn);
            });
        }

        // 檢查答案
        function checkAnswer(selectedIndex, btnElement) {
            const data = quizData[currentQuestion];
            const isCorrect = selectedIndex === data.correctAnswer;
            const allBtns = optionsContainer.querySelectorAll('button');
            allBtns.forEach(btn => btn.disabled = true);
            btnElement.classList.add('selected');
            if (isCorrect) {
                btnElement.classList.add('correct');
                score++;
                showFeedback(true, data.explanation);
            } else {
                btnElement.classList.add('wrong');
                allBtns[data.correctAnswer].classList.add('correct');
                showFeedback(false, data.explanation);
            }
        }

        // 顯示回饋
        function showFeedback(isCorrect, explanation) {
            feedbackContainer.classList.remove('hidden');
            feedbackContainer.classList.remove('bg-green-50', 'border-green-200', 'bg-red-50', 'border-red-200');
            if (isCorrect) {
                feedbackContainer.classList.add('bg-green-50', 'border-green-200');
                feedbackIcon.innerHTML = '<i class="fa-solid fa-circle-check text-green-500"></i>';
                feedbackTitle.innerText = "推理正確！";
                feedbackTitle.className = "font-bold text-lg mb-1 text-green-700";
            } else {
                feedbackContainer.classList.add('bg-red-50', 'border-red-200');
                feedbackIcon.innerHTML = '<i class="fa-solid fa-circle-xmark text-red-500"></i>';
                feedbackTitle.innerText = "案情並不單純！";
                feedbackTitle.className = "font-bold text-lg mb-1 text-red-700";
            }
            feedbackText.innerText = explanation;
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            if (currentQuestion < quizData.length) loadQuestion();
            else showResult();
        };

        // 結算與成績上傳
        async function showResult() {
            quizContainer.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            progressBar.style.width = `100%`;

            const finalScore = score * 10; // 每題 10 分

            // 顯示上傳中的動畫
            resultContainer.innerHTML = `
                <div class="py-16 text-center">
                    <i class="fa-solid fa-cloud-arrow-up fa-bounce text-6xl text-blue-500 mb-6"></i>
                    <h2 class="text-3xl font-bold text-slate-800 mb-2">正在結算並上傳成績...</h2>
                    <p class="text-slate-500 font-medium">請稍候，不要關閉網頁</p>
                </div>
            `;

            // 呼叫 Google Sheets API 上傳成績 (使用 no-cors 模式避免跨域阻擋)
            if (GAS_API_URL && GAS_API_URL.startsWith("http")) {
                try {
                    const uploadUrl = `${GAS_API_URL}?action=upload&class=${encodeURIComponent(studentInfo.class)}&seat=${encodeURIComponent(studentInfo.seat)}&name=${encodeURIComponent(studentInfo.name)}&score=${finalScore}`;
                    await fetch(uploadUrl, { method: 'GET', mode: 'no-cors' });
                } catch (e) {
                    console.log("成績上傳過程發生異常:", e);
                }
            }

            // 為了讓學生看到上傳的過場動畫，稍微延遲 1.5 秒後再顯示最終成績
            setTimeout(() => {
                renderFinalResult(finalScore);
            }, 1500);
        }

        // 渲染最終成績單畫面
        function renderFinalResult(finalScore) {
            let rank = ""; let colorClass = ""; const total = quizData.length;
            if (score === total) { rank = "福爾摩斯級氣象大師！"; colorClass = "text-yellow-600"; } 
            else if (score >= total - 2) { rank = "優秀的氣象預報員！"; colorClass = "text-blue-600"; } 
            else { rank = "實習氣象觀測員！"; colorClass = "text-slate-600"; }
            
            document.getElementById('result-container').innerHTML = `
                <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-4"></i>
                <h2 class="text-3xl font-bold text-slate-800 mb-2">挑戰完成！</h2>
                <p class="text-xl text-slate-600 mb-4">你的偵探階級是：<span class="font-bold ${colorClass} text-2xl">${rank}</span></p>
                
                <!-- 成績單卡片 -->
                <div class="bg-slate-50 rounded-2xl p-6 my-6 inline-block text-left border-2 border-slate-200 shadow-md">
                    <p class="text-lg text-slate-700 mb-3"><i class="fa-solid fa-id-badge w-6 text-indigo-500"></i>姓名：<span class="font-bold tracking-wide">${studentInfo.class}班 ${studentInfo.seat}號 ${studentInfo.name}</span></p>
                    <p class="text-lg text-slate-700 mb-3"><i class="fa-solid fa-check-to-slot w-6 text-green-500"></i>答對：<span class="font-bold">${score} / ${total} 題</span></p>
                    <div class="border-t-2 border-slate-200 pt-3 mt-3">
                        <p class="text-2xl text-slate-800 font-bold flex items-center"><i class="fa-solid fa-star w-8 text-yellow-500"></i>總分：<span class="text-red-600 text-5xl mx-2 drop-shadow-sm">${finalScore}</span> 分</p>
                    </div>
                </div>
                
                <p class="text-emerald-600 font-bold mb-8"><i class="fa-solid fa-circle-check mr-1"></i>成績已成功上傳至雲端系統</p>
                
                <button onclick="location.reload()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-8 rounded-full transition-colors shadow-lg text-lg">
                    <i class="fa-solid fa-house mr-2"></i>回首頁
                </button>
            `;
        }

        // 圖片放大功能
        function openModal(src) {
            if(!src) return;
            document.getElementById('modal-image').src = src;
            document.getElementById('image-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('image-modal').classList.add('hidden');
            setTimeout(() => { document.getElementById('modal-image').src = ''; }, 300);
        }

        // 移除原本自動 initGame()，改由輸入基本資料後觸發
    </script>
</body>
</html>
