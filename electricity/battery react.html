<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化學電池綜合互動教學 | 國三理化</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .no-pointer-events {
            pointer-events: none;
        }
        /* 電池切換標籤的樣式 */
        .tab-btn {
            transition: all 0.3s ease;
        }
        .tab-btn.active {
            background-color: #059669; /* emerald-600 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transform: translateY(-2px);
        }
        .tab-btn:not(.active) {
            background-color: #e5e7eb; /* gray-200 */
            color: #374151; /* gray-700 */
        }
        .tab-btn:not(.active):hover {
            background-color: #d1d5db; /* gray-300 */
        }
    </style>
</head>
<body class="flex flex-col min-h-screen relative">

    <!-- 右上角專屬標籤 -->
    <div class="absolute top-4 right-4 text-sm text-gray-500 text-right z-50 no-pointer-events bg-white/80 p-2 rounded shadow-sm">
        ＜Designed by 黃鈺心,<br>Gemini Canvas輔助生成>
    </div>

    <!-- 頂部標題與說明 -->
    <header class="w-full bg-emerald-600 text-white py-6 shadow-md z-10">
        <div class="container mx-auto px-4 text-center">
            <h1 id="main-title" class="text-3xl lg:text-4xl font-bold mb-2">化學電池：鋅銅電池微觀動畫</h1>
            <p class="text-emerald-100 text-lg">觀察電子與離子的流動，理解不同金屬活性如何轉換為電能！</p>
        </div>
    </header>

    <!-- 電池類型選擇器 -->
    <div class="w-full bg-white border-b border-gray-200 shadow-sm z-20 sticky top-0">
        <div class="container mx-auto px-4 py-3 flex justify-center space-x-4 md:space-x-8">
            <button class="tab-btn active px-6 py-2 rounded-full font-bold text-lg" data-type="Zn-Cu">🔋 鋅銅電池</button>
            <button class="tab-btn px-6 py-2 rounded-full font-bold text-lg" data-type="Zn-Ag">🔋 鋅銀電池</button>
            <button class="tab-btn px-6 py-2 rounded-full font-bold text-lg" data-type="Cu-Ag">🔋 銅銀電池</button>
        </div>
    </div>

    <!-- 主要內容區 -->
    <main class="flex-grow w-full max-w-[1600px] mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8 items-stretch justify-center">
        
        <!-- 左側/上方：Canvas 動畫區 -->
        <div class="relative bg-white p-4 rounded-xl shadow-lg border border-gray-200 w-full lg:w-[68%] flex flex-col items-center justify-center">
            <div class="absolute top-8 left-8 text-xl font-bold text-gray-700 bg-white/80 px-3 py-1 rounded">負極 (失去電子)</div>
            <div class="absolute top-8 right-8 text-xl font-bold text-gray-700 bg-white/80 px-3 py-1 rounded">正極 (獲得電子)</div>
            
            <!-- 畫布解析度加大以容納更大的燒杯與離子 -->
            <canvas id="cellCanvas" width="960" height="680" class="w-full h-auto rounded-lg max-h-[75vh] object-contain"></canvas>
        </div>

        <!-- 右側/下方：教學控制與解說面板 -->
        <div class="w-full lg:w-[32%] bg-white p-6 rounded-xl shadow-lg border border-gray-200 flex flex-col gap-6 justify-center">
            
            <div class="text-center space-y-4">
                <button id="playBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 active:scale-95 text-xl w-full">
                    ▶ 開始實驗 (接通電路)
                </button>
                <button id="resetBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-6 rounded-full transition text-lg w-full">
                    ↺ 重置實驗
                </button>
            </div>

            <div class="bg-emerald-50 p-6 rounded-lg border-l-4 border-emerald-500 flex-grow">
                <h3 class="font-bold text-emerald-800 mb-4 text-xl">🧪 <span id="desc-title">鋅銅電池</span> 原理解說</h3>
                <ul id="desc-list" class="list-disc pl-6 space-y-3 text-gray-700 text-base">
                    <!-- 內容由 JS 動態生成 -->
                </ul>
            </div>
        </div>
    </main>

    <!-- 最下方專屬標籤 -->
    <footer class="w-full py-6 mt-auto">
        <div class="text-center text-sm text-gray-500 bg-white/50 inline-block px-4 py-2 rounded-full mx-auto shadow-sm">
            ＜Designed by 黃鈺心, Gemini Canvas輔助生成>
        </div>
    </footer>

    <script>
        // --- 核心電池設定資料 ---
        const cellConfigs = {
            'Zn-Cu': {
                title: '鋅銅電池',
                anode: { name: '鋅棒 (Zn)', color: '#94a3b8', ion: 'Zn²⁺', ionColor: '#e2e8f0', solName: '硫酸鋅水溶液', eq: 'Zn → Zn²⁺ + 2e⁻', anion: 'SO₄²⁻', cationCount: 24, anionCount: 24 },
                cathode: { name: '銅棒 (Cu)', color: '#b45309', ion: 'Cu²⁺', ionColor: '#3b82f6', solName: '硫酸銅水溶液', eq: 'Cu²⁺ + 2e⁻ → Cu', anion: 'SO₄²⁻', cationCount: 24, anionCount: 24 },
                fullEq: '全反應：Zn + Cu²⁺ → Zn²⁺ + Cu',
                desc: [
                    '<strong class="text-gray-900">鋅板 (負極)：</strong>金屬活性 Zn > Cu，鋅原子失去電子變成鋅離子 (Zn<sup>2+</sup>) 溶入水中。鋅棒變輕。',
                    '<strong class="text-gray-900">導線與檢流計：</strong>電子 (e<sup>-</sup>) 由負極經外部導線流向正極，檢流計指針偏轉。',
                    '<strong class="text-gray-900">銅板 (正極)：</strong>溶液中的銅離子 (Cu<sup>2+</sup>) 獲得電子，還原成紅褐色銅原子析出。銅棒變重。',
                    '<strong class="text-gray-900">鹽橋：</strong>維持電中性。正離子游向正極，負離子游向負極。',
                    '<strong class="text-emerald-700">【觀察重點】</strong> 右側硫酸銅溶液因 Cu<sup>2+</sup> 被消耗，<span class="text-blue-600 font-bold">藍色逐漸變淡</span>。'
                ]
            },
            'Zn-Ag': {
                title: '鋅銀電池',
                anode: { name: '鋅棒 (Zn)', color: '#94a3b8', ion: 'Zn²⁺', ionColor: '#e2e8f0', solName: '硫酸鋅水溶液', eq: 'Zn → Zn²⁺ + 2e⁻', anion: 'SO₄²⁻', cationCount: 24, anionCount: 24 },
                cathode: { name: '銀棒 (Ag)', color: '#cbd5e1', ion: 'Ag⁺', ionColor: '#f1f5f9', solName: '硝酸銀水溶液', eq: 'Ag⁺ + e⁻ → Ag', anion: 'NO₃⁻', cationCount: 48, anionCount: 48 },
                fullEq: '全反應：Zn + 2Ag⁺ → Zn²⁺ + 2Ag',
                desc: [
                    '<strong class="text-gray-900">鋅板 (負極)：</strong>金屬活性 Zn > Ag，鋅原子失去電子變成鋅離子 (Zn<sup>2+</sup>) 溶入水中。鋅棒變輕。',
                    '<strong class="text-gray-900">導線與檢流計：</strong>電子 (e<sup>-</sup>) 由負極經外部導線流向正極，檢流計指針偏轉。',
                    '<strong class="text-gray-900">銀板 (正極)：</strong>溶液中的銀離子 (Ag<sup>+</sup>) 獲得電子，還原成銀原子析出。銀棒變重。',
                    '<strong class="text-gray-900">鹽橋：</strong>維持電中性。正離子游向正極，負離子游向負極。',
                    '<strong class="text-emerald-700">【觀察重點】</strong> 硫酸鋅與硝酸銀皆為<span class="text-gray-500 font-bold">無色透明溶液</span>，不會有顏色變化。'
                ]
            },
            'Cu-Ag': {
                title: '銅銀電池',
                anode: { name: '銅棒 (Cu)', color: '#b45309', ion: 'Cu²⁺', ionColor: '#3b82f6', solName: '硫酸銅水溶液', eq: 'Cu → Cu²⁺ + 2e⁻', anion: 'SO₄²⁻', cationCount: 24, anionCount: 24 },
                cathode: { name: '銀棒 (Ag)', color: '#cbd5e1', ion: 'Ag⁺', ionColor: '#f1f5f9', solName: '硝酸銀水溶液', eq: 'Ag⁺ + e⁻ → Ag', anion: 'NO₃⁻', cationCount: 48, anionCount: 48 },
                fullEq: '全反應：Cu + 2Ag⁺ → Cu²⁺ + 2Ag',
                desc: [
                    '<strong class="text-gray-900">銅板 (負極)：</strong>金屬活性 Cu > Ag，這回換銅原子失去電子，變成銅離子 (Cu<sup>2+</sup>) 溶入水中。銅棒變輕。',
                    '<strong class="text-gray-900">導線與檢流計：</strong>電子 (e<sup>-</sup>) 由負極經外部導線流向正極，檢流計指針偏轉。',
                    '<strong class="text-gray-900">銀板 (正極)：</strong>溶液中的銀離子 (Ag<sup>+</sup>) 獲得電子，還原成銀原子析出。銀棒變重。',
                    '<strong class="text-gray-900">鹽橋：</strong>維持電中性。正離子游向正極，負離子游向負極。',
                    '<strong class="text-emerald-700">【觀察重點】</strong> 左側因不斷生成 Cu<sup>2+</sup> 溶入水中，原本藍色的硫酸銅水溶液會<span class="text-blue-800 font-bold">變得更深藍色</span>！'
                ]
            }
        };

        let currentType = 'Zn-Cu'; 
        let conf = cellConfigs[currentType];

        // --- Canvas 設定 ---
        const canvas = document.getElementById('cellCanvas');
        const ctx = canvas.getContext('2d');
        const playBtn = document.getElementById('playBtn');
        const resetBtn = document.getElementById('resetBtn');

        let isPlaying = false;
        let animationId;
        let reactionProgress = 0;

        let anodeFlashTimer = 0;
        let cathodeFlashTimer = 0;

        let electrons = [], anodeIons = [], cathodeIons = [], saltBridgeIons = [], wanderingIons = [], bridgeIons = []; 

        // --- 全新放大版繪圖參數 ---
        const leftBeakerX = 100, beakerW = 280, beakerH = 260, beakerY = 280; 
        const rightBeakerX = 580; 
        const solutionY = 320, solutionH = 210; 
        const rodW = 120, rodH = 280; 
        const znRodX = 130, rodY = 160; 
        const cuRodX = 710; 
        const wireY = 90;
        const galvoX = 480, galvoY = 90, galvoR = 50; 

        // --- UI 更新邏輯 ---
        function updateUI() {
            conf = cellConfigs[currentType];
            document.getElementById('main-title').innerText = `化學電池：${conf.title}微觀動畫`;
            document.getElementById('desc-title').innerText = conf.title;
            const descList = document.getElementById('desc-list');
            descList.innerHTML = '';
            conf.desc.forEach(text => {
                let li = document.createElement('li');
                li.innerHTML = text;
                descList.appendChild(li);
            });
            resetExperiment();
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentType = e.target.getAttribute('data-type');
                updateUI();
            });
        });

        // --- 獲取鹽橋軌道座標 ---
        function getBridgePos(s) {
            let x, y;
            const T = beakerY - 40; 
            const L = solutionY + 80; 
            const leftX = leftBeakerX + beakerW - 50; 
            const rightX = rightBeakerX + 50; 
            const gX = galvoX; 
            const gY = 140;

            if (s < -0.5) {
                // 左邊垂直管
                let p = (s - (-1)) / 0.5; 
                x = leftX;
                y = L - p * (L - T);
            } else if (s > 0.5) {
                // 右邊垂直管
                let p = (s - 0.5) / 0.5; 
                x = rightX;
                y = T + p * (L - T);
            } else {
                // 上方Ｕ型圓弧 (貝茲曲線)
                let t = s + 0.5;
                let mt = 1 - t;
                x = mt * mt * leftX + 2 * mt * t * gX + t * t * rightX;
                y = mt * mt * T + 2 * mt * t * gY + t * t * T;
            }
            return {x, y};
        }

        // --- 鹽橋內部游移的離子 ---
        class BridgeIon {
            constructor(type, color, initialS) {
                this.type = type;
                this.color = color;
                this.s = initialS; // 位置從 -1 (左管口) 到 1 (右管口)
                this.speed = 0.0015 + Math.random() * 0.001; 
                this.offsetX = (Math.random() - 0.5) * 20; // 在粗管內的隨機偏移
                this.offsetY = (Math.random() - 0.5) * 20;
                this.wobblePhase = Math.random() * Math.PI * 2;
            }
            update(isPlaying) {
                this.wobblePhase += 0.05;
                if (!isPlaying) return null;

                if (this.type === 'K⁺') {
                    this.s += this.speed; // K+ 往右游 (正極)
                    if (this.s > 0.95) {
                        this.s -= 1.9; // 從左邊源源不絕補充
                        return 'drop_right'; // 觸發掉落至右燒杯的動畫
                    }
                } else {
                    this.s -= this.speed; // NO3- 往左游 (負極)
                    if (this.s < -0.95) {
                        this.s += 1.9; // 從右邊源源不絕補充
                        return 'drop_left'; // 觸發掉落至左燒杯的動畫
                    }
                }
                return null;
            }
            draw(ctx) {
                let pos = getBridgePos(this.s);
                let x = pos.x + this.offsetX + Math.sin(this.wobblePhase) * 2;
                let y = pos.y + this.offsetY + Math.cos(this.wobblePhase) * 2;

                ctx.beginPath(); ctx.arc(x, y, 14, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.globalAlpha = 0.8; ctx.fill(); ctx.globalAlpha = 1.0;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = 'white'; ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.type, x, y);
            }
        }

        // --- 粒子類別 (恢復原本的大尺寸) ---
        class WanderingIon { 
            constructor(type, minX, maxX, minY, maxY, color, startX, startY) {
                this.type = type; this.color = color;
                this.minX = minX; this.maxX = maxX; this.minY = minY; this.maxY = maxY;
                this.x = startX !== undefined ? startX : minX + Math.random() * (maxX - minX);
                this.y = startY !== undefined ? startY : minY + Math.random() * (maxY - minY);
                this.vx = (Math.random() - 0.5) * 0.5; this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.x < this.minX || this.x > this.maxX) this.vx *= -1;
                if(this.y < this.minY || this.y > this.maxY) this.vy *= -1;
            }
            draw(ctx) {
                ctx.beginPath(); ctx.arc(this.x, this.y, 14, 0, Math.PI * 2); 
                ctx.fillStyle = this.color; ctx.globalAlpha = 0.5; ctx.fill(); ctx.globalAlpha = 1.0;
                ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.stroke();
                ctx.fillStyle = this.color === '#f1f5f9' ? '#334155' : 'white'; 
                ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; 
                ctx.fillText(this.type, this.x, this.y);
            }
        }

        class Electron {
            constructor() { this.progress = 0; this.speed = 0.005; this.color = '#ef4444'; }
            update() { this.progress += this.speed; return this.progress > 1; }
            draw(ctx) {
                let x, y;
                if (this.progress < 0.2) { 
                    x = znRodX + rodW/2; y = rodY - (rodY - wireY) * (this.progress / 0.2);
                } else if (this.progress < 0.45) { 
                    let p = (this.progress - 0.2) / 0.25; x = znRodX + rodW/2 + (galvoX - galvoR - (znRodX + rodW/2)) * p; y = wireY;
                } else if (this.progress < 0.55) { 
                    x = galvoX - galvoR + (galvoR * 2) * ((this.progress - 0.45) / 0.1); y = wireY;
                } else if (this.progress < 0.8) { 
                    let p = (this.progress - 0.55) / 0.25; x = galvoX + galvoR + (cuRodX + rodW/2 - (galvoX + galvoR)) * p; y = wireY;
                } else { 
                    let p = (this.progress - 0.8) / 0.2; x = cuRodX + rodW/2; y = wireY + (rodY - wireY) * p;
                }
                ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI * 2); ctx.fillStyle = this.color; ctx.fill();
                ctx.fillStyle = 'white'; ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('e⁻', x, y);
            }
        }

        class Ion {
            constructor(type, startX, startY, targetX, targetY, color) {
                this.x = startX; this.y = startY; this.targetX = targetX; this.targetY = targetY;
                this.type = type; this.color = color; this.progress = 0;
                this.speed = 0.01 + Math.random() * 0.01; this.wobbleOffset = Math.random() * Math.PI * 2;
            }
            update() {
                this.progress += this.speed; this.x += Math.sin(this.progress * 10 + this.wobbleOffset) * 0.5;
                if (this.progress > 1) this.progress = 1; return this.progress === 1;
            }
            draw(ctx) {
                let currentX = this.x + (this.targetX - this.x) * this.progress;
                let currentY = this.y + (this.targetY - this.y) * this.progress;
                ctx.beginPath(); ctx.arc(currentX, currentY, 13, 0, Math.PI * 2); 
                ctx.fillStyle = this.color; ctx.globalAlpha = 0.8; ctx.fill(); ctx.globalAlpha = 1.0;
                ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = (this.color === '#1e40af' || this.color === '#b91c1c' || this.color === '#3b82f6') ? 'white' : 'black'; 
                ctx.font = '11px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(this.type, currentX, currentY);
            }
        }

        function drawVerticalText(text, x, y, size, color) {
            ctx.font = `bold ${size}px Noto Sans TC`; ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.textBaseline = 'top';
            for (let i = 0; i < text.length; i++) { ctx.fillText(text[i], x, y + i * (size * 1.1)); }
        }

        // 初始生成燒杯內與鹽橋內的離子
        function initStaticIons() {
            wanderingIons = [];
            bridgeIons = [];
            
            // 左邊燒杯
            for(let i=0; i<conf.anode.cationCount; i++) {
                wanderingIons.push(new WanderingIon(conf.anode.ion, leftBeakerX+20, leftBeakerX+beakerW-20, solutionY+50, beakerY+beakerH-20, conf.anode.ionColor));
            }
            for(let i=0; i<conf.anode.anionCount; i++) {
                wanderingIons.push(new WanderingIon(conf.anode.anion, leftBeakerX+20, leftBeakerX+beakerW-20, solutionY+50, beakerY+beakerH-20, '#64748b'));
            }
            
            // 右邊燒杯
            for(let i=0; i<conf.cathode.cationCount; i++) {
                wanderingIons.push(new WanderingIon(conf.cathode.ion, rightBeakerX+20, rightBeakerX+beakerW-20, solutionY+50, beakerY+beakerH-20, conf.cathode.ionColor));
            }
            for(let i=0; i<conf.cathode.anionCount; i++) {
                wanderingIons.push(new WanderingIon(conf.cathode.anion, rightBeakerX+20, rightBeakerX+beakerW-20, solutionY+50, beakerY+beakerH-20, '#64748b'));
            }

            // 鹽橋內佈滿 12顆 K+ 和 12顆 NO3- (均勻分佈)
            for (let i = 0; i < 12; i++) {
                let baseS = -0.9 + (1.8 * i / 11); 
                let sK = Math.max(-0.95, Math.min(0.95, baseS + (Math.random() - 0.5) * 0.1));
                let sNO3 = Math.max(-0.95, Math.min(0.95, baseS + (Math.random() - 0.5) * 0.1));
                bridgeIons.push(new BridgeIon('K⁺', '#a855f7', sK));
                bridgeIons.push(new BridgeIon('NO₃⁻', '#10b981', sNO3));
            }
        }

        function drawStatic() {
            // 左邊燒杯 
            ctx.lineWidth = 3; ctx.strokeStyle = '#94a3b8'; 
            if(conf.anode.ion === 'Cu²⁺') {
                ctx.fillStyle = `rgba(59, 130, 246, ${0.6 + reactionProgress * 0.4})`;
            } else {
                ctx.fillStyle = '#e0f2fe'; 
            }
            ctx.fillRect(leftBeakerX, solutionY, beakerW, solutionH);
            ctx.beginPath(); ctx.moveTo(leftBeakerX, beakerY); ctx.lineTo(leftBeakerX, beakerY + beakerH);
            ctx.lineTo(leftBeakerX + beakerW, beakerY + beakerH); ctx.lineTo(leftBeakerX + beakerW, beakerY); ctx.stroke();

            // 右邊燒杯
            if(conf.cathode.ion === 'Cu²⁺') {
                ctx.fillStyle = `rgba(59, 130, 246, ${0.6 - reactionProgress * 0.45})`;
            } else {
                ctx.fillStyle = '#f8fafc'; 
            }
            ctx.fillRect(rightBeakerX, solutionY, beakerW, solutionH);
            ctx.beginPath(); ctx.moveTo(rightBeakerX, beakerY); ctx.lineTo(rightBeakerX, beakerY + beakerH);
            ctx.lineTo(rightBeakerX + beakerW, beakerY + beakerH); ctx.lineTo(rightBeakerX + beakerW, beakerY); ctx.stroke();

            // 標示文字 
            drawVerticalText(conf.anode.solName, leftBeakerX - 55, solutionY + 10, 24, '#334155');
            drawVerticalText(conf.cathode.solName, rightBeakerX + beakerW + 55, solutionY + 10, 24, '#334155');

            // 巨大化鹽橋
            ctx.beginPath(); ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 55; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            let bridgeLeftX = leftBeakerX + beakerW - 50; 
            let bridgeRightX = rightBeakerX + 50;
            ctx.moveTo(bridgeLeftX, solutionY + 80); ctx.lineTo(bridgeLeftX, beakerY - 40);
            ctx.quadraticCurveTo(galvoX, 140, bridgeRightX, beakerY - 40); ctx.lineTo(bridgeRightX, solutionY + 80); ctx.stroke();
            
            // 巨大化鹽橋棉花
            ctx.fillStyle = '#f8fafc'; ctx.beginPath(); ctx.arc(bridgeLeftX, solutionY + 80, 24, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(bridgeRightX, solutionY + 80, 24, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#64748b'; ctx.font = '18px Noto Sans TC'; ctx.textAlign = 'center'; ctx.fillText('鹽橋 (KNO₃)', galvoX, beakerY - 70);

            // 負極金屬棒 
            let currentZnW = rodW * (1 - reactionProgress * 0.5); 
            ctx.fillStyle = conf.anode.color; ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(znRodX, rodY); ctx.lineTo(znRodX + rodW, rodY); ctx.lineTo(znRodX + rodW, solutionY); 
            ctx.lineTo(znRodX + rodW - (rodW - currentZnW) / 2, solutionY); ctx.lineTo(znRodX + rodW - (rodW - currentZnW) / 2, rodY + rodH); 
            ctx.lineTo(znRodX + (rodW - currentZnW) / 2, rodY + rodH); ctx.lineTo(znRodX + (rodW - currentZnW) / 2, solutionY); 
            ctx.lineTo(znRodX, solutionY); ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#0f172a'; ctx.font = '18px Noto Sans TC'; ctx.textBaseline = 'alphabetic'; ctx.fillText(conf.anode.name, znRodX + rodW/2, rodY - 10);

            // 正極金屬棒
            let currentCuW = rodW * (1 + reactionProgress * 0.4); 
            ctx.fillStyle = conf.cathode.color; ctx.strokeStyle = '#334155';
            ctx.beginPath(); ctx.moveTo(cuRodX, rodY); ctx.lineTo(cuRodX + rodW, rodY); ctx.lineTo(cuRodX + rodW, solutionY); 
            ctx.lineTo(cuRodX + rodW + (currentCuW - rodW) / 2, solutionY); ctx.lineTo(cuRodX + rodW + (currentCuW - rodW) / 2, rodY + rodH); 
            ctx.lineTo(cuRodX - (currentCuW - rodW) / 2, rodY + rodH); ctx.lineTo(cuRodX - (currentCuW - rodW) / 2, solutionY); 
            ctx.lineTo(cuRodX, solutionY); ctx.closePath(); ctx.fill(); ctx.stroke();
            ctx.fillStyle = '#0f172a'; ctx.fillText(conf.cathode.name, cuRodX + rodW/2, rodY - 10);

            // 外部導線與檢流計
            ctx.beginPath(); ctx.strokeStyle = '#334155'; ctx.lineWidth = 4;
            ctx.moveTo(znRodX + rodW/2, rodY); ctx.lineTo(znRodX + rodW/2, wireY); ctx.lineTo(galvoX - galvoR, wireY);
            ctx.moveTo(galvoX + galvoR, wireY); ctx.lineTo(cuRodX + rodW/2, wireY); ctx.lineTo(cuRodX + rodW/2, rodY); ctx.stroke();

            ctx.beginPath(); ctx.arc(galvoX, galvoY, galvoR, 0, Math.PI * 2); ctx.fillStyle = '#1e293b'; ctx.fill();
            ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 3; ctx.stroke();
            ctx.beginPath(); ctx.arc(galvoX, galvoY, galvoR - 5, Math.PI, 0); ctx.fillStyle = '#f8fafc'; ctx.fill();
            ctx.fillStyle = '#0f172a'; ctx.font = '18px Arial font-bold'; ctx.fillText('G', galvoX, galvoY - 5);
            ctx.font = '14px Noto Sans TC'; ctx.fillStyle = 'white'; ctx.fillText('檢流計', galvoX, galvoY + 30);

            ctx.beginPath(); ctx.moveTo(galvoX, galvoY);
            let angle = isPlaying ? Math.PI * 1.7 : Math.PI * 1.5; 
            ctx.lineTo(galvoX + Math.cos(angle) * 32, galvoY + Math.sin(angle) * 32);
            ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 2; ctx.stroke();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStatic();

            // 鹽橋內的離子不管有沒有播放都會繪製並呈現微微的擾動
            bridgeIons.forEach(ion => {
                let action = ion.update(isPlaying);
                ion.draw(ctx);
                
                // 如果離子到達了管口，則在對應的燒杯產生一顆掉落的離子
                if (action === 'drop_right') {
                    let startX = rightBeakerX + 50 + (Math.random() * 20 - 10);
                    let startY = solutionY + 80;
                    saltBridgeIons.push(new Ion('K⁺', startX, startY, rightBeakerX + 20 + Math.random() * (beakerW - 40), startY + 40 + Math.random() * 80, '#a855f7'));
                } else if (action === 'drop_left') {
                    let startX = leftBeakerX + beakerW - 50 + (Math.random() * 20 - 10);
                    let startY = solutionY + 80;
                    saltBridgeIons.push(new Ion('NO₃⁻', startX, startY, leftBeakerX + 20 + Math.random() * (beakerW - 40), startY + 40 + Math.random() * 80, '#10b981'));
                }
            });

            wanderingIons.forEach(ion => { if (isPlaying) ion.update(); ion.draw(ctx); });

            if (isPlaying) {
                if (reactionProgress < 1) reactionProgress += 0.0003; 

                if (Math.random() < 0.05) electrons.push(new Electron());
                
                if (Math.random() < 0.02) {
                    let currentZnW = rodW * (1 - reactionProgress * 0.5); 
                    let startY = solutionY + Math.random() * (solutionH - 20);
                    let targetX = leftBeakerX + 20 + Math.random() * (beakerW - 60);
                    let targetY = solutionY + 50 + Math.random() * (solutionH - 70);
                    let currentZnEdge = znRodX + rodW/2 + currentZnW/2; 
                    anodeIons.push(new Ion(conf.anode.ion, currentZnEdge, startY, targetX, targetY, conf.anode.ionColor));
                    anodeFlashTimer = 30; 
                }

                if (Math.random() < 0.02) {
                    let cuIndex = wanderingIons.findIndex(ion => ion.type === conf.cathode.ion);
                    if (cuIndex !== -1) {
                        let wIon = wanderingIons[cuIndex];
                        wanderingIons.splice(cuIndex, 1); 
                        let currentCuW = rodW * (1 + reactionProgress * 0.4); 
                        let currentCuEdge = cuRodX + rodW/2 - currentCuW/2 - 10; 
                        let targetY = solutionY + Math.random() * (solutionH - 20);
                        cathodeIons.push(new Ion(conf.cathode.ion, wIon.x, wIon.y, currentCuEdge, targetY, conf.cathode.ionColor));
                    }
                }
            }

            electrons = electrons.filter(e => { e.draw(ctx); return !e.update(); });
            saltBridgeIons = saltBridgeIons.filter(ion => { ion.draw(ctx); return !ion.update(); });

            anodeIons = anodeIons.filter(ion => {
                ion.draw(ctx);
                let keep = !ion.update();
                if (!keep) wanderingIons.push(new WanderingIon(conf.anode.ion, leftBeakerX+20, leftBeakerX+beakerW-20, solutionY+50, beakerY+beakerH-20, ion.color, ion.x, ion.y));
                return keep;
            });

            cathodeIons = cathodeIons.filter(ion => {
                ion.draw(ctx);
                if (ion.progress >= 1 && isPlaying) cathodeFlashTimer = 30; 
                return !ion.update();
            });

            // --- 繪製畫布底部的化學反應式 ---
            if (anodeFlashTimer > 0) anodeFlashTimer--;
            if (cathodeFlashTimer > 0) cathodeFlashTimer--;

            ctx.textBaseline = 'alphabetic'; ctx.textAlign = 'center';
            ctx.font = 'bold 24px Arial, "Noto Sans TC"';
            ctx.fillStyle = anodeFlashTimer > 0 ? '#2563eb' : '#1f2937'; 
            ctx.fillText(conf.anode.eq, leftBeakerX + beakerW/2, 580);

            ctx.fillStyle = cathodeFlashTimer > 0 ? '#ea580c' : '#1f2937'; 
            ctx.fillText(conf.cathode.eq, rightBeakerX + beakerW/2, 580);

            ctx.font = 'bold 26px Arial, "Noto Sans TC"'; ctx.fillStyle = '#065f46'; 
            ctx.fillText(conf.fullEq, galvoX, 640);

            animationId = requestAnimationFrame(animate);
        }

        function resetExperiment() {
            isPlaying = false;
            reactionProgress = 0; 
            electrons = []; anodeIons = []; cathodeIons = []; saltBridgeIons = [];
            initStaticIons(); 
            playBtn.innerHTML = '▶ 開始實驗 (接通電路)';
            playBtn.classList.replace('bg-amber-500', 'bg-emerald-500');
            playBtn.classList.replace('hover:bg-amber-600', 'hover:bg-emerald-600');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStatic();
        }

        playBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) {
                playBtn.innerHTML = '⏸ 暫停實驗';
                playBtn.classList.replace('bg-emerald-500', 'bg-amber-500');
                playBtn.classList.replace('hover:bg-emerald-600', 'hover:bg-amber-600');
            } else {
                playBtn.innerHTML = '▶ 繼續實驗';
                playBtn.classList.replace('bg-amber-500', 'bg-emerald-500');
                playBtn.classList.replace('hover:bg-amber-600', 'hover:bg-emerald-600');
            }
        });

        resetBtn.addEventListener('click', resetExperiment);

        // 初始載入
        updateUI();
        wanderingIons.forEach(ion => ion.draw(ctx)); 
        animate(); 

    </script>
</body>
