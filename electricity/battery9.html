<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>國中理化：化學電池互動模擬器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: #f0fdf4; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background-color: #f1f5f9; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; border: 2px solid #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
        /* 確保右側面板有平滑的過渡效果 */
        .smooth-scroll { scroll-behavior: smooth; }
        
        /* 針對當前反應狀態自訂極窄行距 */
        .super-tight-line { line-height: 1.15; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-6 px-4 relative">

    <!-- 💡 新增：右上角標註 (設定 pointer-events-none 確保不阻擋滑鼠點擊) -->
    <div class="absolute top-3 right-4 text-right text-xs md:text-sm text-gray-400 font-medium pointer-events-none select-none z-0 tracking-wide">
        Designed by 黃鈺心<br>Gemini Canvas輔助生成
    </div>

    <div class="max-w-[1300px] w-full flex flex-col md:flex-row gap-6 relative z-10">
        <!-- 左側面板：控制區 -->
        <div class="w-full md:w-[32%] bg-white p-5 rounded-2xl shadow-lg flex flex-col gap-4 relative max-h-[850px]">
            <h1 class="text-2xl font-bold text-green-700 border-b-2 border-green-200 pb-2">🔋 化學電池實驗室</h1>
            
            <div class="flex flex-col gap-3 flex-grow overflow-y-auto custom-scrollbar pr-2">
                
                <!-- 步驟 1：選擇大模式 -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <label class="block text-gray-800 mb-2 font-bold text-base">1. 選擇電池模式：</label>
                    <select id="batteryMode" class="w-full p-2 border border-green-400 rounded bg-white shadow-sm focus:ring-green-500 font-bold text-green-800 text-base">
                        <option value="Zn-Cu" selected>第一種：鋅銅電池</option>
                        <option value="Zn-Ag">第二種：鋅銀電池</option>
                        <option value="Cu-Ag">第三種：銅銀電池</option>
                    </select>
                </div>

                <!-- 步驟 2：自訂裝置設定 -->
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                    <h2 class="font-bold text-gray-800 mb-3 text-base">2. 燒杯與電極設定：</h2>
                    <div class="grid grid-cols-2 gap-3 text-sm">
                        <!-- 左側設定 -->
                        <div>
                            <label class="block text-gray-600 mb-1 font-bold">左側電極</label>
                            <select id="leftElectrode" class="w-full p-1.5 border border-gray-300 rounded bg-white focus:ring-blue-500 font-medium">
                                <!-- 由 JS 動態生成 -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-600 mb-1 font-bold">右側電極</label>
                            <select id="rightElectrode" class="w-full p-1.5 border border-gray-300 rounded bg-white focus:ring-blue-500 font-medium">
                                <!-- 由 JS 動態生成 -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-600 mb-1 font-bold">左側水溶液</label>
                            <select id="leftSolution" class="w-full p-1.5 border border-gray-300 rounded bg-white focus:ring-blue-500 font-medium">
                                <!-- 由 JS 動態生成 -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-600 mb-1 font-bold">右側水溶液</label>
                            <select id="rightSolution" class="w-full p-1.5 border border-gray-300 rounded bg-white focus:ring-blue-500 font-medium">
                                <!-- 由 JS 動態生成 -->
                            </select>
                        </div>
                    </div>
                    
                    <!-- 鹽橋設定 -->
                    <div class="mt-4 border-t pt-3 border-gray-200">
                        <label class="block text-gray-600 mb-1 font-bold">鹽橋設定</label>
                        <select id="saltBridge" class="w-full p-1.5 border border-purple-300 rounded bg-white shadow-sm focus:ring-purple-500 font-medium">
                            <option value="KNO3" selected>硝酸鉀水溶液 (KNO₃)</option>
                            <option value="NaCl">氯化鈉水溶液 (NaCl)</option>
                        </select>
                    </div>
                </div>

            </div>

            <!-- 控制按鈕 -->
            <div class="flex flex-wrap gap-2 mt-2 text-sm">
                <button id="btnPrev" class="flex-1 min-w-[65px] bg-gray-500 hover:bg-gray-600 text-white py-2 rounded-lg shadow font-medium transition flex items-center justify-center gap-1">
                    ⏮️ 上一步
                </button>
                <button id="btnPlay" class="flex-1 min-w-[65px] bg-green-600 hover:bg-green-700 text-white py-2 rounded-lg shadow font-medium transition flex items-center justify-center gap-1">
                    ▶️ 開始
                </button>
                <button id="btnPause" class="flex-1 min-w-[65px] bg-yellow-500 hover:bg-yellow-600 text-white py-2 rounded-lg shadow font-medium transition flex items-center justify-center gap-1">
                    ⏸️ 暫停
                </button>
                <button id="btnStep" class="flex-1 min-w-[65px] bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg shadow font-medium transition flex items-center justify-center gap-1">
                    ⏭️ 下一步
                </button>
                <button id="btnReset" class="w-full bg-red-500 hover:bg-red-600 text-white py-2 rounded-lg shadow font-medium transition flex items-center justify-center gap-1 mt-1">
                    🔄 重置
                </button>
            </div>
        </div>

        <!-- 右側面板：畫布與測驗區 -->
        <div id="rightPanel" class="w-full md:w-[68%] bg-white rounded-2xl shadow-lg relative flex flex-col items-center p-4 border border-gray-100 overflow-y-auto custom-scrollbar smooth-scroll max-h-[850px]">
            
            <!-- 加寬的 Canvas (寬 1000 以容納解答框，高 600) -->
            <canvas id="simCanvas" width="1000" height="600" class="w-full max-w-[1000px] bg-white rounded-xl shadow-sm border border-gray-50 shrink-0"></canvas>
            
            <!-- 💡 放大的當前反應狀態區塊 (行距縮小至0.5倍感覺，並移除上下多餘留白) -->
            <div class="w-full max-w-[1000px] bg-blue-50 py-2.5 px-4 rounded-xl border border-blue-200 mt-2 shadow-inner shrink-0 text-center flex flex-col justify-center">
                <h3 class="font-bold text-blue-900 m-0 text-lg flex items-center justify-center gap-2 super-tight-line">
                    💡 當前反應狀態 💡
                </h3>
                <p id="statusText" class="text-base text-blue-800 font-bold tracking-wide mt-1.5 mb-0 super-tight-line">請設定好裝置後，點擊「開始」或「下一步」。</p>
                <p id="reactionEq" class="text-lg font-bold text-red-600 mt-1.5 mb-0 whitespace-pre-line tracking-wide super-tight-line"></p>
            </div>

            <!-- 測驗區域 (選項與題目並排，節省空間) -->
            <div id="quizContainer" class="hidden w-full max-w-[1000px] mt-2 p-3 rounded-xl border border-green-200 bg-green-50/40 shadow-inner shrink-0 transition-opacity duration-500">
                <div class="flex justify-between items-center mb-2 border-b border-green-200 pb-1.5">
                    <h2 class="text-lg font-bold text-green-900 flex items-center gap-2 m-0">📝 電池觀念小測驗</h2>
                    <span id="quizProgress" class="text-xs font-bold text-green-700 bg-green-100 px-3 py-1 rounded-full"></span>
                </div>
                
                <form id="quizForm" class="space-y-2">
                    <!-- JS 動態插入題目 -->
                </form>

                <div class="mt-3 flex justify-between items-center border-t border-green-200 pt-2">
                    <div id="quizResult" class="font-bold text-base hidden flex-1 mr-4 super-tight-line"></div>
                    <div class="flex gap-2 shrink-0">
                        <button id="btnQuizPrev" class="px-4 py-1.5 text-gray-600 bg-white border border-gray-300 hover:bg-gray-100 hover:text-green-700 rounded-lg shadow-sm font-bold transition-colors">⬅️ 上兩題</button>
                        <button id="btnQuizNext" class="px-4 py-1.5 text-white bg-green-600 hover:bg-green-700 rounded-lg shadow font-bold transition-colors">下兩題 ➡️</button>
                        <button id="btnQuizSubmit" class="px-4 py-1.5 text-white bg-red-500 hover:bg-red-600 rounded-lg shadow font-bold hidden transition-colors">🌟 送出看解答</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 💡 新增：最下方標註 (置於主要內容區塊的下方，且自動置中) -->
    <footer class="w-full mt-auto pt-8 pb-2 text-center text-sm text-gray-400 font-medium tracking-wide">
        Designed by 黃鈺心 <span class="hidden sm:inline mx-1">|</span><br class="sm:hidden"> Gemini Canvas輔助生成
    </footer>

<script>
/**
 * 教學互動網頁設計專家 - 化學電池模擬器核心程式碼
 */

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const rightPanel = document.getElementById('rightPanel');

// UI 元素綁定
const statusText = document.getElementById('statusText');
const reactionEq = document.getElementById('reactionEq');
const btnPrev = document.getElementById('btnPrev');
const btnPlay = document.getElementById('btnPlay');
const btnPause = document.getElementById('btnPause');
const btnStep = document.getElementById('btnStep');
const btnReset = document.getElementById('btnReset');

const selMode = document.getElementById('batteryMode');
const selLeftElectrode = document.getElementById('leftElectrode');
const selRightElectrode = document.getElementById('rightElectrode');
const selLeftSolution = document.getElementById('leftSolution');
const selRightSolution = document.getElementById('rightSolution');
const selSaltBridge = document.getElementById('saltBridge');

// 化學資料庫
const chemData = {
    'Zn': { name: '鋅', color: '#9ca3af', symbol: 'Zn', ion: 'Zn²⁺', ionCharge: 2, active: true, potential: -0.76, label: '鋅片 (Zn)' },
    'Cu': { name: '銅', color: '#b45309', symbol: 'Cu', ion: 'Cu²⁺', ionCharge: 2, active: true, potential: 0.34, label: '銅片 (Cu)' },
    'Ag': { name: '銀', color: '#d1d5db', symbol: 'Ag', ion: 'Ag⁺', ionCharge: 1, active: true, potential: 0.80, label: '銀片 (Ag)' },
    'ZnSO4': { name: '硫酸鋅', label: '硫酸鋅 (ZnSO₄)', cation: 'Zn²⁺', anion: 'SO₄²⁻' },
    'CuSO4': { name: '硫酸銅', label: '硫酸銅 (CuSO₄)', cation: 'Cu²⁺', anion: 'SO₄²⁻' },
    'AgNO3': { name: '硝酸銀', label: '硝酸銀 (AgNO₃)', cation: 'Ag⁺', anion: 'NO₃⁻' },
    'KNO3': { name: '硝酸鉀', label: '硝酸鉀 (KNO₃)', cation: 'K⁺', anion: 'NO₃⁻' },
    'NaCl': { name: '氯化鈉', label: '氯化鈉 (NaCl)', cation: 'Na⁺', anion: 'Cl⁻' }
};

// 模式限定資料
const modeData = {
    'Zn-Cu': {
        metals: ['Zn', 'Cu'], sols: ['ZnSO4', 'CuSO4'],
        defaultL: { m: 'Zn', s: 'ZnSO4' }, defaultR: { m: 'Cu', s: 'CuSO4' }
    },
    'Zn-Ag': {
        metals: ['Zn', 'Ag'], sols: ['ZnSO4', 'AgNO3'],
        defaultL: { m: 'Zn', s: 'ZnSO4' }, defaultR: { m: 'Ag', s: 'AgNO3' }
    },
    'Cu-Ag': {
        metals: ['Cu', 'Ag'], sols: ['CuSO4', 'AgNO3'],
        defaultL: { m: 'Cu', s: 'CuSO4' }, defaultR: { m: 'Ag', s: 'AgNO3' }
    }
};

// 嚴格定義有效組合
const validCombinations = [
    { lE: 'Zn', lS: 'ZnSO4', rE: 'Cu', rS: 'CuSO4' }, { lE: 'Cu', lS: 'CuSO4', rE: 'Zn', rS: 'ZnSO4' },
    { lE: 'Zn', lS: 'ZnSO4', rE: 'Ag', rS: 'AgNO3' }, { lE: 'Ag', lS: 'AgNO3', rE: 'Zn', rS: 'ZnSO4' },
    { lE: 'Cu', lS: 'CuSO4', rE: 'Ag', rS: 'AgNO3' }, { lE: 'Ag', lS: 'AgNO3', rE: 'Cu', rS: 'CuSO4' }
];

// 動態更新下拉選單
function updateDropdownOptions() {
    const mode = selMode.value;
    const data = modeData[mode];

    const generateMetalOptions = () => data.metals.map(m => `<option value="${m}">${chemData[m].label}</option>`).join('');
    const generateSolOptions = () => data.sols.map(s => `<option value="${s}">${chemData[s].label}</option>`).join('');

    selLeftElectrode.innerHTML = generateMetalOptions();
    selRightElectrode.innerHTML = generateMetalOptions();
    selLeftSolution.innerHTML = generateSolOptions();
    selRightSolution.innerHTML = generateSolOptions();

    selLeftElectrode.value = data.defaultL.m;
    selLeftSolution.value = data.defaultL.s;
    selRightElectrode.value = data.defaultR.m;
    selRightSolution.value = data.defaultR.s;

    init();
}

selMode.addEventListener('change', updateDropdownOptions);

[selLeftElectrode, selRightElectrode, selLeftSolution, selRightSolution, selSaltBridge].forEach(el => {
    el.addEventListener('change', init);
});

// 系統狀態
let state = {
    step: 0,
    progress: 0, 
    isPlaying: false,
    pauseAfterStep: false,
    showAnswers: false, // 控制是否在畫布上顯示解答面板
    anodeSide: 'left',
    validReaction: true,
    errorMsg: '',
    config: {},
    particles: [],
    leftMassChange: 0,
    rightMassChange: 0,
    needleAngle: 0
};

const stepDescriptions = [
    "準備就緒。點擊「開始」或「下一步」觀察反應。",
    "【步驟一】負極金屬失去電子，解離成金屬離子進入水溶液中。",
    "【步驟二】電子沿著導線移動，通過檢流計，指針發生偏轉。",
    "【步驟三】電子繼續沿著導線，往正極電極方向移動。",
    "【步驟四】正極水溶液中的金屬陽離子受到電子吸引，游向正極。",
    "【步驟五】陽離子在正極獲得電子，還原成金屬原子並附著在電極上。",
    "【步驟六】鹽橋發生作用！陰離子移向負極杯，陽離子移向正極杯，維持兩杯水溶液的電中性。",
    "【全反應完成】反應持續進行中。請點擊「下一步」進入觀念測驗！",
    "📝 測驗時間！請根據上圖回答問題。"
];

function init() {
    state.step = 0;
    state.progress = 0;
    state.isPlaying = false;
    state.pauseAfterStep = false;
    state.showAnswers = false;
    state.particles = [];
    state.leftMassChange = 0;
    state.rightMassChange = 0;
    state.needleAngle = 0;
    
    document.getElementById('quizContainer').classList.add('hidden');
    currentQuizPage = 0;
    userAnswers = {};
    
    const lE = selLeftElectrode.value;
    const rE = selRightElectrode.value;
    const lS = selLeftSolution.value;
    const rS = selRightSolution.value;
    const sb = selSaltBridge.value;

    state.config = {
        left: { metal: chemData[lE], sol: chemData[lS], solName: lS },
        right: { metal: chemData[rE], sol: chemData[rS], solName: rS },
        salt: chemData[sb]
    };

    checkReactionValidity();
    updateText();
    draw();
}

function checkReactionValidity() {
    let lData = state.config.left.metal;
    let rData = state.config.right.metal;
    let lSol = state.config.left.solName;
    let rSol = state.config.right.solName;
    
    state.validReaction = false;
    state.errorMsg = "⚠️ 無效的電池組合。請確保電極插在對應的水溶液中。";

    const isValidCombo = validCombinations.some(combo => 
        combo.lE === lData.symbol && combo.lS === lSol &&
        combo.rE === rData.symbol && combo.rS === rSol
    );

    if (isValidCombo) {
        state.validReaction = true;
        state.errorMsg = "";
        if (lData.potential < rData.potential) {
            state.anodeSide = 'left';
        } else {
            state.anodeSide = 'right';
        }
    } else {
        if (lData.symbol === rData.symbol) {
            state.errorMsg = "⚠️ 兩側電極材質相同，無法產生電位差。";
        }
    }
}

function getSolutionColor(side) {
    let solName = side === 'left' ? state.config.left.solName : state.config.right.solName;
    
    if (solName === 'CuSO4') {
        let baseAlpha = 0.55; 
        let currentAlpha = baseAlpha;
        let isAnode = state.anodeSide === side;

        if (isAnode) {
            if (state.step === 1) currentAlpha = baseAlpha + (0.35 * state.progress);
            else if (state.step > 1) currentAlpha = 0.9; 
        } else {
            if (state.step === 5) currentAlpha = baseAlpha - (0.25 * state.progress);
            else if (state.step > 5) currentAlpha = 0.3; 
        }
        return `rgba(37, 99, 235, ${currentAlpha})`;
    } else if (solName === 'AgNO3') {
        let isAnode = state.anodeSide === side;
        if (isAnode) {
             let alpha = state.step === 1 ? (0.1 * state.progress) : (state.step > 1 ? 0.1 : 0);
             return `rgba(156, 163, 175, ${alpha})`; 
        }
    }
    return 'rgba(235, 245, 255, 0.4)';
}

let lastTime = 0;
function animate(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const deltaTime = timestamp - lastTime;
    lastTime = timestamp;

    if (state.isPlaying && state.validReaction && state.step > 0 && state.step < 8) {
        state.progress += deltaTime * 0.0005; 
        
        if (state.progress >= 1.0) {
            state.progress = 0;
            state.step++;
            updateText();
            if (state.pauseAfterStep) {
                state.isPlaying = false;
                state.pauseAfterStep = false;
            }
            if (state.step === 8) {
                state.isPlaying = false; 
                initQuiz(); 
            }
        }
    }
    
    draw();
    requestAnimationFrame(animate);
}

// 繪製圓角矩形輔助函數 (用於解答面板)
function drawRoundedRect(ctx, x, y, width, height, radius) {
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + width - radius, y);
    ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
    ctx.lineTo(x + width, y + height - radius);
    ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
    ctx.lineTo(x + radius, y + height);
    ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();
}

// 繪製解答總結面板 (位於畫布兩側空白處)
function drawAnswerSummary() {
    if (!state.validReaction) return;

    const leftIsAnode = state.anodeSide === 'left';
    
    const anodeColorTxt = state.config[state.anodeSide].solName === 'CuSO4' ? '變深藍' : '不變';
    const cathodeColorTxt = state.config[state.anodeSide === 'left' ? 'right' : 'left'].solName === 'CuSO4' ? '變淺藍' : '不變';

    function drawBox(x, y, isAnode) {
        const w = 180;
        const h = 155;

        ctx.save();
        // 面板背景
        ctx.fillStyle = isAnode ? 'rgba(254, 226, 226, 0.95)' : 'rgba(219, 234, 254, 0.95)'; // 淺紅 / 淺藍
        ctx.strokeStyle = isAnode ? '#ef4444' : '#3b82f6';
        ctx.lineWidth = 2.5;
        drawRoundedRect(ctx, x, y, w, h, 12);
        ctx.fill();
        ctx.stroke();

        // 面板標題
        const titleColor = isAnode ? '#b91c1c' : '#1d4ed8'; 
        ctx.fillStyle = titleColor;
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(`【${isAnode ? '負極 解答' : '正極 解答'}】`, x + w/2, y + 28);

        // 面板內容
        ctx.fillStyle = '#1f2937'; 
        ctx.font = 'bold 15px Arial';
        ctx.textAlign = 'left';
        const startX = x + 15;
        let startY = y + 55;
        const lineH = 22;

        ctx.fillText(`▪ 反應：${isAnode ? '氧化 (失e⁻)' : '還原 (得e⁻)'}`, startX, startY); startY += lineH;
        ctx.fillText(`▪ 質量：${isAnode ? '變輕' : '變重'}`, startX, startY); startY += lineH;
        ctx.fillText(`▪ 顏色：${isAnode ? anodeColorTxt : cathodeColorTxt}`, startX, startY); startY += lineH;
        ctx.fillText(`▪ 鹽橋：${isAnode ? '陰離子移入' : '陽離子移入'}`, startX, startY); startY += lineH;
        ctx.fillText(`▪ 電流：電子${isAnode ? '流出' : '流入'}`, startX, startY);

        ctx.restore();
    }

    // 依據左右相對位置繪製 (Translate已為 X+90)
    // 左側空白處
    drawBox(-70, 180, leftIsAnode);
    // 右側空白處
    drawBox(625, 180, !leftIsAnode);
}

function drawArrow(ctx, fromX, fromY, toX, toY, color) {
    const headlen = 8;
    const dx = toX - fromX;
    const dy = toY - fromY;
    const angle = Math.atan2(dy, dx);
    
    ctx.save();
    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(fromX, fromY);
    ctx.lineTo(toX, toY);
    ctx.stroke();
    
    ctx.beginPath();
    ctx.moveTo(toX, toY);
    ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
    ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
    ctx.lineTo(toX, toY);
    ctx.fill();
    ctx.restore();
}

function drawElectrodePath(ctx, x, y, w, h, color, notchSide, notchP, notchY) {
    ctx.fillStyle = color;
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + w, y);
    
    if (notchSide === 'right' && notchP > 0) {
        ctx.lineTo(x + w, notchY - 20 * notchP);
        ctx.arc(x + w, notchY, 20 * notchP, -Math.PI/2, Math.PI/2, true);
        ctx.lineTo(x + w, y + h);
    } else {
        ctx.lineTo(x + w, y + h);
    }

    ctx.lineTo(x, y + h);

    if (notchSide === 'left' && notchP > 0) {
        ctx.lineTo(x, notchY + 20 * notchP);
        ctx.arc(x, notchY, 20 * notchP, Math.PI/2, -Math.PI/2, true);
        ctx.lineTo(x, y);
    } else {
        ctx.lineTo(x, y);
    }
    
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
}

// 繪圖核心
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    // 為了容納左右的解答面板，將畫布往右平移並微調縮放
    ctx.translate(90, 40); 
    ctx.scale(1.13, 1.13);
    
    drawApparatus();
    if (state.validReaction && state.step > 0) {
        drawReactionDynamics();
    }
    
    // 若開啟解答模式，則在兩側繪製面板
    if (state.showAnswers) {
        drawAnswerSummary();
    }

    ctx.restore();
}

// 繪製靜態儀器
function drawApparatus() {
    ctx.fillStyle = getSolutionColor('left');
    ctx.fillRect(100, 250, 150, 150);
    ctx.fillStyle = getSolutionColor('right');
    ctx.fillRect(450, 250, 150, 150);

    ctx.lineWidth = 3;
    ctx.strokeStyle = '#94a3b8';
    ctx.beginPath(); ctx.moveTo(100, 200); ctx.lineTo(100, 400); ctx.lineTo(250, 400); ctx.lineTo(250, 200); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(450, 200); ctx.lineTo(450, 400); ctx.lineTo(600, 400); ctx.lineTo(600, 200); ctx.stroke();

    ctx.strokeStyle = '#94a3b8'; 
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(100, 250); ctx.lineTo(250, 250);
    ctx.moveTo(450, 250); ctx.lineTo(600, 250); ctx.stroke();

    ctx.strokeStyle = '#333';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(175, 120); ctx.lineTo(175, 50); ctx.lineTo(300, 50); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(400, 50); ctx.lineTo(525, 50); ctx.lineTo(525, 120); ctx.stroke();

    ctx.fillStyle = '#1e293b';
    ctx.fillRect(300, 20, 100, 80);
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(310, 30, 80, 50);
    ctx.fillStyle = 'black';
    ctx.font = '14px Arial';
    ctx.fillText('G', 345, 75);
    
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let i=-3; i<=3; i++){
        let ax = 350 + i*10;
        ctx.moveTo(ax, 40); ctx.lineTo(ax, 45);
    }
    ctx.stroke();

    // 💡 指針邏輯修正：只要超過步驟 2 (電子抵達檢流計後)，指針就會一直維持偏轉，不會歸零
    let angle = 0;
    if (state.validReaction && state.step >= 2) {
        angle = state.anodeSide === 'left' ? 20 : -20; 
        if(state.isPlaying || state.step > 2) state.needleAngle += (angle - state.needleAngle) * 0.1;
    } else {
        state.needleAngle += (0 - state.needleAngle) * 0.1;
    }
    ctx.save();
    ctx.translate(350, 70);
    ctx.rotate(state.needleAngle * Math.PI / 180);
    ctx.strokeStyle = 'red';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -30); ctx.stroke();
    ctx.restore();

    let lWidth = 40;
    if(state.validReaction && state.anodeSide === 'left' && state.step >= 1) lWidth -= state.leftMassChange;
    if(state.validReaction && state.anodeSide === 'right' && state.step >= 5) lWidth += state.leftMassChange;
    let lNotchSide = (state.validReaction && state.anodeSide === 'left' && state.step >= 1) ? 'right' : null;
    let lNotchP = (state.validReaction && state.anodeSide === 'left') ? (state.step === 1 ? state.progress : 1.0) : 0;
    drawElectrodePath(ctx, 175 - lWidth/2, 120, lWidth, 240, state.config.left.metal.color, lNotchSide, lNotchP, 300);
    
    ctx.fillStyle = 'black'; ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'right'; ctx.fillText(state.config.left.metal.symbol, 135, 150);

    let rWidth = 40;
    if(state.validReaction && state.anodeSide === 'right' && state.step >= 1) rWidth -= state.rightMassChange;
    if(state.validReaction && state.anodeSide === 'left' && state.step >= 5) rWidth += state.rightMassChange;
    let rNotchSide = (state.validReaction && state.anodeSide === 'right' && state.step >= 1) ? 'left' : null;
    let rNotchP = (state.validReaction && state.anodeSide === 'right') ? (state.step === 1 ? state.progress : 1.0) : 0;
    drawElectrodePath(ctx, 525 - rWidth/2, 120, rWidth, 240, state.config.right.metal.color, rNotchSide, rNotchP, 300);
    
    ctx.fillStyle = 'black'; ctx.font = 'bold 24px sans-serif';
    ctx.textAlign = 'left'; ctx.fillText(state.config.right.metal.symbol, 565, 150);

    ctx.strokeStyle = '#64748b'; 
    ctx.lineWidth = 32;
    ctx.lineCap = 'butt'; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(220, 320); ctx.lineTo(220, 180); ctx.arcTo(220, 140, 260, 140, 40);
    ctx.lineTo(440, 140); ctx.arcTo(480, 140, 480, 180, 40); ctx.lineTo(480, 320); ctx.stroke();

    ctx.strokeStyle = 'rgba(235, 245, 255, 0.9)'; 
    ctx.lineWidth = 28; ctx.stroke();
    
    ctx.fillStyle = 'white'; ctx.strokeStyle = '#64748b'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(220, 320, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(480, 320, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';

    let lCationX = 140, lCationY = 320, lAnionX = 140, lAnionY = 370, lSol = state.config.left.solName;
    ctx.fillStyle = 'black';
    if (!state.validReaction || state.anodeSide === 'left' || state.step < 4) {
        if (lSol === 'AgNO3') {
            ctx.fillText(state.config.left.sol.cation, lCationX, lCationY - 15);
            ctx.fillText(state.config.left.sol.cation, lCationX, lCationY + 15);
        } else { ctx.fillText(state.config.left.sol.cation, lCationX, lCationY); }
    }
    if (lSol === 'AgNO3') {
        ctx.fillText(state.config.left.sol.anion, lAnionX + 40, lAnionY - 15);
        ctx.fillText(state.config.left.sol.anion, lAnionX + 40, lAnionY + 15);
    } else { ctx.fillText(state.config.left.sol.anion, lAnionX, lAnionY); }

    let rCationX = 560, rCationY = 320, rAnionX = 560, rAnionY = 370, rSol = state.config.right.solName;
    ctx.fillStyle = 'black';
    if (!state.validReaction || state.anodeSide === 'right' || state.step < 4) {
         if (rSol === 'AgNO3') {
            ctx.fillText(state.config.right.sol.cation, rCationX, rCationY - 15);
            ctx.fillText(state.config.right.sol.cation, rCationX, rCationY + 15);
        } else { ctx.fillText(state.config.right.sol.cation, rCationX, rCationY); }
    }
    if (rSol === 'AgNO3') {
        ctx.fillText(state.config.right.sol.anion, rAnionX - 40, rAnionY - 15);
        ctx.fillText(state.config.right.sol.anion, rAnionX - 40, rAnionY + 15);
    } else { ctx.fillText(state.config.right.sol.anion, rAnionX, rAnionY); }

    if (!state.validReaction || state.step < 6) {
        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = 'green'; ctx.fillText(state.config.salt.cation, 280, 150); 
        ctx.fillStyle = 'purple'; ctx.fillText(state.config.salt.anion, 320, 150);  
        ctx.fillStyle = 'green'; ctx.fillText(state.config.salt.cation, 380, 150); 
        ctx.fillStyle = 'purple'; ctx.fillText(state.config.salt.anion, 420, 150);  
    }
}

function drawReactionDynamics() {
    const p = state.progress;
    const anodeX = state.anodeSide === 'left' ? 175 : 525;
    const cathodeX = state.anodeSide === 'left' ? 525 : 175;
    const anodeMetal = state.config[state.anodeSide].metal;
    const cathodeMetal = state.config[state.anodeSide==='left'?'right':'left'].metal;

    ctx.textAlign = 'center';

    if (state.step === 1) { state.leftMassChange = p * 5; state.rightMassChange = 0; } 
    else if (state.step > 1 && state.step < 5) { state.leftMassChange = 5; state.rightMassChange = 0; } 
    else if (state.step === 5) { state.leftMassChange = 5; state.rightMassChange = p * 5; } 
    else if (state.step >= 6) { state.leftMassChange = 5; state.rightMassChange = 5; }

    if (state.step >= 1) {
        let ionP = state.step === 1 ? p : 1;
        let dir = state.anodeSide === 'left' ? 1 : -1;
        let startX = anodeX + dir * 20, startY = 300, endX = anodeX + dir * 40, endY = 350; 
        let ionX = startX + (endX - startX) * ionP, ionY = startY + (endY - startY) * ionP;
        
        ctx.fillStyle = '#0284c7'; ctx.font = 'bold 24px Arial'; ctx.fillText(anodeMetal.ion, ionX, ionY);
        if (state.step === 1) {
            ctx.globalAlpha = p;
            drawArrow(ctx, startX, startY, endX, endY, '#0284c7'); 
            drawArrow(ctx, anodeX - 25, 140, anodeX - 25, 80, '#eab308'); 
            ctx.globalAlpha = 1.0;
        }
    }

    if (state.step === 1) {
        drawElectron(anodeX, 250 - 200*p); drawElectron(anodeX+16, 260 - 200*p); 
    }
    
    if (state.step === 2) {
        let ex1, ey1;
        if (state.anodeSide === 'left') {
            ex1 = 175 + (125 * p); ey1 = 50; 
            if (p > 0.1) { ctx.globalAlpha = p; drawArrow(ctx, 210, 35, 280, 35, '#eab308'); ctx.globalAlpha = 1.0; }
        } else {
            ex1 = 525 - (125 * p); ey1 = 50; 
            if (p > 0.1) { ctx.globalAlpha = p; drawArrow(ctx, 490, 35, 420, 35, '#eab308'); ctx.globalAlpha = 1.0; }
        }
        drawElectron(ex1, ey1); drawElectron(ex1+16, ey1);
    }

    if (state.step === 3) {
        let ex1, ey1;
        if (state.anodeSide === 'left') {
            ex1 = 400 + (125 * p); ey1 = 50;
            if(p>0.9) ey1 = 50 + (200 * (p-0.9)*10); 
            ctx.globalAlpha = p; drawArrow(ctx, 420, 35, 490, 35, '#eab308');
            if (p > 0.5) drawArrow(ctx, 550, 60, 550, 100, '#eab308'); ctx.globalAlpha = 1.0;
        } else {
            ex1 = 300 - (125 * p); ey1 = 50;
            if(p>0.9) ey1 = 50 + (200 * (p-0.9)*10);
            ctx.globalAlpha = p; drawArrow(ctx, 280, 35, 210, 35, '#eab308');
            if (p > 0.5) drawArrow(ctx, 150, 60, 150, 100, '#eab308'); ctx.globalAlpha = 1.0;
        }
        drawElectron(ex1, ey1); drawElectron(ex1+16, ey1);
    }

    if (state.step === 4) {
        drawElectron(cathodeX, 150 + 100*p); drawElectron(cathodeX+16, 160 + 100*p);
        let startX = cathodeX > 350 ? 560 : 140, startY = 320, endX = cathodeX > 350 ? 500 : 200, endY = 250;

        ctx.fillStyle = '#0284c7'; ctx.font = 'bold 24px Arial'; 
        if (state.config[state.anodeSide==='left'?'right':'left'].solName === 'AgNO3') {
             let cX1 = startX + (endX - startX) * p, cY1 = (startY - 15) + ((endY - 10) - (startY - 15)) * p;
             let cX2 = startX + (endX - startX) * p, cY2 = (startY + 15) + ((endY + 10) - (startY + 15)) * p;
             ctx.fillText(cathodeMetal.ion, cX1, cY1); ctx.fillText(cathodeMetal.ion, cX2, cY2);
             ctx.globalAlpha = p;
             drawArrow(ctx, startX - (cathodeX>350?15:-15), startY - 25, endX + (cathodeX>350?15:-15), endY - 10, '#0284c7');
             drawArrow(ctx, startX - (cathodeX>350?15:-15), startY + 5, endX + (cathodeX>350?15:-15), endY + 10, '#0284c7');
             ctx.globalAlpha = 1.0;
        } else {
            let cX = startX + (endX - startX) * p, cY = startY + (endY - startY) * p;
            ctx.fillText(cathodeMetal.ion, cX, cY);
            ctx.globalAlpha = p; drawArrow(ctx, startX - (cathodeX>350?15:-15), startY - 10, endX + (cathodeX>350?15:-15), endY + 10, '#0284c7'); ctx.globalAlpha = 1.0;
        }
    }

    if (state.step === 5) {
        if (p < 0.5) { drawElectron(cathodeX, 250); drawElectron(cathodeX+16, 260); }
    }
    
    if (state.step >= 5) {
        let atomP = state.step === 5 ? p : 1.0;
        ctx.fillStyle = cathodeMetal.color; ctx.strokeStyle = '#000000'; ctx.lineWidth = 1.5;
        if (state.config[state.anodeSide==='left'?'right':'left'].solName === 'AgNO3') {
             ctx.beginPath(); ctx.arc(cathodeX, 240, 10 * atomP, 0, Math.PI*2); ctx.fill(); if(atomP>0.05) ctx.stroke(); 
             ctx.beginPath(); ctx.arc(cathodeX, 260, 10 * atomP, 0, Math.PI*2); ctx.fill(); if(atomP>0.05) ctx.stroke(); 
        } else {
             ctx.beginPath(); ctx.arc(cathodeX, 250, 12 * atomP, 0, Math.PI*2); ctx.fill(); if(atomP>0.05) ctx.stroke(); 
        }
    }

    if (state.step >= 6) {
        let pSB = state.step === 6 ? p : 1.0;
        const sbAnion = state.config.salt.anion, sbCation = state.config.salt.cation;
        let anodeTargetX = state.anodeSide === 'left' ? 220 : 480, cathodeTargetX = state.anodeSide === 'left' ? 480 : 220;
        let a1x, a1y, a2x, a2y, c1x, c1y, c2x, c2y;
        
        if (pSB < 0.5) {
            let hp = pSB * 2;
            a1x = 320 + (anodeTargetX - 320) * hp; a1y = 150; a2x = 420 + (anodeTargetX - 420) * hp; a2y = 150;
            c1x = 280 + (cathodeTargetX - 280) * hp; c1y = 150; c2x = 380 + (cathodeTargetX - 380) * hp; c2y = 150;
        } else {
            let vp = (pSB - 0.5) * 2;
            a1x = anodeTargetX; a1y = 150 + (360 - 150) * vp; a2x = anodeTargetX; a2y = 150 + (330 - 150) * vp;
            c1x = cathodeTargetX; c1y = 150 + (360 - 150) * vp; c2x = cathodeTargetX; c2y = 150 + (330 - 150) * vp;
        }

        ctx.font = 'bold 16px Arial'; 
        ctx.fillStyle = 'purple'; ctx.fillText(sbAnion, a1x, a1y); ctx.fillText(sbAnion, a2x, a2y);
        ctx.fillStyle = 'green'; ctx.fillText(sbCation, c1x, c1y); ctx.fillText(sbCation, c2x, c2y);

        if (state.step === 6) {
            ctx.globalAlpha = pSB;
            drawArrow(ctx, 320, 150, anodeTargetX + (anodeTargetX>350?-15:15), 150, 'purple'); drawArrow(ctx, anodeTargetX, 160, anodeTargetX, 310, 'purple'); 
            drawArrow(ctx, 380, 150, cathodeTargetX + (cathodeTargetX>350?-15:15), 150, 'green'); drawArrow(ctx, cathodeTargetX, 160, cathodeTargetX, 310, 'green'); 
            ctx.globalAlpha = 1.0;
        }
    }
    ctx.textAlign = 'left'; 
}

function drawElectron(x, y) {
    ctx.fillStyle = '#eab308'; ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2); ctx.fill(); 
    ctx.save(); ctx.fillStyle = 'black'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('e⁻', x, y + 1); ctx.restore();
}

function updateText() {
    if (!state.validReaction) {
        statusText.innerText = state.errorMsg;
        reactionEq.innerText = '';
        return;
    }

    if (state.step === 0) {
        statusText.innerText = stepDescriptions[0];
        reactionEq.innerText = '';
        return;
    }

    statusText.innerText = stepDescriptions[state.step];
    
    const anodeMetal = state.config[state.anodeSide].metal;
    const cathodeSide = state.anodeSide === 'left' ? 'right' : 'left';
    const cathodeMetal = state.config[cathodeSide].metal;

    // 動態計算係數以平衡電子
    let n1 = anodeMetal.ionCharge;
    let n2 = cathodeMetal.ionCharge;
    let m1 = n2 === 1 && n1 === 2 ? 1 : (n1 === 1 && n2 === 2 ? 2 : 1);
    let m2 = n1 === 2 && n2 === 1 ? 2 : (n1 === 1 && n2 === 2 ? 1 : 1);
    
    let pAnode = m1 > 1 ? m1 : '';
    let pCathodeIon = m2 > 1 ? m2 : '';
    let pAnodeIon = m1 > 1 ? m1 : '';
    let pCathode = m2 > 1 ? m2 : '';
    let eTotal = m1 * n1; // 轉移的總電子數

    // 將半反應式的標示放置在同列後方
    let anodeHalf = `【負極】 ${pAnode}${anodeMetal.symbol} → ${pAnodeIon}${anodeMetal.ion} + ${eTotal}e⁻ (氧化半反應)`;
    let cathodeHalf = `【正極】 ${pCathodeIon}${cathodeMetal.ion} + ${eTotal}e⁻ → ${pCathode}${cathodeMetal.symbol} (還原半反應)`;

    let eqText = '';
    if (state.step >= 1 && state.step < 4) {
        eqText = anodeHalf;
    } else if (state.step >= 4 && state.step < 7) {
        eqText = `${anodeHalf}\n${cathodeHalf}`;
    } else if (state.step >= 7) {
        eqText = `🌟【電池全反應式】🌟\n${pAnode}${anodeMetal.symbol} + ${pCathodeIon}${cathodeMetal.ion} → ${pAnodeIon}${anodeMetal.ion} + ${pCathode}${cathodeMetal.symbol}`;
    }
    reactionEq.innerText = eqText;
}

let currentQuizPage = 0;
const questionsPerPage = 2;
let userAnswers = {};

function initQuiz() {
    document.getElementById('quizContainer').classList.remove('hidden');
    currentQuizPage = 0;
    userAnswers = {};
    renderQuizPage();
    setTimeout(() => {
        document.getElementById('quizContainer').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 200);
}

function renderQuizPage() {
    const form = document.getElementById('quizForm');
    form.innerHTML = '';
    document.getElementById('quizResult').classList.add('hidden');
    
    const start = currentQuizPage * questionsPerPage;
    const end = Math.min(start + questionsPerPage, questions.length);
    const pageQuestions = questions.slice(start, end);

    document.getElementById('quizProgress').innerText = `(第 ${start + 1}-${end} 題 / 共 ${questions.length} 題)`;

    pageQuestions.forEach((q) => {
        // 使用 flex-row 與 justify-between 讓選項緊跟在題目後方
        let html = `<div class="bg-white px-4 py-2.5 rounded-xl shadow-sm border border-green-100 flex flex-col md:flex-row md:items-center justify-between gap-3">
            <p class="font-bold text-gray-800 text-sm md:text-base m-0 shrink-0">${q.text}</p>
            <div class="flex flex-wrap gap-2 shrink-0">`;
        q.options.forEach((opt, j) => {
            const isChecked = userAnswers[q.id] === j ? 'checked' : '';
            const activeClass = isChecked ? 'border-green-500 bg-green-50 ring-2 ring-green-200' : 'border-gray-200 bg-gray-50 hover:bg-green-50/50';
            html += `<label class="flex items-center gap-1.5 cursor-pointer text-sm px-3 py-1.5 rounded-lg border transition-all ${activeClass}">
                <input type="radio" name="${q.id}" value="${j}" ${isChecked} class="w-3.5 h-3.5 text-green-600 focus:ring-green-500" onchange="handleAnswer('${q.id}', ${j})"> 
                <span class="font-medium text-gray-700">${opt}</span>
            </label>`;
        });
        html += `</div></div>`;
        form.innerHTML += html;
    });

    const btnPrev = document.getElementById('btnQuizPrev');
    const btnNext = document.getElementById('btnQuizNext');
    const btnSubmit = document.getElementById('btnQuizSubmit');

    btnPrev.classList.toggle('hidden', currentQuizPage === 0);
    
    if (end < questions.length) {
        btnNext.classList.remove('hidden');
        btnSubmit.classList.add('hidden');
    } else {
        btnNext.classList.add('hidden');
        btnSubmit.classList.remove('hidden');
    }
}

window.handleAnswer = function(qId, val) {
    userAnswers[qId] = val;
    renderQuizPage(); 
};

document.getElementById('btnQuizPrev').addEventListener('click', () => {
    if (currentQuizPage > 0) { currentQuizPage--; renderQuizPage(); }
});

document.getElementById('btnQuizNext').addEventListener('click', () => {
    const start = currentQuizPage * questionsPerPage;
    const end = start + questionsPerPage;
    const pageQuestions = questions.slice(start, end);
    const allAnswered = pageQuestions.every(q => userAnswers[q.id] !== undefined);
    
    if (!allAnswered) {
        alert("💡 提示：請先完成這兩題再進入下一頁喔！");
        return;
    }

    if (end < questions.length) { currentQuizPage++; renderQuizPage(); }
});

document.getElementById('btnQuizSubmit').addEventListener('click', () => {
    const missing = questions.filter(q => userAnswers[q.id] === undefined);
    if(missing.length > 0) {
        alert(`⚠️ 您還有 ${missing.length} 題未作答！請往前檢查。`);
        return;
    }

    let score = 0;
    questions.forEach((q) => { if (userAnswers[q.id] === q.ansIndex()) score++; });
    
    const resDiv = document.getElementById('quizResult');
    resDiv.classList.remove('hidden');
    
    if(score === 10) { 
        resDiv.innerHTML = `🎉 全對！獲得 100 分！已在上方顯示各極的觀念總結！`;
        resDiv.className = "mt-0 font-bold text-center text-green-700 text-sm md:text-base p-2 bg-green-100 rounded-lg border border-green-300 flex-1 mr-3 super-tight-line";
    } else {
        resDiv.innerHTML = `💪 答對了 ${score}/10 題。已在上方顯示解答，請對照複習！`;
        resDiv.className = "mt-0 font-bold text-center text-orange-700 text-sm md:text-base p-2 bg-orange-100 rounded-lg border border-orange-300 flex-1 mr-3 super-tight-line";
    }

    // 💡 重點：顯示解答面板並捲動到畫布最上方
    state.showAnswers = true;
    draw();
    document.getElementById('rightPanel').scrollTo({ top: 0, behavior: 'smooth' });
});

// 事件監聽 (控制按鈕)
btnPlay.addEventListener('click', () => {
    if (!state.validReaction) { alert(state.errorMsg); return; }
    if (state.step >= 8) init(); 
    if (state.step === 0) state.step = 1;
    state.isPlaying = true;
    state.pauseAfterStep = false;
    state.showAnswers = false; // 播放時隱藏解答
});

btnPause.addEventListener('click', () => { 
    state.isPlaying = false; 
    state.pauseAfterStep = false;
});

btnStep.addEventListener('click', () => {
    if (!state.validReaction) return;
    
    if (state.step < 7) {
        if (state.step === 0) { state.step = 1; state.progress = 0; }
        state.isPlaying = true;
        state.pauseAfterStep = true;
        state.showAnswers = false; // 隱藏解答
    } else if (state.step === 7) {
        state.step = 8;
        updateText();
        initQuiz();
    }
});

btnPrev.addEventListener('click', () => {
    if (!state.validReaction) return;
    state.isPlaying = false;
    state.pauseAfterStep = false;
    state.showAnswers = false; // 倒退時隱藏解答
    
    if (state.step > 1) {
        state.step--;
        state.progress = 0;
        document.getElementById('quizContainer').classList.add('hidden');
    } else if (state.step === 1) {
        state.step = 0;
        state.progress = 0;
    }
    updateText();
    draw();
});

btnReset.addEventListener('click', init);

// 初始化：載入選項並啟動
updateDropdownOptions();
requestAnimationFrame(animate);

</script>
</body>
</html>
