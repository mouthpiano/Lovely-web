<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>力的合成與情境物理模擬 - 互動實驗室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; overflow: hidden; background-color: #f3f4f6; }
        
        /* 浮水印 */
        .watermark-top-right { position: absolute; top: 15px; right: 20px; text-align: right; font-size: 0.875rem; color: rgba(107, 114, 128, 0.8); pointer-events: none; z-index: 50; line-height: 1.2; font-weight: 600; }
        .watermark-bottom { position: absolute; bottom: 10px; left: 0; width: 100%; text-align: center; font-size: 0.875rem; color: rgba(107, 114, 128, 0.8); pointer-events: none; z-index: 50; font-weight: 600; }

        input[type=range] { accent-color: #3b82f6; }
        
        /* 隱藏卷軸但保留滑動功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 彩蛋大字報特效 */
        .easter-egg-popup {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            border: 4px dashed #ef4444;
            padding: 2rem;
            border-radius: 1rem;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 100;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- 浮水印：右上角 -->
    <div class="watermark-top-right">Designed by 黃鈺心,<br>Gemini Canvas輔助生成</div>

    <!-- 頂部頁籤 (Tabs) -->
    <div class="bg-gray-800 text-white shadow-md z-20 flex px-4">
        <div class="py-3 px-6 cursor-pointer font-bold border-b-4 border-blue-500 tab-btn" data-target="free-mode">
            ⚙️ 自由探索模式 (多力合成)
        </div>
        <div class="py-3 px-6 cursor-pointer font-bold border-b-4 border-transparent text-gray-400 hover:text-white tab-btn" data-target="scenario-mode">
            🌍 情境模擬模式
        </div>
    </div>

    <!-- 主要內容區 -->
    <div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">
        
        <!-- 左側控制面板 (自由模式) - 寬度微調以容納新版面 -->
        <div id="free-mode-panel" class="w-full md:w-[360px] bg-white shadow-xl p-3 flex flex-col z-10 overflow-y-auto no-scrollbar transition-all duration-300">
            
            <!-- 全域控制區 (極致壓縮：啟動、重設、速度、單位在同一區塊) -->
            <div class="flex flex-wrap items-center justify-between gap-1 mb-2 pb-2 border-b-2 border-gray-200">
                <div class="flex gap-1">
                    <button id="start-btn-free" class="bg-indigo-600 hover:bg-indigo-700 text-white text-[13px] font-bold py-1 px-2 rounded shadow">▶啟動</button>
                    <button id="reset-btn-free" class="bg-gray-500 hover:bg-gray-600 text-white text-[13px] font-bold py-1 px-2 rounded shadow">↺重設</button>
                </div>
                
                <div class="flex items-center gap-1 text-[11px] font-bold text-gray-700">
                    <span title="動畫速度">⏱</span>
                    <input type="range" id="sim-speed" min="1" max="20" value="10" class="w-14">
                    <span id="speed-val" class="w-7 text-right">1.0x</span>
                </div>
                
                <select id="unit-select" class="border-gray-300 rounded shadow-sm text-[12px] font-bold p-1 bg-white border focus:border-blue-500">
                    <option value="kgw">kgw</option>
                    <option value="N">N</option>
                    <option value="gw">gw</option>
                </select>
            </div>

            <!-- 顯示控制區 (合力、分力、數值橫向排列) -->
            <div class="flex justify-around items-center mb-2 bg-gray-50 py-1.5 px-1 rounded border border-gray-200 text-sm font-bold text-gray-700 shadow-sm">
                <label class="flex items-center cursor-pointer hover:text-blue-600">
                    <input type="checkbox" id="toggle-components" checked class="mr-1 w-4 h-4 text-blue-600 rounded"> 分力
                </label>
                <label class="flex items-center cursor-pointer hover:text-red-600">
                    <input type="checkbox" id="toggle-netforce" class="mr-1 w-4 h-4 text-red-600 rounded"> 合力
                </label>
                <label class="flex items-center cursor-pointer hover:text-green-600">
                    <input type="checkbox" id="toggle-values" checked class="mr-1 w-4 h-4 text-green-600 rounded"> 數值
                </label>
            </div>

            <div class="flex justify-between items-center mb-2 mt-1">
                <h2 class="font-bold text-gray-800 text-sm">分力列表</h2>
                <button id="add-force-btn" class="bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-1 px-2 rounded text-xs shadow-sm">+ 新增分力</button>
            </div>
            
            <!-- 動態分力列表容器 (現在有巨大空間了) -->
            <div id="forces-list" class="flex-1 overflow-y-auto pr-1">
                <!-- Javascript 將在此動態生成控制項 -->
            </div>

            <!-- 合力結果 -->
            <div class="bg-red-50 rounded-lg p-2 mt-2 border border-red-100 shadow-inner shrink-0">
                <h2 class="font-bold text-red-700 text-[13px] mb-1">總合力 (F_net) 數值</h2>
                <div class="flex justify-between text-sm">
                    <span>大小: <span id="free-res-mag" class="font-bold text-red-600">0</span> <span id="free-res-unit" class="text-red-600 font-bold text-xs">kgw</span></span>
                    <span>角度: <span id="free-res-ang" class="font-bold text-red-600">0</span>°</span>
                </div>
            </div>
        </div>

        <!-- 左側控制面板 (情境模式) -->
        <div id="scenario-mode-panel" class="w-full md:w-80 bg-white shadow-xl p-4 flex flex-col z-10 overflow-y-auto no-scrollbar hidden transition-all duration-300">
            <h2 class="font-bold text-gray-800 text-xl mb-4 border-b-2 border-green-500 pb-2">選擇情境與物品</h2>
            
            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">1. 選擇環境情境：</label>
                <select id="env-select" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border focus:border-green-500 focus:ring-green-500">
                    <option value="none">-- 請選擇 --</option>
                    <option value="air">☁️ 天空 (自由落體)</option>
                    <option value="pool">💧 水池 (浮力測試)</option>
                    <option value="road">🛣️ 馬路 (摩擦力與推力)</option>
                </select>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-bold text-gray-700 mb-2">2. 選擇測試物品：</label>
                <select id="obj-select" class="w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border focus:border-green-500 focus:ring-green-500">
                    <option value="none">-- 請選擇 --</option>
                    <option value="baseball">⚾ 棒球</option>
                    <option value="plastic-ball">🎈 塑膠球 (輕)</option>
                    <option value="car">🚗 汽車</option>
                </select>
            </div>

            <!-- 情境受力分析區 -->
            <div id="scenario-forces-area" class="flex-1 hidden flex-col">
                <h3 class="font-bold text-gray-700 mb-2 mt-4 bg-gray-200 px-2 py-1 rounded">當前受力分析 (可勾選關閉)</h3>
                <div id="scenario-forces-list" class="flex-1">
                    <!-- 動態生成情境力 -->
                </div>
                
                <div class="flex gap-2 mt-4">
                    <button id="start-btn-scene" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-2 rounded shadow text-lg">▶ 啟動模擬</button>
                    <button id="reset-btn-scene" class="flex-1 bg-gray-500 hover:bg-gray-600 text-white font-bold py-3 px-2 rounded shadow">↺ 復原</button>
                </div>
            </div>
            
            <div id="scenario-hint" class="text-sm text-gray-500 mt-4 italic text-center">請先選擇環境與物品以載入物理引擎。</div>
        </div>

        <!-- 右側畫布區 -->
        <div class="flex-1 relative bg-white" id="canvas-container">
            <canvas id="simCanvas"></canvas>
            
            <!-- 彩蛋警告視窗 -->
            <div id="easter-egg" class="easter-egg-popup">
                <h1 class="text-3xl font-black text-red-600 mb-4">🚨 物理法則異常！</h1>
                <p class="text-xl font-bold text-gray-800">你把「重力」關掉了！</p>
                <p class="text-lg text-gray-600 mt-2">現實生活中，不管在水裡還是哪裡，<br>沒有重力的話，物體真的會往上飛走嗎？</p>
                <p class="text-sm text-blue-600 mt-4">（提示：想一想浮力的來源是什麼？）</p>
                <button onclick="document.getElementById('easter-egg').style.display='none'" class="mt-4 bg-red-500 text-white px-4 py-2 rounded font-bold hover:bg-red-600">我明白了，關閉視窗</button>
            </div>
        </div>
    </div>

    <!-- 浮水印：最下方 -->
    <div class="watermark-bottom">Designed by 黃鈺心, Gemini Canvas輔助生成</div>

    <script>
        /* =================核心變數設定================= */
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        
        let currentMode = 'free-mode'; // 'free-mode' or 'scenario-mode'
        let isAnimating = false;
        let animationId;
        
        // 關鍵設定：10 單位力 = 1 格。透過 scale 放縮 (例如 scale = 4，則 10 單位 = 40px)
        const scale = 4; 

        // 物體與物理狀態
        let obj = { x: 0, y: 0, vx: 0, vy: 0, mass: 1, radius: 15 };
        let speedMultiplier = 0.005; 

        // 自由模式：顯示切換狀態
        let showComponents = true;
        let showNetForce = false;
        let showValues = true;
        let currentUnit = 'kgw'; // 預設配合截圖改為 kgw

        // 自由模式：動態分力陣列
        let freeForces = [];
        const colorPalette = ['#3b82f6', '#22c55e', '#f59e0b', '#8b5cf6', '#ec4899', '#14b8a6', '#f43f5e'];
        let colorIndex = 0;

        // 情境模式狀態
        let sceneEnv = 'none';
        let sceneObj = 'none';
        let sceneForces = [];
        let sceneEasterEggTriggered = false;

        /* =================畫布與基礎函數================= */
        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);
        
        const degToRad = (deg) => deg * (Math.PI / 180);
        const radToDeg = (rad) => { let d = rad * (180 / Math.PI); return d < 0 ? d + 360 : d; };

        // 畫向量箭頭
        function drawArrow(fromX, fromY, toX, toY, color, label, width = 3) {
            const headlen = 12;
            const dx = toX - fromX;
            const dy = toY - fromY;
            const length = Math.sqrt(dx*dx + dy*dy);
            if (length < 1) return;

            const angle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.fillStyle = color;
            ctx.moveTo(toX, toY);
            ctx.lineTo(toX - headlen * Math.cos(angle - Math.PI / 6), toY - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(toX - headlen * Math.cos(angle + Math.PI / 6), toY - headlen * Math.sin(angle + Math.PI / 6));
            ctx.fill();

            if(label) {
                ctx.save();
                ctx.scale(1, -1); 
                ctx.fillStyle = color;
                ctx.font = "bold 14px sans-serif";
                
                // 讓文字稍微浮動，避免擋住線條
                const textOffsetX = 5 * Math.cos(angle);
                const textOffsetY = 5 * Math.sin(angle);
                ctx.fillText(label, toX + textOffsetX + 5, -toY - textOffsetY - 5);
                ctx.restore();
            }
        }

        /* =================自由模式邏輯================= */
        // 綁定顯示開關事件
        document.getElementById('toggle-components').addEventListener('change', (e) => { showComponents = e.target.checked; if(!isAnimating) draw(); });
        document.getElementById('toggle-netforce').addEventListener('change', (e) => { showNetForce = e.target.checked; if(!isAnimating) draw(); });
        document.getElementById('toggle-values').addEventListener('change', (e) => { showValues = e.target.checked; if(!isAnimating) draw(); });
        document.getElementById('unit-select').addEventListener('change', (e) => {
            currentUnit = e.target.value;
            document.getElementById('free-res-unit').textContent = currentUnit;
            if (currentMode === 'scenario-mode') renderScenarioForcesUI();
            if(!isAnimating) draw();
        });

        function addFreeForce(mag = 50, ang = 0) {
            const id = Date.now().toString() + Math.floor(Math.random()*100);
            const color = colorPalette[colorIndex % colorPalette.length];
            colorIndex++;
            freeForces.push({ id, mag, ang, color });
            renderFreeForcesUI();
            updatePhysics();
        }

        function removeFreeForce(id) {
            freeForces = freeForces.filter(f => f.id !== id);
            renderFreeForcesUI();
            updatePhysics();
        }

        // 新增：透過按鈕精確增減力的大小 (符合點一次跳 10 的需求)
        window.changeForceMag = function(id, delta) {
            const force = freeForces.find(f => f.id === id);
            if (force) {
                let newVal = force.mag + delta;
                if (newVal < 0) newVal = 0;
                if (newVal > 200) newVal = 200;
                force.mag = Math.round(newVal * 10) / 10; // 避免浮點數誤差
                renderFreeForcesUI();
                updatePhysics();
            }
        }

        // 新增：透過按鈕精確增減角度 (每次跳 15 度)
        window.changeForceAng = function(id, delta) {
            const force = freeForces.find(f => f.id === id);
            if (force) {
                let newVal = force.ang + delta;
                newVal = (newVal % 360 + 360) % 360; // 確保角度在 0~359 之間循環
                force.ang = Math.round(newVal); 
                renderFreeForcesUI();
                updatePhysics();
            }
        }

        function renderFreeForcesUI() {
            const list = document.getElementById('forces-list');
            list.innerHTML = '';
            freeForces.forEach((f, index) => {
                const div = document.createElement('div');
                div.className = "bg-gray-50 rounded-lg p-2 mb-2 border border-gray-200 shadow-sm relative";
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <h3 class="font-bold text-[13px] flex items-center" style="color: ${f.color}">
                            <span class="w-3 h-3 rounded-full inline-block mr-1" style="background-color: ${f.color}"></span>
                            分力 ${index + 1}
                        </h3>
                        ${freeForces.length > 1 ? `<button onclick="removeFreeForce('${f.id}')" class="text-red-500 hover:text-white hover:bg-red-500 border border-red-200 rounded px-1.5 py-0.5 transition-colors text-[11px] font-bold">✖ 刪除</button>` : ''}
                    </div>
                    
                    <!-- 大小控制 (新增 -10 與 +10 快捷鍵，同時支援小數點拖曳) -->
                    <div class="flex gap-1 text-[12px] items-center mb-1 w-full">
                        <span class="shrink-0 font-bold text-gray-600 w-8">大小:</span>
                        <button onclick="changeForceMag('${f.id}', -10)" class="bg-gray-200 hover:bg-gray-300 text-gray-800 rounded px-1.5 py-0.5 shrink-0 shadow-sm font-bold active:scale-95">-10</button>
                        <input type="range" min="0" max="200" step="0.1" value="${f.mag}" class="flex-1 min-w-0" oninput="updateFreeForce('${f.id}', 'mag', this.value)">
                        <button onclick="changeForceMag('${f.id}', 10)" class="bg-gray-200 hover:bg-gray-300 text-gray-800 rounded px-1.5 py-0.5 shrink-0 shadow-sm font-bold active:scale-95">+10</button>
                        <span class="w-10 text-right font-black shrink-0 text-gray-800">${Number(f.mag).toFixed(1)}</span>
                    </div>
                    
                    <!-- 角度控制 (新增 -15 與 +15 快捷鍵) -->
                    <div class="flex gap-1 text-[12px] items-center w-full">
                        <span class="shrink-0 font-bold text-gray-600 w-8">角度:</span>
                        <button onclick="changeForceAng('${f.id}', -15)" class="bg-gray-200 hover:bg-gray-300 text-gray-800 rounded px-1.5 py-0.5 shrink-0 shadow-sm font-bold active:scale-95">-15</button>
                        <input type="range" min="0" max="360" step="1" value="${f.ang}" class="flex-1 min-w-0" oninput="updateFreeForce('${f.id}', 'ang', this.value)">
                        <button onclick="changeForceAng('${f.id}', 15)" class="bg-gray-200 hover:bg-gray-300 text-gray-800 rounded px-1.5 py-0.5 shrink-0 shadow-sm font-bold active:scale-95">+15</button>
                        <span class="w-10 text-right font-black shrink-0 text-gray-800">${f.ang}°</span>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        window.updateFreeForce = function(id, prop, value) {
            const force = freeForces.find(f => f.id === id);
            if(force) {
                force[prop] = parseFloat(value);
                renderFreeForcesUI(); 
                updatePhysics();
            }
        }

        function calcNetForce(forces) {
            let fx = 0, fy = 0;
            forces.forEach(f => {
                if(f.active !== false) { 
                    fx += f.mag * Math.cos(degToRad(f.ang));
                    fy += f.mag * Math.sin(degToRad(f.ang));
                }
            });
            const mag = Math.sqrt(fx*fx + fy*fy);
            const ang = radToDeg(Math.atan2(fy, fx));
            return { fx, fy, mag, ang };
        }

        // 動畫速度控制調整
        document.getElementById('sim-speed').addEventListener('input', (e) => {
            const val = e.target.value;
            const displayMultiplier = (val / 10).toFixed(1); 
            document.getElementById('speed-val').innerText = `${displayMultiplier}x`;
            speedMultiplier = 0.005 * displayMultiplier;
        });

        /* =================情境模式邏輯================= */
        const envSelect = document.getElementById('env-select');
        const objSelect = document.getElementById('obj-select');
        
        function checkScenarioSetup() {
            sceneEnv = envSelect.value;
            sceneObj = objSelect.value;
            
            if (sceneEnv !== 'none' && sceneObj !== 'none') {
                document.getElementById('scenario-hint').classList.add('hidden');
                document.getElementById('scenario-forces-area').classList.remove('hidden');
                document.getElementById('scenario-forces-area').classList.add('flex');
                setupScenarioPhysics();
            } else {
                document.getElementById('scenario-hint').classList.remove('hidden');
                document.getElementById('scenario-forces-area').classList.add('hidden');
                document.getElementById('scenario-forces-area').classList.remove('flex');
            }
        }
        
        envSelect.addEventListener('change', checkScenarioSetup);
        objSelect.addEventListener('change', checkScenarioSetup);

        function setupScenarioPhysics() {
            stopAnim();
            obj = { x: 0, y: 0, vx: 0, vy: 0, mass: 1, radius: 25 };
            sceneForces = [];
            sceneEasterEggTriggered = false;
            document.getElementById('easter-egg').style.display = 'none';

            if (sceneEnv === 'air') {
                obj.y = 150; 
                sceneForces.push({ id: 'gravity', name: '重力', mag: 50, ang: 270, color: '#3b82f6', active: true, removable: true });
            } else if (sceneEnv === 'pool') {
                obj.y = 0; 
                if (sceneObj === 'plastic-ball') {
                    sceneForces.push({ id: 'gravity', name: '重力 (W)', mag: 60, ang: 270, color: '#3b82f6', active: true, removable: true });
                    sceneForces.push({ id: 'buoyancy', name: '水浮力 (B)', mag: 60, ang: 90, color: '#22c55e', active: true, removable: false });
                } else if (sceneObj === 'baseball' || sceneObj === 'car') {
                    sceneForces.push({ id: 'gravity', name: '重力 (W)', mag: 90, ang: 270, color: '#3b82f6', active: true, removable: true });
                    sceneForces.push({ id: 'buoyancy', name: '水浮力 (B)', mag: 40, ang: 90, color: '#22c55e', active: true, removable: false });
                }
            } else if (sceneEnv === 'road') {
                obj.y = -100; 
                if (sceneObj === 'car') {
                    sceneForces.push({ id: 'gravity', name: '重力 (W)', mag: 80, ang: 270, color: '#3b82f6', active: true, removable: false });
                    sceneForces.push({ id: 'normal', name: '正向力 (N)', mag: 80, ang: 90, color: '#f59e0b', active: true, removable: false });
                    sceneForces.push({ id: 'engine', name: '引擎推力 (F)', mag: 70, ang: 0, color: '#ec4899', active: true, removable: true });
                    sceneForces.push({ id: 'friction', name: '摩擦力 (f)', mag: 30, ang: 180, color: '#14b8a6', active: true, removable: true });
                } else {
                    sceneForces.push({ id: 'gravity', name: '重力 (W)', mag: 50, ang: 270, color: '#3b82f6', active: true, removable: false });
                    sceneForces.push({ id: 'normal', name: '正向力 (N)', mag: 50, ang: 90, color: '#f59e0b', active: true, removable: false });
                }
            }
            renderScenarioForcesUI();
            updatePhysics();
        }

        function renderScenarioForcesUI() {
            const list = document.getElementById('scenario-forces-list');
            list.innerHTML = '';
            sceneForces.forEach(f => {
                const div = document.createElement('div');
                div.className = `p-2 mb-2 rounded border flex items-center justify-between ${f.active ? 'bg-white border-gray-300' : 'bg-gray-100 border-gray-200 opacity-60'}`;
                div.innerHTML = `
                    <label class="flex items-center cursor-pointer flex-1">
                        <input type="checkbox" ${f.active ? 'checked' : ''} ${!f.removable ? 'disabled' : ''} 
                            onchange="toggleSceneForce('${f.id}', this.checked)" class="mr-2 w-4 h-4 text-green-600 rounded">
                        <span class="font-bold" style="color: ${f.color}">${f.name}</span>
                        <span class="ml-auto text-sm text-gray-500">${f.mag} ${currentUnit}, ${f.ang}°</span>
                    </label>
                `;
                list.appendChild(div);
            });
        }

        window.toggleSceneForce = function(id, isActive) {
            const force = sceneForces.find(f => f.id === id);
            if(force) force.active = isActive;
            renderScenarioForcesUI();
            updatePhysics();
        }

        /* =================繪圖與物理引擎================= */
        let currentNetForce = { fx:0, fy:0, mag:0, ang:0 };

        function updatePhysics() {
            const forces = currentMode === 'free-mode' ? freeForces : sceneForces;
            currentNetForce = calcNetForce(forces);

            if(currentMode === 'free-mode') {
                document.getElementById('free-res-mag').textContent = currentNetForce.mag.toFixed(1);
                document.getElementById('free-res-ang').textContent = currentNetForce.ang.toFixed(1);
            }
            
            if(!isAnimating) draw();
        }

        function drawBackground() {
            const hw = canvas.width / 2;
            const hh = canvas.height / 2;

            if (currentMode === 'free-mode' || sceneEnv === 'none') {
                ctx.strokeStyle = '#e5e7eb';
                ctx.lineWidth = 1;
                
                // 網格設定：確保一格就是等於 10 單位力
                // scale 放縮比例已定，10 單位對應的像素就是 10 * scale
                const gridSize = 10 * scale; 

                // 從中央原點 (0,0) 向外繪製 X 方向的垂直線
                for (let x = 0; x <= hw; x += gridSize) {
                    ctx.beginPath(); ctx.moveTo(x, -hh); ctx.lineTo(x, hh); ctx.stroke();
                }
                for (let x = 0; x >= -hw; x -= gridSize) {
                    ctx.beginPath(); ctx.moveTo(x, -hh); ctx.lineTo(x, hh); ctx.stroke();
                }
                
                // 從中央原點 (0,0) 向外繪製 Y 方向的水平線
                for (let y = 0; y <= hh; y += gridSize) {
                    ctx.beginPath(); ctx.moveTo(-hw, y); ctx.lineTo(hw, y); ctx.stroke();
                }
                for (let y = 0; y >= -hh; y -= gridSize) {
                    ctx.beginPath(); ctx.moveTo(-hw, y); ctx.lineTo(hw, y); ctx.stroke();
                }
                
                // 畫深色的 X, Y 軸
                ctx.strokeStyle = '#9ca3af'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(-hw, 0); ctx.lineTo(hw, 0); ctx.moveTo(0, -hh); ctx.lineTo(0, hh); ctx.stroke();
            } else if (sceneEnv === 'air') {
                const grad = ctx.createLinearGradient(0, hh, 0, -hh);
                grad.addColorStop(0, '#bae6fd'); grad.addColorStop(1, '#e0f2fe');
                ctx.fillStyle = grad; ctx.fillRect(-hw, -hh, canvas.width, canvas.height);
            } else if (sceneEnv === 'pool') {
                ctx.fillStyle = '#e0f2fe'; ctx.fillRect(-hw, 0, canvas.width, hh); 
                ctx.fillStyle = 'rgba(56, 189, 248, 0.5)'; ctx.fillRect(-hw, -hh, canvas.width, hh); 
                ctx.beginPath(); ctx.moveTo(-hw, 0); ctx.lineTo(hw, 0);
                ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 2; ctx.stroke(); 
            } else if (sceneEnv === 'road') {
                ctx.fillStyle = '#bae6fd'; ctx.fillRect(-hw, -100, canvas.width, hh + 100); 
                ctx.fillStyle = '#9ca3af'; ctx.fillRect(-hw, -hh, canvas.width, hh - 100); 
                ctx.beginPath(); ctx.moveTo(-hw, -100); ctx.lineTo(hw, -100);
                ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 4; ctx.stroke(); 
            }
        }

        function drawObject() {
            ctx.save();
            ctx.translate(obj.x, obj.y);
            
            if (currentMode === 'free-mode' || sceneObj === 'none' || sceneObj === 'plastic-ball') {
                ctx.beginPath(); ctx.arc(0, 0, obj.radius, 0, Math.PI * 2);
                const g = ctx.createRadialGradient(-5, 5, 2, 0, 0, obj.radius);
                g.addColorStop(0, sceneObj === 'plastic-ball' ? '#fcd34d' : '#fca5a5');
                g.addColorStop(1, sceneObj === 'plastic-ball' ? '#d97706' : '#b91c1c');
                ctx.fillStyle = g; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth=1; ctx.stroke();
            } else if (sceneObj === 'baseball') {
                ctx.beginPath(); ctx.arc(0, 0, obj.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#f8fafc'; ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.strokeStyle = 'red'; ctx.lineWidth = 2;
                ctx.arc(-15, 0, 18, -Math.PI/4, Math.PI/4); ctx.stroke();
                ctx.beginPath(); ctx.arc(15, 0, 18, Math.PI - Math.PI/4, Math.PI + Math.PI/4); ctx.stroke();
            } else if (sceneObj === 'car') {
                ctx.fillStyle = '#ef4444'; ctx.fillRect(-30, 0, 60, 20); 
                ctx.fillStyle = '#333'; 
                ctx.beginPath(); ctx.arc(-20, -5, 10, 0, Math.PI*2); ctx.fill(); 
                ctx.beginPath(); ctx.arc(20, -5, 10, 0, Math.PI*2); ctx.fill();  
            }
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(1, -1); // 物理 Y 軸朝上

            drawBackground();
            
            const forces = currentMode === 'free-mode' ? freeForces : sceneForces;
            const activeForces = forces.filter(f => f.active !== false);

            // 畫平行四邊形輔助線
            if (currentMode === 'free-mode' && showComponents && showNetForce && activeForces.length === 2) {
                const f1 = activeForces[0];
                const f2 = activeForces[1];
                const end1X = obj.x + f1.mag * scale * Math.cos(degToRad(f1.ang));
                const end1Y = obj.y + f1.mag * scale * Math.sin(degToRad(f1.ang));
                const end2X = obj.x + f2.mag * scale * Math.cos(degToRad(f2.ang));
                const end2Y = obj.y + f2.mag * scale * Math.sin(degToRad(f2.ang));
                const resX = obj.x + currentNetForce.mag * scale * Math.cos(degToRad(currentNetForce.ang));
                const resY = obj.y + currentNetForce.mag * scale * Math.sin(degToRad(currentNetForce.ang));

                ctx.beginPath();
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#9ca3af';
                ctx.moveTo(end1X, end1Y);
                ctx.lineTo(resX, resY);
                ctx.moveTo(end2X, end2Y);
                ctx.lineTo(resX, resY);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // 畫分力
            if (currentMode === 'scenario-mode' || (currentMode === 'free-mode' && showComponents)) {
                activeForces.forEach((f, index) => {
                    const ex = obj.x + f.mag * scale * Math.cos(degToRad(f.ang));
                    const ey = obj.y + f.mag * scale * Math.sin(degToRad(f.ang));
                    
                    let baseLabel = f.name || `F${index + 1}`;
                    let label = showValues ? `${baseLabel} (${f.mag} ${currentUnit})` : baseLabel;
                    drawArrow(obj.x, obj.y, ex, ey, f.color, label);
                });
            }

            // 畫合力
            if (currentNetForce.mag > 0.1) {
                if (currentMode === 'scenario-mode' || (currentMode === 'free-mode' && showNetForce)) {
                    const resX = obj.x + currentNetForce.mag * scale * Math.cos(degToRad(currentNetForce.ang));
                    const resY = obj.y + currentNetForce.mag * scale * Math.sin(degToRad(currentNetForce.ang));
                    
                    let label = showValues ? `合力 (${currentNetForce.mag.toFixed(1)} ${currentUnit})` : '合力Fnet';
                    drawArrow(obj.x, obj.y, resX, resY, '#000000', label, 4);
                }
            }

            drawObject();
            ctx.restore();
        }

        function animate() {
            if (!isAnimating) return;

            const ax = currentNetForce.fx * speedMultiplier;
            const ay = currentNetForce.fy * speedMultiplier;

            obj.vx += ax;
            obj.vy += ay;
            obj.x += obj.vx;
            obj.y += obj.vy;

            if (currentMode === 'scenario-mode') {
                if (sceneEnv === 'road' && obj.y < -100) { obj.y = -100; obj.vy = 0; } 
                
                if (sceneEnv === 'pool' && sceneObj === 'plastic-ball') {
                    const gravForce = sceneForces.find(f => f.id === 'gravity');
                    if (gravForce && gravForce.active === false && obj.y > 50 && !sceneEasterEggTriggered) {
                        sceneEasterEggTriggered = true;
                        stopAnim();
                        document.getElementById('easter-egg').style.display = 'block';
                    }
                }
            }

            const hw = canvas.width / 2; const hh = canvas.height / 2;
            if (Math.abs(obj.x) > hw + 50 || Math.abs(obj.y) > hh + 50) {
                stopAnim();
            }

            draw();
            if(isAnimating) animationId = requestAnimationFrame(animate);
        }

        /* =================UI 互動與初始化================= */
        function toggleAnim(btnId, playText, activeColor, hoverColor) {
            const btn = document.getElementById(btnId);
            if (isAnimating) {
                stopAnim();
            } else {
                isAnimating = true;
                btn.innerHTML = "⏸ 暫停";
                btn.classList.replace(activeColor, 'bg-yellow-500');
                btn.classList.replace(hoverColor, 'hover:bg-yellow-600');
                updatePhysics(); 
                animate();
            }
        }

        function stopAnim() {
            isAnimating = false;
            cancelAnimationFrame(animationId);
            let btn = document.getElementById('start-btn-free');
            btn.innerHTML = "▶啟動";
            btn.classList.replace('bg-yellow-500', 'bg-indigo-600');
            btn.classList.replace('hover:bg-yellow-600', 'hover:bg-indigo-700');
            btn = document.getElementById('start-btn-scene');
            btn.innerHTML = "▶ 啟動模擬";
            btn.classList.replace('bg-yellow-500', 'bg-green-600');
            btn.classList.replace('hover:bg-yellow-600', 'hover:bg-green-700');
        }

        function resetSim() {
            stopAnim();
            obj.x = 0; obj.vy = 0; obj.vx = 0;
            if(currentMode === 'scenario-mode') setupScenarioPhysics(); 
            else obj.y = 0;
            draw();
        }

        document.getElementById('start-btn-free').addEventListener('click', () => toggleAnim('start-btn-free', '▶啟動', 'bg-indigo-600', 'hover:bg-indigo-700'));
        document.getElementById('reset-btn-free').addEventListener('click', resetSim);
        document.getElementById('start-btn-scene').addEventListener('click', () => toggleAnim('start-btn-scene', '▶ 啟動模擬', 'bg-green-600', 'hover:bg-green-700'));
        document.getElementById('reset-btn-scene').addEventListener('click', resetSim);
        
        document.getElementById('add-force-btn').addEventListener('click', () => {
            // 將新增分力的初始大小設定為 0 (原本為隨機大小)
            if(freeForces.length < 10) addFreeForce(0, Math.floor(Math.random()*360));
            else alert("太多力了！畫面會爆炸啦！💥 (限制最多10個)");
        });

        document.querySelectorAll('.tab-btn').forEach(tab => {
            tab.addEventListener('click', (e) => {
                document.querySelectorAll('.tab-btn').forEach(t => {
                    t.classList.remove('border-blue-500', 'text-white');
                    t.classList.add('border-transparent', 'text-gray-400');
                });
                e.target.classList.remove('border-transparent', 'text-gray-400');
                e.target.classList.add('border-blue-500', 'text-white');

                const targetId = e.target.getAttribute('data-target');
                document.getElementById('free-mode-panel').classList.add('hidden');
                document.getElementById('scenario-mode-panel').classList.add('hidden');
                document.getElementById(targetId + '-panel').classList.remove('hidden');

                currentMode = targetId;
                resetSim();
            });
        });

        // 初始化
        // 將一開始打開網頁的兩個預設分力大小都設定為 0
        addFreeForce(0, 0); 
        addFreeForce(0, 90);
        resizeCanvas();

    </script>
</body>
