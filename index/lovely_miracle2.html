<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lovely's Miracle 幸福手札</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="font-sans pb-12 selection:bg-pink-200">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const { useState, useEffect, useRef } = React;

    // --- 圖示庫 ---
    const SvgIcon = ({ children, size = 20, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const HeartIcon = (props) => <SvgIcon {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></SvgIcon>;
    const CalendarIcon = (props) => <SvgIcon {...props}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></SvgIcon>;
    const DownloadIcon = (props) => <SvgIcon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></SvgIcon>;
    const PlusIcon = (props) => <SvgIcon {...props}><path d="M5 12h14"/><path d="M12 5v14"/></SvgIcon>;
    const SearchIcon = (props) => <SvgIcon {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></SvgIcon>;
    const TrashIcon = (props) => <SvgIcon {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></SvgIcon>;
    const CheckSquareIcon = (props) => <SvgIcon {...props}><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h11"/></SvgIcon>;
    const SquareIcon = (props) => <SvgIcon {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/></SvgIcon>;
    const ImageIcon = (props) => <SvgIcon {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></SvgIcon>;

    // --- Firebase 資料庫設定 ---
    const firebaseConfig = {
      apiKey: "AIzaSyAZWseZUCUIEIChRLACx00lP7Nq5QJEaho",
      authDomain: "lovely-s-app.firebaseapp.com",
      projectId: "lovely-s-app",
      storageBucket: "lovely-s-app.firebasestorage.app",
      messagingSenderId: "413457716527",
      appId: "1:413457716527:web:0974e91f201ef6935b3dda"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // 👇 💡 修改這裡：將 IP 圖像路徑改為 cover.jpg 👇
    const MY_IP_IMAGE_URL = "cover.jpg";

    function App() {
      const [entries, setEntries] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedIds, setSelectedIds] = useState([]);
      const [isComposing, setIsComposing] = useState(false);
      const [isExporting, setIsExporting] = useState(false);

      // 編輯器狀態
      const [newTitle, setNewTitle] = useState('');
      const [newDate, setNewDate] = useState(new Date().toISOString().split('T')[0]);
      const [newImage, setNewImage] = useState('');
      const editorRef = useRef(null);

      useEffect(() => {
        const diaryRef = collection(db, 'lovely_miracle_diary');
        const unsubscribe = onSnapshot(diaryRef, (snapshot) => {
          const fetched = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          fetched.sort((a, b) => new Date(b.date) - new Date(a.date));
          setEntries(fetched);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      // 處理圖片上傳壓縮
      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > 1200) { height *= 1200 / width; width = 1200; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            setNewImage(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      // 儲存日記
      const handleSaveEntry = async () => {
        if (!newTitle.trim()) return alert("請輸入日記標題喔！");
        
        const contentHtml = editorRef.current.innerHTML;
        const diaryRef = collection(db, 'lovely_miracle_diary');
        
        await addDoc(diaryRef, {
          title: newTitle,
          date: newDate,
          content: contentHtml,
          imageUrl: newImage,
          createdAt: Date.now()
        });
        
        setNewTitle('');
        setNewImage('');
        editorRef.current.innerHTML = '';
        setIsComposing(false);
      };

      const handleDelete = async (id) => {
        if (window.confirm("確定要刪除這篇溫馨的紀錄嗎？")) {
          await deleteDoc(doc(db, 'lovely_miracle_diary', id));
          setSelectedIds(prev => prev.filter(selectedId => selectedId !== id));
        }
      };

      const toggleSelect = (id) => {
        setSelectedIds(prev => prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]);
      };

      const toggleSelectAll = () => {
        if (selectedIds.length === filteredEntries.length) setSelectedIds([]);
        else setSelectedIds(filteredEntries.map(e => e.id));
      };

      // PDF 匯出魔法
      const exportToPDF = () => {
        if (selectedIds.length === 0) return alert("請先勾選想要打包成 PDF 的日記喔！");
        setIsExporting(true);
        
        const element = document.getElementById('pdf-export-container');
        element.style.display = 'block'; 
        
        const opt = {
          margin: 15,
          filename: 'Lovelys_Miracle_幸福手札.pdf',
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        html2pdf().set(opt).from(element).save().then(() => {
          element.style.display = 'none'; 
          setIsExporting(false);
        });
      };

      // 搜尋與月份分組
      const filteredEntries = entries.filter(e => 
        e.title.includes(searchQuery) || e.content.includes(searchQuery)
      );

      const groupedEntries = filteredEntries.reduce((groups, entry) => {
        const [year, month] = entry.date.split('-');
        const monthKey = `${year}年 ${month}月`;
        if (!groups[monthKey]) groups[monthKey] = [];
        groups[monthKey].push(entry);
        return groups;
      }, {});

      if (loading) return <div className="min-h-screen bg-pink-50/20 flex items-center justify-center font-bold text-xl text-pink-500">翻開手札中...</div>;

      return (
        <div className="min-h-screen bg-transparent text-gray-800">
          {/* 導覽列 */}
          <header className="bg-white/80 backdrop-blur-md shadow-sm border-b border-pink-100 sticky top-0 z-30">
            <div className="max-w-4xl mx-auto px-4 py-4 flex items-center gap-4">
              <div className="bg-pink-100 p-1 rounded-full border-2 border-pink-200 shrink-0 w-12 h-12 md:w-14 md:h-14 overflow-hidden shadow-sm">
                <img src={MY_IP_IMAGE_URL} alt="Lovely" className="w-full h-full object-cover rounded-full bg-white"/>
              </div>
              <div className="flex-1">
                <h1 className="text-xl md:text-2xl font-bold text-pink-600 tracking-wide flex items-center gap-2">
                  &lt;Lovely's Miracle&gt; <span className="text-gray-700">幸福手札</span>
                </h1>
                <p className="text-xs md:text-sm text-pink-400 font-medium">記錄生活中的每一個小奇蹟</p>
              </div>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-4 py-6 space-y-6">
            
            {/* 搜尋與功能區 */}
            <div className="flex flex-col md:flex-row gap-4 justify-between items-center bg-white rounded-2xl shadow-sm border border-pink-100 p-4">
              <div className="relative w-full md:w-2/3">
                <SearchIcon className="absolute left-3 top-3.5 text-gray-400" size={18} />
                <input 
                  type="text" 
                  placeholder="搜尋回憶 (標題或內文)..." 
                  value={searchQuery}
                  onChange={e => setSearchQuery(e.target.value)}
                  className="w-full pl-10 pr-4 py-2.5 bg-pink-50/30 border border-pink-100 rounded-xl outline-none focus:ring-2 focus:ring-pink-300 transition-all text-sm"
                />
              </div>
              <div className="flex gap-2 w-full md:w-auto">
                <button onClick={() => setIsComposing(!isComposing)} className="flex-1 md:flex-none bg-pink-500 hover:bg-pink-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors shadow-sm text-sm">
                  {isComposing ? '取消撰寫' : <><PlusIcon size={18}/> 新增日記</>}
                </button>
                <button onClick={exportToPDF} disabled={selectedIds.length === 0 || isExporting} className="flex-1 md:flex-none bg-rose-50 hover:bg-rose-100 text-rose-600 border border-rose-200 px-5 py-2.5 rounded-xl font-bold flex items-center justify-center gap-2 disabled:opacity-50 transition-colors shadow-sm text-sm">
                  {isExporting ? '打包中...' : <><DownloadIcon size={18}/> 匯出 PDF</>}
                </button>
              </div>
            </div>

            {/* 撰寫新日記區塊 */}
            {isComposing && (
              <div className="bg-white rounded-2xl shadow-lg border-t-4 border-pink-400 p-5 md:p-7 animate-in slide-in-from-top-4 duration-300">
                <div className="flex flex-col md:flex-row gap-4 mb-4">
                  <input type="text" placeholder="例如：今天和順吉帶著承希去公園..." value={newTitle} onChange={e => setNewTitle(e.target.value)} className="flex-1 text-lg font-bold border-b-2 border-pink-100 px-2 py-2 outline-none focus:border-pink-400 bg-transparent placeholder-gray-300"/>
                  <input type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="border-b-2 border-pink-100 px-2 py-2 outline-none focus:border-pink-400 text-gray-600 font-medium bg-transparent"/>
                </div>

                {/* 文字工具列 */}
                <div className="flex flex-wrap gap-2 mb-3 bg-pink-50/50 p-2 rounded-lg border border-pink-100">
                  <button onClick={() => document.execCommand('bold', false, null)} className="p-1.5 hover:bg-pink-200 rounded text-gray-700 font-bold px-3" title="粗體">B</button>
                  <div className="w-px bg-pink-200 mx-1"></div>
                  <div className="flex items-center gap-1 px-1">
                    <span className="text-xs text-gray-500">文字顏色</span>
                    <input type="color" onChange={(e) => document.execCommand('foreColor', false, e.target.value)} className="w-6 h-6 rounded cursor-pointer border-0 p-0" title="文字顏色"/>
                  </div>
                  <div className="w-px bg-pink-200 mx-1"></div>
                  <select onChange={(e) => document.execCommand('fontSize', false, e.target.value)} className="bg-transparent border border-pink-200 rounded text-sm text-gray-600 outline-none p-1 cursor-pointer">
                    <option value="3">標準大小</option>
                    <option value="5">放大文字</option>
                    <option value="6">標題大小</option>
                  </select>
                </div>

                {/* 可編輯內容區 */}
                <div 
                  className="w-full min-h-[200px] p-4 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-pink-200 focus:border-pink-300 mb-4 text-gray-700 leading-relaxed bg-gray-50/30"
                  contentEditable
                  ref={editorRef}
                  placeholder="寫下今天的感動，或是想對天上守護星爸爸說的話..."
                  style={{ emptyCells: 'show' }}
                ></div>

                {/* 照片上傳區 */}
                <div className="flex flex-col gap-3">
                  {newImage && (
                    <div className="relative w-full max-w-sm rounded-xl overflow-hidden shadow-sm border border-gray-100">
                      <img src={newImage} alt="Preview" className="w-full h-auto object-cover"/>
                      <button onClick={() => setNewImage('')} className="absolute top-2 right-2 bg-white/80 p-1.5 rounded-full text-red-500 hover:bg-white"><TrashIcon size={16}/></button>
                    </div>
                  )}
                  <div className="flex items-center justify-between mt-2">
                    <label className="flex items-center gap-2 text-pink-600 bg-pink-50 hover:bg-pink-100 px-4 py-2 rounded-xl cursor-pointer font-bold text-sm transition-colors border border-pink-100 shadow-sm">
                      <ImageIcon size={18} /> 加入今日照片
                      <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                    </label>
                    <button onClick={handleSaveEntry} className="bg-pink-500 hover:bg-pink-600 text-white px-8 py-2.5 rounded-xl font-bold shadow-md transition-all hover:shadow-lg">
                      封存回憶
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 日記列表區 */}
            {Object.keys(groupedEntries).length === 0 ? (
              <div className="text-center py-20 text-gray-400 bg-white/60 rounded-2xl flex flex-col items-center backdrop-blur-sm border border-pink-100/50">
                <HeartIcon className="text-pink-200 mb-4 w-16 h-16" />
                <p>手札還是空白的，快來寫下第一篇奇蹟吧！</p>
              </div>
            ) : (
              <div className="space-y-10">
                <div className="flex items-center gap-2 text-sm text-gray-500 bg-white/80 backdrop-blur-sm p-3 rounded-xl border border-pink-100 shadow-sm">
                  <button onClick={toggleSelectAll} className="flex items-center gap-1.5 hover:text-pink-500 transition-colors">
                    {selectedIds.length === filteredEntries.length && filteredEntries.length > 0 ? <CheckSquareIcon className="text-pink-500"/> : <SquareIcon />}
                    全選 / 取消全選
                  </button>
                  <span className="ml-auto">已選取 {selectedIds.length} 篇</span>
                </div>

                {Object.entries(groupedEntries).map(([month, monthEntries]) => (
                  <div key={month} className="space-y-4">
                    <h2 className="text-xl font-extrabold text-pink-800 flex items-center gap-2 border-b-2 border-pink-100/60 pb-2 backdrop-blur-sm bg-white/20 p-2 rounded-lg">
                      <CalendarIcon size={22} className="text-pink-400"/> {month}
                    </h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      {monthEntries.map(entry => (
                        <div key={entry.id} onClick={() => toggleSelect(entry.id)} className={`bg-white rounded-2xl shadow-sm border-2 overflow-hidden cursor-pointer transition-all hover:-translate-y-1 ${selectedIds.includes(entry.id) ? 'border-pink-400 ring-4 ring-pink-50' : 'border-transparent hover:shadow-md'}`}>
                          
                          {entry.imageUrl && (
                            <div className="h-48 w-full overflow-hidden bg-gray-50 border-b border-gray-100">
                              <img src={entry.imageUrl} alt="Memory" className="w-full h-full object-cover"/>
                            </div>
                          )}
                          
                          <div className="p-5">
                            <div className="flex justify-between items-start mb-3">
                              <div className="flex items-center gap-2">
                                <div className="text-pink-500 mt-1">
                                  {selectedIds.includes(entry.id) ? <CheckSquareIcon size={20}/> : <SquareIcon size={20} className="text-gray-300"/>}
                                </div>
                                <div>
                                  <h3 className="text-lg font-bold text-gray-800 line-clamp-1">{entry.title}</h3>
                                  <p className="text-xs text-pink-400 font-medium">{entry.date}</p>
                                </div>
                              </div>
                              <button onClick={(e) => { e.stopPropagation(); handleDelete(entry.id); }} className="text-gray-300 hover:text-red-400 p-1">
                                <TrashIcon size={16}/>
                              </button>
                            </div>
                            
                            <div 
                              className="text-sm text-gray-600 line-clamp-3 prose prose-pink prose-sm max-w-none"
                              dangerouslySetInnerHTML={{ __html: entry.content }}
                            />
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </main>

          {/* 👇 隱藏的 PDF 匯出版面 👇 */}
          <div style={{ display: 'none' }}>
            <div id="pdf-export-container" className="bg-white p-10 font-sans">
              <div className="text-center mb-12 border-b-2 border-pink-200 pb-6">
                <h1 className="text-4xl font-bold text-pink-600 mb-2">&lt;Lovely's Miracle&gt;</h1>
                <p className="text-xl text-gray-500">幸福手札回憶錄</p>
                <p className="text-sm text-gray-400 mt-4">匯出日期：{new Date().toLocaleDateString()}</p>
              </div>
              
              {entries.filter(e => selectedIds.includes(e.id)).map((entry, index) => (
                <div key={entry.id} className="mb-12 page-break-inside-avoid">
                  <div className="border-l-4 border-pink-400 pl-4 mb-4">
                    <h2 className="text-2xl font-bold text-gray-800">{entry.title}</h2>
                    <p className="text-pink-500 font-medium">{entry.date}</p>
                  </div>
                  
                  {entry.imageUrl && (
                    <div className="mb-6 rounded-xl overflow-hidden max-w-2xl mx-auto shadow-sm">
                      <img src={entry.imageUrl} style={{ maxHeight: '400px', width: '100%', objectFit: 'contain' }} />
                    </div>
                  )}
                  
                  <div 
                    className="text-gray-700 leading-relaxed prose prose-pink max-w-none"
                    dangerouslySetInnerHTML={{ __html: entry.content }}
                  />
                  
                  {index !== selectedIds.length - 1 && <hr className="my-10 border-pink-100" />}
                </div>
              ))}
            </div>
          </div>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
  
  <style>
    /* 👇 💡 修改這裡：套用自訂背景圖片，並加上粉色濾鏡確保可讀性 👇 */
    body {
      background-image: linear-gradient(rgba(255, 241, 242, 0.85), rgba(255, 241, 242, 0.85)), url('background.jpg');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
    }

    [contenteditable]:empty:before {
      content: attr(placeholder);
      color: #cbd5e1;
      pointer-events: none;
      display: block; 
    }
    .page-break-inside-avoid {
      page-break-inside: avoid;
    }
  </style>
</body>
</html>
