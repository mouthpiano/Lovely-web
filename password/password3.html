<!DOCTYPE html>
<html lang="zh-Hant">

    <style>
        body {
            font-family: 'Noto Serif TC', serif;
            overscroll-behavior: none;
            user-select: none;
        }

        .screen {
            transition: opacity 0.7s ease-in-out;
        }

        .hidden-screen {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }
        
        /* 確保動畫在隱藏時是透明的，且只在畫面顯示時才開始跑！ */
        .fade-in-text, .zoom-in-scale-text {
            opacity: 0;
        }
        
        .screen:not(.hidden-screen) .fade-in-text {
            animation: fadeIn 2s ease-in-out forwards;
        }
        
        /* 新增文字拉近放大動畫 (完全平滑線性版) */
        .screen:not(.hidden-screen) .zoom-in-scale-text {
            /* 使用 linear 確保放大過程等速，不產生突然放大的跳躍感 */
            animation: zoomInScale 5s linear forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes zoomInScale {
            /* 第 0 秒：0.5 倍，透明度 0 */
            0% { opacity: 0; transform: scale(0.5); }
            /* 第 1 秒 (20%)：完全浮現，比例精準計算為 0.65 (維持完美線性) */
            20% { opacity: 1; transform: scale(0.65); }
            /* 第 5 秒 (100%)：維持清晰，平穩放大到 1.25 倍 */
            100% { opacity: 1; transform: scale(1.25); }
        }

        .password-input, .secret-input {
            width: 3rem;
            height: 4rem;
            text-align: center;
            font-size: 2rem;
            border: 2px solid #a1a1aa;
            border-radius: 0.5rem;
            margin: 0 0.25rem;
            background-color: #f4f4f5;
            color: #18181b;
        }
        
        .secret-input {
            width: auto;
            min-width: 150px;
            padding: 0 1rem;
        }

        .password-input:focus, .secret-input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.5);
        }
        
        .final-password-input {
            width: 3.5rem;
            height: 4.5rem;
            text-align: center;
            font-size: 2.5rem;
            text-transform: uppercase;
            border: 2px solid #a1a1aa;
            border-radius: 0.5rem;
            margin: 0 0.25rem;
            background-color: #f4f4f5;
            color: #18181b;
        }

        #flashlight-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* 光圈再縮小一倍 (38/2=19, 88/2=44) */
            background: radial-gradient(circle at 50% 50%, transparent 19px, rgba(0,0,0,0.98) 44px);
            pointer-events: none;
            z-index: 40;
        }
        
        .flashlight-cursor {
            cursor: url(data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAACXBIWXMAAAsTAAALEwEAmpwYAAAAAXNSR0IArs4c6QAAAARnQU1BAACxjwv8YQUAAAJVSURBVHgB7ZfRddswEIZfSgWlAlICpQKyAlICpQKyAlICtIOkgvQDpYOkgpQApwR2Z8xYjh3fw8DA8PbOEsl3v+TSwy4xxiWXXHJJ5Uq9P4F8fX0d2WyW4XCIfr9PFEW4XC4pl8tUKBTCWlpa0v2jUCi4XC6Px2OkUqmsoih4PJ6uNlsulzEajRCJRIiPj49L+Pn5xfVzOBxSLBb9fj/S6fR4PCasvLy8bLfbRaPRYDabLJfLqNVqVCqV0Ol0kMlkxONx+v0+CoXC9W0mk4lEIoFer4e7uzv6/f54PD6sra0tX5WIRETsBDs7O1xZWREMBgEAmM1mms0mAOD29jYxMTHk5+fXbDaTTCbz+Xwul0ssFkvbTqdDuVwWjUYtLS0FAAgEAuxtbW21tbUplUpBcHBAaWnpdDq9vLwcDocDAFBbW5vc3FxEIpFAoVAsFovNZhOLxTQaDTabzefz4XA4aDQajUZDNBo9fPgwzc3N4HA4ZDIZ0Wg0mUwmk8nkcDh0Oh0qlQqHw2Gz2SqVKrFYrFarBQCwWq3a7fbRaDQSiQQAQCaTIZfL4XA4VCrVYrEQj8fxeDwdHR3IZDI6nU4ikYhGo0GlUqFQKGQyGd1ul8lkSqVSJpMpFAqtVhsA4Ha7zWazMAxDX18fgiAQRVEAgNfrpVKp6PV6kUgkwWCAy+UqlUplMpmGhga8vLwAALS3t8vlclEUxev1AgBsNhsAzOfzQRDk8/kqlQoAwOl0UqlUrFYrEokkEAhwenoaDocDAFgsFsVi8bM+n88Xh8MhFotdXV2xtLQEAFAqlcRiMXq9XiwWAwBcX18DADabzWazeDweDocDAH7jXxwOh3q9vtlsBgD4/f6P/81Lbrnkkssv/wul/W/+B/0pMAAAAABJRU5ErkJggg==), auto;
        }

        .interactive-item {
            transition: transform 0.2s, filter 0.2s;
        }

        .modal {

</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- Google Sheet URL ---
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxVkVmMfp9DfabgtQcu32Jq_T743zOIvOYvsiLHT6MOGN99G1JxPTbSxieoEbG__J_U/exec';

            // --- State Management ---
            let currentIntroScreen = 0;
            let studentInfo = {};
            let totalScore = 0;
            let puzzleScores = { mainChest: 0, redChest: 0, yellowChest: 0, greenChest: 0, finalQuiz: 0 };
            let inventory = { flashlight: false, amethyst: false, goldenApple: false, goldenRod: false };
            let puzzlesSolved = { red: false, yellow: false, green: false };

            const introScreens = [
                'title-screen', 'intro-screen-1', 'intro-screen-2', 'intro-screen-3', 'intro-screen-4'
            ];

            // --- Background Music Setup ---
            const bgMusic = new Audio('Turning_The_Final_Key.mp3');
            bgMusic.loop = true;
            bgMusic.volume = 0.1; // 初始音量設定為很小聲

            // 初始小聲播放
            function playLowAudio(audio) {
                audio.play().catch(error => {
                    console.log("瀏覽器阻擋自動播放音效：", error);
                });
            }

            // 音樂漸漸變大聲功能
            function fadeAudioUpToMax(audio) {
                let vol = audio.volume;
                const interval = setInterval(() => {
                    if (vol < 1.0) {
                        vol = Math.min(1.0, vol + 0.05); // 緩慢增加音量
                        audio.volume = vol;
                    } else {
                        clearInterval(interval);
                    }
                }, 300); // 每 300 毫秒增加，創造平滑且充滿張力的漸進效果
            }

            // 音樂淡出功能 (修改：更細膩快速的淡出，確保影片開始前徹底靜音)
            function fadeAudioOut(audio) {
                let vol = audio.volume;
                const interval = setInterval(() => {
                    if (vol > 0.05) {
                        vol -= 0.05; // 每次扣除一點點音量
                        audio.volume = vol;
                    } else {
                        clearInterval(interval);
                        audio.pause();  // 徹底暫停
                        audio.volume = 0; // 音量歸零
                    }
                }, 100); // 每 100 毫秒執行一次，約 2 秒內會完全消失
            }

            // --- DOM Elements ---
            const studentForm = document.getElementById('student-form');
            const puzzleModal = document.getElementById('puzzle-modal');
            const modalContent = document.getElementById('modal-content');
            const imageViewer = document.getElementById('image-viewer');
            const viewerImg = document.getElementById('viewer-img');
            const gameScreen = document.getElementById('game-screen');
            const mainChestScreen = document.getElementById('main-chest-screen');
            const goldenDoorContainer = document.getElementById('golden-door-container');
            const submissionStatus = document.getElementById('submission-status');
            const finalVideo = document.getElementById('final-video');
            const playVideoBtn = document.getElementById('play-video-btn');

            // --- Functions ---
            function switchScreen(screenId) {
                document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden-screen'));
                const targetScreen = document.getElementById(screenId);
                if (targetScreen) {
                    targetScreen.classList.remove('hidden-screen');
                }
            }

            // Flow Navigation Functions
            document.getElementById('start-game-btn').addEventListener('click', () => {
                playLowAudio(bgMusic); // 點擊開始時，以極小音量開始播放配樂
                switchScreen('secret-password-screen');
            });

            document.getElementById('verify-password-btn').addEventListener('click', () => {
                const pwdInput = document.getElementById('entry-password').value;
                const errorMsg = document.getElementById('entry-error');
                if (pwdInput === 'LovelyD') {
                    errorMsg.classList.add('hidden');
                    switchScreen('login-screen');
                } else {
                    errorMsg.classList.remove('hidden');
                }
            });

            // Enter key support for secret password
            document.getElementById('entry-password').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    document.getElementById('verify-password-btn').click();
                }
            });

            function startIntroSequence() {
                if (currentIntroScreen < introScreens.length) {
                    const nextScreenId = introScreens[currentIntroScreen];
                    switchScreen(nextScreenId);
                    
                    // 當畫面切換到「智者，歡迎來到〈達文西密碼〉」時，觸發音樂漸漸變大聲
                    if (nextScreenId === 'intro-screen-4') {
                        fadeAudioUpToMax(bgMusic);
                    }
                    
                    currentIntroScreen++;
                    setTimeout(startIntroSequence, 5000); // 縮短一點時間讓節奏更順暢
                } else {
                    switchScreen('main-chest-screen');
                }
            }
            
            function createPasswordInput(container, count, isFinal = false) {
                let inputClass = isFinal ? 'final-password-input' : 'password-input';
                container.innerHTML = '';
                for (let i = 0; i < count; i++) {
                    const input = document.createElement('input');
                    input.type = isFinal ? 'text' : 'number';
                    input.maxLength = 1;
                    input.className = inputClass;
                    container.appendChild(input);

                    input.addEventListener('input', (e) => {
                        e.target.value = e.target.value.toUpperCase();
                        if (e.target.value && e.target.nextElementSibling) {
                            e.target.nextElementSibling.focus();
                        }
                    });
                    input.addEventListener('keydown', (e) => {
                         if (e.key === 'Backspace' && !e.target.value && e.target.previousElementSibling) {
                             e.target.previousElementSibling.focus();
                         }
                    });
                }
            }

            function getPassword(containerId) {
                const container = document.getElementById(containerId);
                if (!container) return '';
                const inputs = container.querySelectorAll('.password-input, .final-password-input');
                return Array.from(inputs).map(input => input.value).join('');
            }

            function submitScore() {
                submissionStatus.textContent = '成績上傳中...';
                
                // 將傳送格式改為 URLSearchParams，這是 Google Apps Script (e.parameter) 最容易成功讀取的格式
                const params = new URLSearchParams();
                params.append('class', studentInfo.class);
                params.append('seat', studentInfo.seat);
                params.append('name', studentInfo.name);
                params.append('mainChestScore', puzzleScores.mainChest);
                params.append('redChestScore', puzzleScores.redChest);
                params.append('yellowChestScore', puzzleScores.yellowChest);
                params.append('greenChestScore', puzzleScores.greenChest);
                params.append('finalQuizScore', puzzleScores.finalQuiz);
                params.append('totalScore', totalScore);
                
                fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: params,
                    mode: 'no-cors' // 繞過 Google Apps Script 的 CORS 安全限制
                })
                .then(() => {
                    // no-cors 模式下無法讀取回傳內容，直接假設上傳成功
                    submissionStatus.textContent = '成績已成功上傳！';
                })
                .catch(error => {
                    submissionStatus.textContent = '上傳失敗，請檢查網路連線。';
                })
                .finally(() => {
                    // 成績顯示 3 秒等待期間，就立刻開始將音樂淡出
                    fadeAudioOut(bgMusic);
                    setTimeout(playEndingVideo, 3000);

                            <span class="inline-block mt-1 px-3 py-1 bg-yellow-100 text-yellow-800 rounded text-sm font-normal">💡 提示2：重力位能 = mgh</span></p>

                                <label class="cursor-pointer hover:text-amber-700"><input type="radio" name="final-q4" value="K" class="mr-2 transform scale-125"> K. 75</label>
                                <label class="cursor-pointer hover:text-amber-700"><input type="radio" name="final-q4" value="L" class="mr-2 transform scale-125"> L. 50</label>
                                <label class="cursor-pointer hover:text-amber-700"><input type="radio" name="final-q4" value="M" class="mr-2 transform scale-125"> M. 25</label>
                                <label class="cursor-pointer hover:text-amber-700"><input type="radio" name="final-q4" value="N" class="mr-2 transform scale-125"> N. 15</label>
                                <label class="cursor-pointer hover:text-amber-700"><input type="radio" name="final-q4" value="O" class="mr-2 transform scale-125"> O. 5</label>
                            </div>
                        </div>
                        
                        <div class="mt-6 pt-6 border-t-4 border-double border-amber-900">
                            <p class="font-bold text-center mb-4 text-amber-800 text-xl tracking-widest">解開最終密碼鎖</p>
                            <div id="final-password-container" class="flex justify-center"></div>
                        </div>
                         <div class="flex justify-center gap-6 mt-8">
                            <button id="submit-final-password" class="bg-amber-600 text-white font-bold py-3 px-10 rounded-full hover:bg-amber-500 shadow-lg text-xl transition-transform hover:scale-105">開啟大門，成功逃脫</button>
                            <button id="close-modal-btn" class="bg-gray-400 text-white font-bold py-3 px-8 rounded-full hover:bg-gray-500 shadow text-xl transition-colors">再想一下</button>
                        </div>
                    </div>
                `;
                showModal(puzzleHTML);
                createPasswordInput(document.getElementById('final-password-container'), 4, true);
                
                document.getElementById('submit-final-password').addEventListener('click', () => {
                    const answer1 = document.querySelector('input[name="final-q1"]:checked')?.value;
                    const answer2 = document.querySelector('input[name="final-q2"]:checked')?.value;
                    const answer3 = document.querySelector('input[name="final-q3"]:checked')?.value;
                    const answer4 = document.querySelector('input[name="final-q4"]:checked')?.value;

                    if (!answer1 || !answer2 || !answer3 || !answer4) {
                        alert('科學研究必須嚴謹，請回答所有問題後再試！');
                        return;
                    }
                    
                    let correctCount = 0;
                    if(answer1 === 'B') correctCount++;
                    if(answer2 === 'D') correctCount++;
                    if(answer3 === 'G') correctCount++;
                    if(answer4 === 'N') correctCount++;
                    
                    updateScore('finalQuiz', correctCount * 10);
                    
                    const finalPassword = getPassword('final-password-container');
                    if (finalPassword === "BDGN") {
                        closeModal();
                        showEndScreen();
                    } else {
                        alert('最終密碼錯誤！請重新檢視力與能的計算邏輯。');
                    }
                });
                document.getElementById('close-modal-btn').addEventListener('click', closeModal);
            }

            // --- Event Listeners ---
            studentForm.addEventListener('submit', (e) => {
                e.preventDefault();
                studentInfo = {
                    class: document.getElementById('student-class').value,
                    seat: document.getElementById('student-seat').value,
                    name: document.getElementById('student-name').value,
                };
                startIntroSequence();
            });

            // 點擊第一個大寶箱時，顯示解題畫面 (音樂已在一開始播放，所以移除原本的音樂播放代碼)
            document.getElementById('main-chest-img').addEventListener('click', showMainChestPuzzle);

            document.getElementById('item-red-bag').addEventListener('click', showRedBagPuzzle);
            document.getElementById('item-yellow-bag').addEventListener('click', showYellowBagPuzzle);
            document.getElementById('item-green-bag').addEventListener('click', showGreenBagPuzzle);

            document.getElementById('item-red-chest').addEventListener('click', () => {
                if (!puzzlesSolved.red) showRedChestPuzzle();
            });
            document.getElementById('item-yellow-chest').addEventListener('click', () => {
                if (!puzzlesSolved.yellow) showYellowChestPuzzle();
            });
             document.getElementById('item-green-chest').addEventListener('click', () => {
                if (!puzzlesSolved.green) showGreenChestPuzzle();
            });

            goldenDoorContainer.addEventListener('click', showFinalPuzzle);

            // Flashlight effect
            gameScreen.addEventListener('mousemove', (e) => {
                if (inventory.flashlight) {
                    const overlay = document.getElementById('flashlight-overlay');
                    const rect = gameScreen.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    /* 光圈效果同樣配合 CSS 尺寸設定，再縮小為原本的一半 (19px, 44px) */
                    overlay.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent 19px, rgba(0,0,0,0.98) 44px)`;
                }
            });

            // Image viewer
            document.body.addEventListener('click', (e) => {
                if (e.target.classList.contains('zoomable-image')) {
                    viewerImg.src = e.target.src;
                    imageViewer.classList.remove('hidden');
                }
            });
            imageViewer.addEventListener('click', () => {
                imageViewer.classList.add('hidden');
            });
            
            // --- Initialisation ---
            switchScreen('cover-screen');
        });
    </script>
</body>
</html>
