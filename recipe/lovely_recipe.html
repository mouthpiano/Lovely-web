<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小栗的私房食譜筆記</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-orange-50/50 font-sans pb-12">
  
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

    const { useState, useEffect } = React;

    const SvgIcon = ({ children, size = 24, className = "" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {children}
      </svg>
    );
    const SearchIcon = (props) => <SvgIcon {...props}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></SvgIcon>;
    const SparklesIcon = (props) => <SvgIcon {...props}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></SvgIcon>;
    const PlusIcon = (props) => <SvgIcon {...props}><path d="M5 12h14"/><path d="M12 5v14"/></SvgIcon>;
    const ChefHatIcon = (props) => <SvgIcon {...props}><path d="M6 13.87A4 4 0 0 1 7.41 6a5.11 5.11 0 0 1 1.05-1.54 5 5 0 0 1 7.08 0A5.11 5.11 0 0 1 16.59 6 4 4 0 0 1 18 13.87V21H6Z"/><line x1="6" x2="18" y1="17" y2="17"/></SvgIcon>;
    const UploadIcon = (props) => <SvgIcon {...props}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></SvgIcon>;
    const Trash2Icon = (props) => <SvgIcon {...props}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></SvgIcon>;
    const Edit3Icon = (props) => <SvgIcon {...props}><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></SvgIcon>;
    const SaveIcon = (props) => <SvgIcon {...props}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></SvgIcon>;
    const ImageIcon = (props) => <SvgIcon {...props}><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></SvgIcon>;

    const firebaseConfig = {
      apiKey: "AIzaSyAZWseZUCUIEIChRLACx00lP7Nq5QJEaho",
      authDomain: "lovely-s-app.firebaseapp.com",
      projectId: "lovely-s-app",
      storageBucket: "lovely-s-app.firebasestorage.app",
      messagingSenderId: "413457716527",
      appId: "1:413457716527:web:0974e91f201ef6935b3dda"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const MY_IP_IMAGE_URL = "https://mouthpiano.github.io/Lovely-web/cook.png"; 
    const GEMINI_API_KEY = "AIzaSyC6AWpJe5L9USp3k5J5pexJPPVe4QWD7lU";

    function App() {
      const [recipes, setRecipes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState(''); 
      
      const [pasteText, setPasteText] = useState('');
      const [isParsing, setIsParsing] = useState(false);
      const [parseError, setParseError] = useState('');

      useEffect(() => {
        const recipesRef = collection(db, 'xiaoli_shared_recipes');
        const unsubscribe = onSnapshot(recipesRef, (snapshot) => {
          const fetchedRecipes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          fetchedRecipes.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
          setRecipes(fetchedRecipes);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const handleParseAndSave = async () => {
        if (!pasteText.trim()) return;
        setIsParsing(true);
        setParseError('');

        try {
          const prompt = `
            你是一個食譜解析助手。請從以下對話中提取出食譜。
            如果對話中沒有提到明確的「菜名」，請根據食材自動取名（例如：電鍋炊飯）。
            請務必以嚴格的 JSON 格式回傳，不要有任何多餘的文字或 Markdown 標記。
            格式如下：
            {
              "title": "菜名",
              "ingredients": ["食材1 份量", "食材2 份量"],
              "steps": ["步驟1", "步驟2"],
              "nutrition": "營養成分 (若無可填空字串)",
              "tips": "主廚叮嚀 (若無可填空字串)"
            }
            對話內容：${pasteText}
          `;

          // ✨ 終極自動導航：列出所有 Google 模型，網頁會自動測試哪一個能用！
          const modelsToTry = [
            'gemini-1.5-flash', 
            'gemini-1.5-flash-latest',
            'gemini-1.0-pro',
            'gemini-1.0-pro-latest'
          ];
          
          let responseData = null;
          let lastErrorMsg = '';

          for (const model of modelsToTry) {
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  contents: [{ parts: [{ text: prompt }] }]
                })
              });

              if (response.ok) {
                responseData = await response.json();
                break; // 成功敲開門了，立刻跳出迴圈！
              } else {
                const errData = await response.json();
                lastErrorMsg = errData.error?.message || response.status;
              }
            } catch (err) {
              // 若有網路異常，繼續嘗試下一個門
            }
          }

          if (!responseData) {
            throw new Error(`所有 AI 模組皆無回應，最後錯誤為: ${lastErrorMsg}`);
          }
          
          const resultText = responseData.candidates?.[0]?.content?.parts?.[0]?.text;
          
          if (!resultText) throw new Error("AI 成功連線，但忘記回傳內容了");

          // 強效 JSON 濾網
          const match = resultText.match(/\{[\s\S]*\}/);
          if (!match) throw new Error('AI 回傳的格式有誤，無法辨識成食譜卡片');
          
          let parsedRecipe;
          try {
            parsedRecipe = JSON.parse(match[0]);
          } catch(e) {
            throw new Error('文字轉換成資料時發生錯誤');
          }

          const recipesRef = collection(db, 'xiaoli_shared_recipes');
          await addDoc(recipesRef, {
            ...parsedRecipe,
            imageUrl: '',
            myNotes: '',
            createdAt: Date.now()
          });
          setPasteText('');
        } catch (error) {
          console.error(error);
          setParseError(`解析失敗 (${error.message})`);
        } finally {
          setIsParsing(false);
        }
      };

      const handleUpdateRecipe = async (id, field, value) => {
        const docRef = doc(db, 'xiaoli_shared_recipes', id);
        await updateDoc(docRef, { [field]: value });
      };

      const handleDeleteRecipe = async (id) => {
        const docRef = doc(db, 'xiaoli_shared_recipes', id);
        await deleteDoc(docRef);
      };

      const filteredRecipes = recipes.filter(recipe => 
        recipe.title?.includes(searchQuery) || 
        recipe.ingredients?.some(i => i.includes(searchQuery))
      );

      if (loading) return <div className="min-h-screen bg-orange-50 flex items-center justify-center font-bold text-xl text-orange-600">廚房準備中...</div>;

      return (
        <div className="min-h-screen bg-orange-50/50 font-sans pb-12">
          <header className="bg-white shadow-sm border-b border-orange-100 sticky top-0 z-20">
            <div className="max-w-5xl mx-auto px-4 py-4 flex items-center gap-3">
              <div className="bg-orange-100 p-1 rounded-full overflow-hidden border-2 border-orange-200 shrink-0 flex items-center justify-center w-14 h-14 shadow-sm">
                <img src={MY_IP_IMAGE_URL} alt="小栗主廚IP" className="w-full h-full object-cover rounded-full bg-white"/>
              </div>
              <div className="flex-1">
                <h1 className="text-xl md:text-2xl font-bold text-gray-800 tracking-wide">小栗的私房食譜筆記</h1>
                <p className="text-xs text-orange-600 font-medium">與美女大主廚的專屬回憶</p>
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto px-4 mt-6 space-y-6">
            <div className="relative">
              <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <SearchIcon className="h-5 w-5 text-gray-400" />
              </div>
              <input
                type="text"
                placeholder="搜尋菜名或食材 (例如：牛肉、番茄...)"
                value={searchQuery}
                onChange={(e) => setSearchQuery(e.target.value)}
                className="w-full pl-10 pr-4 py-3 border-2 border-orange-100 rounded-2xl focus:ring-4 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition-all shadow-sm bg-white"
              />
            </div>

            <section className="bg-white rounded-2xl shadow-sm border border-orange-100 p-5 md:p-6">
              <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2 mb-3">
                <SparklesIcon className="text-orange-500" size={20} /> AI 智慧匯入
              </h2>
              <textarea
                value={pasteText}
                onChange={(e) => setPasteText(e.target.value)}
                placeholder="貼上對話紀錄 (例如：主廚教我做三杯雞...)"
                className="w-full h-24 p-3 border border-gray-200 rounded-xl bg-gray-50 mb-3 outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-100 resize-none text-sm"
              />
              {parseError && <p className="text-red-500 text-xs mb-3">{parseError}</p>}
              <div className="flex justify-end">
                <button onClick={handleParseAndSave} disabled={isParsing || !pasteText.trim()} className="bg-orange-500 hover:bg-orange-600 text-white px-5 py-2 rounded-xl font-medium flex items-center gap-2 disabled:bg-gray-300 transition-colors shadow-sm text-sm">
                  {isParsing ? '解析中...' : <><PlusIcon size={16} />解析並儲存</>}
                </button>
              </div>
            </section>

            <section className="grid grid-cols-1 md:grid-cols-2 gap-6">
              {filteredRecipes.length === 0 ? (
                <div className="col-span-full text-center text-gray-400 py-12 bg-white rounded-2xl border border-dashed border-gray-200">
                  <ChefHatIcon className="mx-auto mb-3 opacity-50" size={40} />
                  <p>{searchQuery ? "找不到相關的食譜喔！" : "還沒有任何食譜，快匯入第一道菜吧！"}</p>
                </div>
              ) : (
                filteredRecipes.map(recipe => (
                  <RecipeCard key={recipe.id} recipe={recipe} onUpdate={handleUpdateRecipe} onDelete={handleDeleteRecipe} />
                ))
              )}
            </section>
          </main>
        </div>
      );
    }

    function RecipeCard({ recipe, onUpdate, onDelete }) {
      const [isEditingNotes, setIsEditingNotes] = useState(false);
      const [notesTemp, setNotesTemp] = useState(recipe.myNotes || '');
      const [isEditingImage, setIsEditingImage] = useState(false);
      const [imageTemp, setImageTemp] = useState(recipe.imageUrl || '');
      const [isUploading, setIsUploading] = useState(false);

      const saveNotes = () => { onUpdate(recipe.id, 'myNotes', notesTemp); setIsEditingNotes(false); };
      const saveImage = () => { onUpdate(recipe.id, 'imageUrl', imageTemp); setIsEditingImage(false); };

      const handleImageUpload = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setIsUploading(true);
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let { width, height } = img;
            if (width > 800) { height *= 800 / width; width = 800; }
            canvas.width = width; canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            setImageTemp(canvas.toDataURL('image/jpeg', 0.6));
            setIsUploading(false);
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      };

      return (
        <div className="bg-white rounded-2xl shadow-md border border-orange-100 overflow-hidden flex flex-col transform transition hover:-translate-y-1 hover:shadow-lg">
          <div className="relative h-56 bg-gray-100 group">
            {recipe.imageUrl ? (
              <img src={recipe.imageUrl} alt={recipe.title} className="w-full h-full object-cover" />
            ) : (
              <div className="w-full h-full flex flex-col items-center justify-center text-gray-400 bg-orange-50/50">
                <ImageIcon size={32} className="mb-2 opacity-50" />
                <span className="text-sm">尚未上傳照片</span>
              </div>
            )}
            
            {!isEditingImage && (
              <button onClick={() => setIsEditingImage(true)} className="absolute bottom-3 right-3 bg-white/95 text-gray-700 px-3 py-1.5 rounded-full text-xs shadow-lg flex items-center gap-1.5 font-medium hover:bg-orange-50 transition-colors">
                <ImageIcon size={14}/> 更改照片
              </button>
            )}

            {isEditingImage && (
              <div className="absolute inset-0 bg-black/60 flex items-center justify-center p-3 z-10 backdrop-blur-sm">
                <div className="bg-white p-4 rounded-xl w-full max-w-sm flex flex-col gap-3 shadow-2xl">
                  <label className="flex items-center justify-center gap-2 bg-orange-50 hover:bg-orange-100 text-orange-700 py-3 rounded-xl border-2 border-dashed border-orange-300 cursor-pointer transition-colors font-bold text-sm">
                    <UploadIcon size={18} /> {isUploading ? '照片壓縮中...' : '從手機相簿選取'}
                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                  </label>
                  <div className="flex justify-end gap-2 mt-1">
                    <button onClick={() => setIsEditingImage(false)} className="text-gray-500 hover:text-gray-700 text-sm px-3 py-1.5">取消</button>
                    <button onClick={saveImage} disabled={isUploading} className="bg-orange-500 text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-sm disabled:bg-gray-400">儲存</button>
                  </div>
                </div>
              </div>
            )}
          </div>

          <div className="p-5 flex-1 flex flex-col">
            <div className="flex justify-between items-start mb-4">
              <h3 className="text-xl font-bold text-gray-800 leading-tight pr-4">{recipe.title}</h3>
              <button onClick={() => { if(window.confirm(`確定要刪除「${recipe.title}」嗎？這無法復原喔！`)) onDelete(recipe.id);
